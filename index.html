  allRecent.sort(function(a,b){return (b.start_time||'').localeCompare(a.start_time||'')});
  allRecent.slice(0,20).forEach(function(r){
    let cups=0;try{const d=typeof r.drinks==='string'?JSON.parse(r.drinks):(r.drinks||{});Object.values(d).forEach(function(v){cups+=parseInt(v)||0})}catch(e){}
    const day=String(new Date(r.start_time).getDate()).padStart(2,'0')+'.'+String(new Date(r.start_time).getMonth()+1).padStart(2,'0');
    const isOpen=!r.end_time;
    const lt=openerLate(r,allRecent);
    h+='<div class="hist '+(isOpen?'':'')+'" style="'+(isOpen?'background:#ecfdf5;border-color:#6ee7b7':'')+'">'
      +'<div class="hist-l">'
        +'<div class="hist-d">'+(r._r==='owner'?'👑 ':'')+escH(r._n)+' · '+day+(lt?' <span style="color:#dc2626;font-weight:700;font-size:11px">⏰ опоздание '+lateLabel(lt)+'</span>':'')+'</div>'
        +'<div class="hist-m">'+fmtTime(r.start_time)+(isOpen?' → <span style="color:#059669;font-weight:700">в смене</span>':' → '+fmtTime(r.end_time)+' · '+fmtH(r.hours||0)+(cups?' · '+cups+' шт':''))+'</div>'
      +'</div>'
      +'<div class="hist-r">'+(isOpen?'<span style="color:#059669">●</span>':'+'+fmt(r.total||0))+'</div>'
    +'</div>';
  });
  if(!allRecent.length)h+='<div class="empty-mini">Нет записей</div>';
  h+='<div class="footer">XSYN</div>';
  m.innerHTML=h;b.style.display='none';
}

// ── Vardiya kayıt ekranı ──
function rMShift(m,b){
  const t=gT();
  const dayStr=String(t.getDate()).padStart(2,'0')+'.'+String(t.getMonth()+1).padStart(2,'0')+'.'+t.getFullYear();
  let h='<button class="back" onclick="mView=\'main\';render()">‹ Назад</button>';
  h+='<div class="sec">📅 '+dayStr+' · Запись смены</div>';
  // Saat
  h+='<div class="sf-card"><div class="sf-label">⏱️ Часы работы</div>'
    +'<input class="sf-hours" id="sfHours" type="number" inputmode="decimal" min="0" max="24" step="0.5" value="'+escH(String(shiftDraft.hours||''))+'" oninput="shiftDraft.hours=this.value;recalcShift()" placeholder="например 8">'
    +'<div class="sf-hint" id="sfHourHint">Введите количество часов</div>'
  +'</div>';
  // İçecekler
  h+='<div class="sec">🥤 Напитки за смену <span style="font-weight:500;color:var(--t3);font-size:10px">(нажмите на цифру для ввода)</span></div>';
  DRINK_LIST.forEach(function(d){
    const q=parseInt(shiftDraft.drinks[d.id])||0;
    const sub=q*d.r;
    h+='<div class="dr-item '+(q?'has':'')+'">'
      +'<div class="dr-l"><div class="dr-n">'+d.c+' '+d.l+'</div><div class="dr-s">'+fmt(d.r)+' / шт'+(q?' · +'+fmt(sub):'')+'</div></div>'
      +'<div class="qty-box">'
        +'<button class="qb m" onclick="dq(\''+d.id+'\',-1)">&minus;</button>'
        +'<span class="qv '+(q?'':'z')+'" onclick="dqManual(\''+d.id+'\')" title="Нажмите для ввода">'+(q||'&middot;')+'</span>'
        +'<button class="qb p" onclick="dq(\''+d.id+'\',1)">+</button>'
      +'</div>'
    +'</div>';
  });
  // Not
  h+='<div class="sec">📝 Заметка (необязательно)</div>'
    +'<textarea class="sf-note" rows="2" placeholder="например: смена 9:00 — 17:00" oninput="shiftDraft.note=this.value">'+escH(shiftDraft.note||'')+'</textarea>';
  // Toplam
  h+='<div class="sf-total">'
    +'<div class="sf-tot-row"><span>Часы × 12.000</span><span id="sfHourly">0</span></div>'
    +'<div class="sf-tot-row"><span>Бонус (напитки)</span><span id="sfBonus">0</span></div>'
    +'<div class="sf-tot-big"><span>ИТОГО</span><span id="sfTotal">0 сум</span></div>'
  +'</div>';
  h+='<div class="footer">XSYN</div>';
  m.innerHTML=h;
  b.style.display='block';
  b.innerHTML='<button class="mbtn" id="sfBtn" disabled onclick="saveShift()">Введите часы</button>';
  recalcShift();
}

function dq(id,d){
  shiftDraft.drinks[id]=Math.max(0,(parseInt(shiftDraft.drinks[id])||0)+d);
  if(!shiftDraft.drinks[id])delete shiftDraft.drinks[id];
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function dqManual(id){
  const cur=parseInt(shiftDraft.drinks[id])||0;
  const v=prompt('Сколько штук?',cur||'');
  if(v===null)return;
  const n=Math.max(0,parseInt(v)||0);
  if(n===0)delete shiftDraft.drinks[id];else shiftDraft.drinks[id]=n;
  render();
}

function recalcShift(){
  const hours=parseFloat(shiftDraft.hours)||0;
  let bonus=0;
  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});
  const hourly=Math.round(hours*HOURLY_RATE);
  const total=hourly+bonus;
  const eHr=document.getElementById('sfHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('sfBonus');if(eBn)eBn.textContent=fmt(bonus);
  const eTt=document.getElementById('sfTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  const eHt=document.getElementById('sfHourHint');if(eHt)eHt.textContent=hours>0?(hours+'h × 12.000 = '+fmt(hourly)+' сум'):'Введите количество часов';
  const eBt=document.getElementById('sfBtn');if(eBt){const ok=hours>0;eBt.disabled=!ok;eBt.classList.toggle('grn',ok);eBt.textContent=ok?('💾 Записать смену · '+fmt(total)+' сум'):'Введите часы';}
}

function saveShift(){
  const hours=parseFloat(shiftDraft.hours)||0;
  if(hours<=0)return;
  let bonus=0;
  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});
  const hourly=Math.round(hours*HOURLY_RATE);
  const total=hourly+bonus;
  const payload={action:'shift',hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note};
  // Optimistik güncelleme — kullanıcı uygulamada hemen sonucu görür
  SUMMARY.hours=(SUMMARY.hours||0)+hours;
  SUMMARY.hourly=(SUMMARY.hourly||0)+hourly;
  SUMMARY.bonus=(SUMMARY.bonus||0)+bonus;
  SUMMARY.gross=(SUMMARY.hourly||0)+(SUMMARY.bonus||0);
  SUMMARY.fines=SUMMARY.fines||0;
  SUMMARY.paid=SUMMARY.paid||0;
  SUMMARY.net=SUMMARY.gross-SUMMARY.fines-SUMMARY.paid;
  SUMMARY.shifts_count=(SUMMARY.shifts_count||0)+1;
  SUMMARY.shifts=SUMMARY.shifts||[];
  SUMMARY.shifts.push({hours:hours,drinks:JSON.stringify(shiftDraft.drinks),bonus:bonus,hourly_pay:hourly,total:total,created_at:new Date().toISOString()});
  // Lokal geçmişe de kaydet
  hist.push({type:'shift',date:new Date().toISOString(),user:MY_NAME,hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note,total:total});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('💾 Смена записана!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  shiftDraft={hours:'',drinks:{},note:''};
  mView='main';
  render();
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('sendData:',e)}}
}

// ── Owner: Ceza ekleme ekranı (çoklu hedef + zorunlu sebep + split) ──
function rMFine(m,b){
  if(MY_ROLE!=='owner'){mView='main';render();return}
  // İlk açılışta inspection preset'iyse split otomatik aç
  const isInsp=String(fineDraft.type||'').indexOf('insp_')===0||fineDraft.type==='foreign';
  let h='<button class="back" onclick="mView=\'main\';render()">‹ Назад</button>';
  h+='<div class="sec">⚠️ Добавить штраф</div>';

  // Tip seç (önce)
  h+='<div class="sf-label" style="margin:8px 0 6px">Тип штрафа</div>';
  FINE_PRESETS.forEach(function(p){
    const sel=fineDraft.type===p.id;
    h+='<div class="opt '+(sel?'on':'')+'" onclick="selFineType(\''+p.id+'\')">'
      +'<div class="opt-r"></div>'
      +'<div class="opt-l"><div class="opt-t">'+p.l+'</div><div class="opt-s">'+p.s+'</div></div>'
      +(p.amt?'<div class="opt-amt">'+fmt(p.amt)+'</div>':'')
    +'</div>';
  });

  // Custom amount
  if(fineDraft.type==='custom'){
    h+='<div class="sf-label" style="margin:14px 0 6px">Сумма (сум)</div>'
      +'<input class="sf-hours" type="number" inputmode="numeric" min="1" value="'+escH(String(fineDraft.custom||''))+'" oninput="fineDraft.custom=this.value;fineDraft.amount=parseInt(this.value)||0;recalcFine()" placeholder="например 50000">';
  }

  // Split toggle (denetim cezalarında otomatik öneri)
  h+='<div class="sf-label" style="margin:14px 0 6px">Кому?</div>';
  h+='<div class="split-toggle '+(fineDraft.split?'on':'')+'" onclick="fineDraft.split=!fineDraft.split;render()">'
    +'<div><div class="split-toggle-t">⚖️ Разделить на нескольких</div><div class="split-toggle-s">'+(fineDraft.split?'Сумма поделится поровну':'Полная сумма каждому выбранному')+'</div></div>'
    +'<div class="tg-sw '+(fineDraft.split?'on':'')+'"></div>'
  +'</div>';
  // Şef %50 öder toggle (sadece denetim/проверка cezalarında öneri)
  h+='<div class="split-toggle '+(fineDraft.chefShare?'on':'')+'" style="margin-top:6px" onclick="fineDraft.chefShare=!fineDraft.chefShare;render()">'
    +'<div><div class="split-toggle-t">🍴 Шеф платит 50%</div><div class="split-toggle-s">'+(fineDraft.chefShare?'Половина суммы — на шефа (вы)':'Бариста платят полную сумму')+'</div></div>'
    +'<div class="tg-sw '+(fineDraft.chefShare?'on':'')+'"></div>'
  +'</div>';
  if(isInsp&&!fineDraft.split){
    h+='<div class="refresh-hint" style="margin-top:0">💡 Это проверка — обычно штраф делится между баристами в смене.</div>';
  }

  // Çoklu barista seç (checkbox tarzı)
  const _FB=BARISTAS.filter(function(x){return !x.arch});
  if(!_FB.length){
    h+='<div class="empty-mini">Нет баристов. Они должны написать боту /start.</div>';
  } else {
    _FB.forEach(function(brs){
      const sel=fineDraft.targets.indexOf(brs.id)>=0;
      h+='<div class="opt multi '+(sel?'on':'')+'" onclick="toggleFineTarget('+brs.id+')">'
        +'<div class="opt-r"></div>'
        +'<div class="opt-l"><div class="opt-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="opt-s">'+(brs.u?'@'+escH(brs.u)+' · ':'')+'штраф в мес.: '+fmt(brs.f||0)+'</div></div>'
      +'</div>';
    });
  }

  // Sebep — ZORUNLU
  h+='<div class="sf-label" style="margin:14px 0 6px">Причина <span style="color:var(--red);font-weight:800">*</span></div>'
    +'<textarea class="sf-note" rows="2" placeholder="обязательно укажите причину" oninput="fineDraft.reason=this.value;recalcFine()">'+escH(fineDraft.reason||'')+'</textarea>';

  // Toplam
  const cnt=fineDraft.targets.length;
  const totalAmt=fineDraft.amount;
  const baristaPool=fineDraft.chefShare?Math.floor(totalAmt/2):totalAmt;
  const chefAmt=fineDraft.chefShare?(totalAmt-baristaPool):0;
  const per=(fineDraft.split&&cnt>1)?Math.floor(baristaPool/cnt):baristaPool;
  h+='<div class="sf-total">'
    +'<div class="sf-tot-row"><span>Получателей</span><span>'+cnt+'</span></div>'
    +(fineDraft.chefShare?'<div class="sf-tot-row"><span>Полная сумма</span><span>-'+fmt(totalAmt)+'</span></div>':'')
    +(fineDraft.chefShare?'<div class="sf-tot-row" style="color:#f59e0b"><span>🍴 Доля шефа (вы)</span><span>-'+fmt(chefAmt)+'</span></div>':'')
    +(fineDraft.split&&cnt>1?'<div class="sf-tot-row"><span>На баристов</span><span>-'+fmt(baristaPool)+'</span></div>':'')
    +'<div class="sf-tot-big"><span>'+(fineDraft.split&&cnt>1?'Каждому':'Штраф бариста')+'</span><span id="fnAmt">-'+fmt(per)+' сум</span></div>'
  +'</div>';

  h+='<div class="footer">XSYN</div>';
  m.innerHTML=h;
  b.style.display='block';
  const reasonOk=(fineDraft.reason||'').trim().length>0;
  const ok=cnt>0&&fineDraft.amount>0&&reasonOk;
  b.innerHTML='<button class="mbtn" id="fnBtn" '+(ok?'':'disabled')+' onclick="saveFine()">'+(ok?'⚠️ Записать штраф · -'+fmt(per)+' сум'+(fineDraft.split&&cnt>1?' × '+cnt:'')+(fineDraft.chefShare?' (+ вы -'+fmt(chefAmt)+')':''):(reasonOk?'Выберите получателей':'Укажите причину'))+'</button>';
}

function toggleFineTarget(uid){
  const i=fineDraft.targets.indexOf(uid);
  if(i>=0)fineDraft.targets.splice(i,1);else fineDraft.targets.push(uid);
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}

function selFineType(t){
  fineDraft.type=t;
  const p=FINE_PRESETS.find(function(x){return x.id===t});
  if(p&&t!=='custom')fineDraft.amount=p.amt;
  if(t==='custom')fineDraft.amount=parseInt(fineDraft.custom)||0;
  // Inspection preset'lerinde split otomatik aç (checkbox manuel kapatılırsa kapanır)
  if(t.indexOf('insp_')===0||t==='foreign')fineDraft.split=true;
  render();
}
function recalcFine(){
  // Sadece toplamı güncelle (re-render etmeden)
  const cnt=fineDraft.targets.length;
  const per=(fineDraft.split&&cnt>1)?Math.floor(fineDraft.amount/cnt):fineDraft.amount;
  const eA=document.getElementById('fnAmt');if(eA)eA.textContent='-'+fmt(per)+' сум';
  const eB=document.getElementById('fnBtn');if(eB){
    const reasonOk=(fineDraft.reason||'').trim().length>0;
    const ok=cnt>0&&fineDraft.amount>0&&reasonOk;
    eB.disabled=!ok;
    eB.textContent=ok?'⚠️ Записать штраф · -'+fmt(per)+' сум'+(fineDraft.split&&cnt>1?' × '+cnt:''):(reasonOk?'Выберите получателей':'Укажите причину');
  }
}

function saveFine(){
  const cnt=fineDraft.targets.length;
  const reason=(fineDraft.reason||'').trim();
  if(cnt===0||fineDraft.amount<=0||!reason){
    if(!reason)toast('❌ Причина обязательна');
    return;
  }
  const chefShare=!!fineDraft.chefShare;
  const totalAmt=fineDraft.amount;
  const baristaPool=chefShare?Math.floor(totalAmt/2):totalAmt;
  const chefAmt=chefShare?(totalAmt-baristaPool):0;
  const split=fineDraft.split&&cnt>1;
  const per=split?Math.floor(baristaPool/cnt):baristaPool;
  // Lokal güncelleme — baristalar
  fineDraft.targets.forEach(function(uid){
    const t=BARISTAS.find(function(x){return x.id===uid});
    if(t){t.f=(t.f||0)+per;t.net=(t.net||0)-per}
  });
  // Lokal güncelleme — şefin (kendi) payı
  if(chefShare&&chefAmt>0){
    const me=BARISTAS.find(function(x){return x.id===MY_UID});
    if(me){me.f=(me.f||0)+chefAmt;me.net=(me.net||0)-chefAmt}
  }
  const payload={action:'fine',targets:fineDraft.targets,amount:totalAmt,reason:reason,type:fineDraft.type,split:split,chef_share:chefShare};
  toast(chefShare?('🍴 Штраф разделён со шефом'):(split?('⚠️ Штраф разделён · '+cnt+' чел.'):'⚠️ Штраф записан'));
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  fineDraft={targets:[],type:'clean',amount:30000,reason:'',custom:'',split:false,chefShare:false};
  mView='main';
  render();
}

          +'<div class="opt-r"></div>'
          +'<div class="opt-l"><div class="opt-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="opt-s">'+(brs.u?'@'+escH(brs.u):'')+'</div></div>'
        +'</div>';
      }

  h+='<div class="sf-label" style="margin:14px 0 6px">Заметка (необязательно)</div>'
    +'<textarea class="sf-note" rows="2" placeholder="например: вечерние чаевые" oninput="tipDraft.note=this.value">'+escH(tipDraft.note||'')+'</textarea>';

  // Toplam
  const calc=calcTipPlan();
  h+='<div class="sf-total" id="tpSummary">'+tipSummaryInner(calc)+'</div>';

  h+='<div class="footer">XSYN</div>';

function tipSummaryInner(calc){
  return '<div class="sf-tot-row"><span>Получателей</span><span>'+calc.cnt+'</span></div>'
    +'<div class="sf-tot-row"><span>Сумма</span><span>'+fmt(calc.total)+' сум</span></div>'
    +(calc.cnt>0&&tipDraft.mode==='equal'?'<div class="sf-tot-row"><span>Каждому</span><span>+'+fmt(calc.per)+' сум</span></div>':'')
    +'<div class="sf-tot-big"><span>ИТОГО</span><span>+'+fmt(calc.sum)+' сум</span></div>';
}
function tipButtonInner(calc){
  var ok=calc.cnt>0&&calc.sum>0;
  return '<button class="mbtn '+(ok?'grn':'')+'" '+(ok?'':'disabled')+' onclick="saveTips()">'+(ok?'💝 Раздать +'+fmt(calc.sum)+' сум':'Введите сумму и выберите бариста')+'</button>';
}
function toggleTipTarget(uid){
  if(tipDraft.distributions[uid]!==undefined)delete tipDraft.distributions[uid];
  else tipDraft.distributions[uid]=0;
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function setTipFor(uid,v){tipDraft.distributions[uid]=parseInt(v)||0;recalcTips()}
function calcTipPlan(){
  const total=parseInt(tipDraft.total)||0;
  const ids=Object.keys(tipDraft.distributions).map(function(x){return parseInt(x)});
  const cnt=ids.length;
  if(tipDraft.mode==='equal'){
    const per=cnt>0?Math.floor(total/cnt):0;
    return {cnt:cnt,total:total,per:per,sum:per*cnt};
  } else {
    let s=0;ids.forEach(function(u){s+=parseInt(tipDraft.distributions[u])||0});
    return {cnt:cnt,total:s,per:0,sum:s};
  }
}
function recalcTips(){
  const calc=calcTipPlan();
  const s=document.getElementById('tpSummary');if(s)s.innerHTML=tipSummaryInner(calc);
  const bt=document.getElementById('bot');if(bt)bt.innerHTML=tipButtonInner(calc);
}
function saveTips(){
  const calc=calcTipPlan();
  if(calc.cnt===0||calc.sum<=0)return;
  // Dağıtım planı: {uid:amount}
  const dist={};
  if(tipDraft.mode==='equal'){
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=calc.per});
  } else {
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=parseInt(tipDraft.distributions[u])||0});
  }
  const payload={action:'tip_distribute',distributions:dist,note:(tipDraft.note||'').trim(),total:calc.sum,mode:tipDraft.mode};
  toast('💝 Чаевые розданы · '+calc.cnt+' чел.');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  tipDraft={total:'',distributions:{},note:'',mode:'equal'};
  mView='main';render();
}

// ─── Geçmiş temizleme (owner) — bot tarafında silinir ───
function _clrSend(payload){
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('clr send',e)}}
}
function clrTypes(){var a=[];document.querySelectorAll('.clr-type:checked').forEach(function(c){a.push(c.value)});return a;}
function clrHistAll(){
  var types=clrTypes();if(!types.length){toast('Отметьте хотя бы одно');return}
  var msg='Удалить отмеченное ('+types.length+' видов) НАВСЕГДА? Это НЕЛЬЗЯ отменить.';
  if(tg&&tg.showConfirm){tg.showConfirm(msg,function(ok){if(ok)_clrSend({action:'clear_history',mode:'all',types:types})})}
  else if(confirm(msg)){_clrSend({action:'clear_history',mode:'all',types:types})}
}
function clrHistBefore(){
  var el=document.getElementById('clrDate');var val=el?el.value:'';
  if(!val){toast('Выберите дату');return}
  var types=clrTypes();if(!types.length){toast('Отметьте хотя бы одно');return}
  var msg='Удалить отмеченное ДО '+val+'? Это НЕЛЬЗЯ отменить.';
  if(tg&&tg.showConfirm){tg.showConfirm(msg,function(ok){if(ok)_clrSend({action:'clear_history',mode:'before',date:val,types:types})})}
  else if(confirm(msg)){_clrSend({action:'clear_history',mode:'before',date:val,types:types})}
}

function savePrice(drinkId){
  const el=document.getElementById('pr_'+drinkId);
  if(!el)return;
  const amount=parseInt(el.value)||0;
  if(amount<0){toast('❌ Неверная сумма');return}
  const drink=DRINK_LIST.find(function(x){return x.id===drinkId});
  if(drink)drink.r=amount;
  PRICES[drinkId]=amount;
  toast('💰 Цена сохранена');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'price_update',drink_id:drinkId,amount:amount}))}catch(e){console.warn(e)}}
}

function approveUser(uid,name){
  if(!confirm('Принять '+(name||'')+' в команду?\nПосле этого задайте пароль для входа.'))return;
  PENDING=(PENDING||[]).filter(function(p){return p.id!==uid});
  toast('✅ Принят — задайте пароль');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'approve_user',target:uid}))}catch(e){console.warn(e)}}
  render();
}
function unapproveUser(uid,name){
  if(!confirm('Убрать '+(name||'')+' из баристов?\nВернётся в «Новые заявки», доступ закроется.'))return;
  var b=(BARISTAS||[]).find(function(x){return x.id===uid});
  if(b){PENDING=PENDING||[];PENDING.unshift({id:uid,n:b.n,u:b.u,at:new Date().toISOString()});BARISTAS=BARISTAS.filter(function(x){return x.id!==uid});}
  toast('↩️ Возвращён в заявки');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'unapprove_user',target:uid}))}catch(e){console.warn(e)}}
  render();
}
function rejectUser(uid,name){
  if(!confirm('Отклонить заявку '+(name||'')+'?\nПользователь будет удалён.'))return;
  PENDING=(PENDING||[]).filter(function(p){return p.id!==uid});
  toast('🗑 Заявка отклонена');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'reject_user',target:uid}))}catch(e){console.warn(e)}}
  render();
}
function saveDisplayName(uid){
  const el=document.getElementById('nm_'+uid);
  if(!el)return;
  const name=(el.value||'').trim();
  if(!name){toast('❌ Имя не может быть пустым');return}
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.dn=name;t.n=name}
  toast('📝 Имя сохранено');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'rename_user',target:uid,name:name}))}catch(e){console.warn(e)}}
}

// ── Şifre yönetimi (owner) ──
function setBaristaPassword(uid){
  const el=document.getElementById('pw_'+uid);
  if(!el)return;
  const pwd=(el.value||'').trim();
  if(pwd.length<3){toast('❌ Пароль слишком короткий (мин 3 символа)');return}
  if(/\s/.test(pwd)){toast('❌ Пароль не должен содержать пробелы');return}
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.pw=1;t.auth=0}  // optimistik
  toast('🔐 Пароль установлен. Передайте бариста.');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'set_password',target:uid,password:pwd}))}catch(e){console.warn(e)}}
}

function clearBaristaPassword(uid,nm){
  if(!confirm('Удалить пароль для «'+(nm||'этого бариста')+'»?\nЕго доступ будет закрыт.'))return;
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.pw=0;t.auth=0}
  toast('🗑 Пароль удалён');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'clear_password',target:uid}))}catch(e){console.warn(e)}}
}

// ── Kullanıcı kaldırma (owner) — iki seçenekli: ARŞİV veya SİL ──
function removeUser(uid,nm,sc,fc){
  const hasData=(sc||0)+(fc||0)>0;
  const dataLine=hasData?('\n📊 У него: смен '+(sc||0)+', штрафов '+(fc||0)+'.\n'):'\n';
  // 1. ekran: ne yapacağını sor
  // confirm() sadece OK/Cancel — bu yüzden önce arşiv soruyoruz, "İptal"
  // dersen kalıcı silmeyi soruyoruz, ona da iptal dersen iptal.
  const ask1='Что сделать с «'+(nm||'?')+'»?'+dataLine
    +'\n✅ OK — 📦 Архивировать (история сохранится, доступ закрыт)'
    +'\n❌ Отмена — выбрать другой вариант';
  if(confirm(ask1)){
    // ARŞİV
    archiveUserConfirmed(uid,nm);
    return;
  }
  // 2. ekran: kalıcı sil mi yoksa iptal mi?
  const ask2='🗑 Удалить НАВСЕГДА «'+(nm||'?')+'»?'+dataLine
    +(hasData?'\n⚠️ Все данные будут стёрты БЕЗВОЗВРАТНО.\n':'')
    +'\n✅ OK — удалить навсегда'
    +'\n❌ Отмена — ничего не делать';
  if(!confirm(ask2))return;
  // Veri varsa ekstra ikinci doğrulama
  if(hasData){
    if(!confirm('Точно удалить «'+(nm||'?')+'» БЕЗ ВОЗМОЖНОСТИ ВОССТАНОВЛЕНИЯ?\nИстория ('+(sc||0)+' смен, '+(fc||0)+' штрафов) исчезнет.'))return;
  }
  deleteUserConfirmed(uid,nm,hasData);
}

function archiveUserConfirmed(uid,nm){
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.arch=1;t.auth=0;t.arch_at=new Date().toISOString()}
  toast('📦 «'+(nm||'?')+'» в архиве');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'archive_user',target:uid}))}catch(e){console.warn(e)}}
  render();
}

function restoreUser(uid,nm){
  if(!confirm('♻️ Вернуть «'+(nm||'?')+'» из архива?\nНе забудьте задать пароль для доступа.'))return;
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.arch=0;t.arch_at=''}
  toast('♻️ Восстановлен');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'unarchive_user',target:uid}))}catch(e){console.warn(e)}}
  render();
}

// Arşivden kalıcı silme (zaten arşivde)
function deleteUserPermanent(uid,nm,sc,fc){
  const hasData=(sc||0)+(fc||0)>0;
  const msg='🗑 Удалить «'+(nm||'?')+'» БЕЗ ВОЗВРАТА?\n'
    +(hasData?'\n⚠️ Останется в логах действий, но смены/штрафы/выплаты исчезнут.\n':'')
    +'\nПродолжить?';
  if(!confirm(msg))return;
  if(hasData){
    if(!confirm('Точно? Это действие НЕОБРАТИМО.'))return;
  }
  deleteUserConfirmed(uid,nm,hasData);
}

function deleteUserConfirmed(uid,nm,hasData){
  for(let i=BARISTAS.length-1;i>=0;i--){if(BARISTAS[i].id===uid)BARISTAS.splice(i,1)}
  toast('🗑 Удалён навсегда');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){
    try{tg.sendData(JSON.stringify({action:'delete_user',target:uid,confirm_with_data:hasData?1:0}))}catch(e){console.warn(e)}
  }
  render();
}

function saveDessert(id){
  const ic=(document.getElementById('dic_'+id)||{}).value||'🍮';
  const lb=((document.getElementById('dlb_'+id)||{}).value||'').trim();
  const pr=parseInt((document.getElementById('dpr_'+id)||{}).value)||0;
  if(!lb){toast('❌ Название обязательно');return}
  if(pr<0){toast('❌ Неверная цена');return}
  // Optimistik güncelle
  const d=DESSERT_CAT.find(function(x){return x.id===id});
  if(d){d.icon=ic;d.label=lb;d.price=pr}
  const dl=DESSERT_LIST.find(function(x){return x.id===id});
  if(dl){dl.c=ic;dl.l=lb;dl.r=pr}
  persistDesserts();  // localStorage'a yaz — app kapanırsa veri kaybolmasın
  toast('💾 Десерт сохранён');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_save',id:id,label:lb,icon:ic,price:pr,active:1}))}catch(e){console.warn(e)}}

}

function deleteDessert(id){
  const d=DESSERT_CAT.find(function(x){return x.id===id});
  if(!d)return;
  if(!confirm('🗑 Удалить десерт «'+(d.label||id)+'» из каталога?\n\nЕго больше не будет ни у баристов, ни у вас.\nИстория старых смен сохранится.'))return;
  // Hem owner katalog listesinden hem aktif listeden çıkar (artık tamamen silinmiş gibi)
  for(let i=DESSERT_CAT.length-1;i>=0;i--){if(DESSERT_CAT[i].id===id)DESSERT_CAT.splice(i,1)}
  for(let i=DESSERT_LIST.length-1;i>=0;i--){if(DESSERT_LIST[i].id===id)DESSERT_LIST.splice(i,1)}
  persistDesserts();  // localStorage'a yaz
  toast('🗑 Удалён');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_delete',id:id}))}catch(e){console.warn(e)}}
  render();
}

// Cyrillic → latin transliteration (id otomatik üretmek için)
function translit(s){
  const map={
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z',
    'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
    'с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch',
    'ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
  };
  let out='';
  for(const ch of (s||'').toLowerCase()){
    if(map[ch]!==undefined)out+=map[ch];
    else if(/[a-z0-9]/.test(ch))out+=ch;
    else if(ch===' '||ch==='-'||ch==='_')out+='_';
    // diğer karakterleri atla
  }
  // Birden fazla _ olmasın
  out=out.replace(/_+/g,'_').replace(/^_|_$/g,'');
  return out||'item';
}

function addNewDessert(){
  const ic=((document.getElementById('ndIc')||{}).value||'🍮').trim()||'🍮';
  const lb=((document.getElementById('ndLb')||{}).value||'').trim();
  const pr=Math.max(0,parseInt((document.getElementById('ndPr')||{}).value)||500);
  if(!lb){toast('❌ Введите название');return}
  // id otomatik: isimden transliteration
  let id=translit(lb);
  // Eğer aynı id varsa numaralandır: tiramisu, tiramisu_2, tiramisu_3...
  let base=id,n=2;
  while(DESSERT_CAT.some(function(x){return x.id===id})){
    id=base+'_'+n;n++;
  }
  // Optimistik
  const newD={id:id,label:lb,icon:ic,price:pr,sort_order:50,active:1};
  DESSERT_CAT.push(newD);
  DESSERT_LIST.push({id:id,l:lb,c:ic,r:pr,active:true});
  persistDesserts();  // localStorage'a yaz — app kapanırsa veri kaybolmasın
  // Inputları temizle
  ['ndIc','ndLb'].forEach(function(x){const el=document.getElementById(x);if(el)el.value=''});
  const pe=document.getElementById('ndPr');if(pe)pe.value='500';
  toast('➕ Добавлен: '+ic+' '+lb);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_save',id:id,label:lb,icon:ic,price:pr,active:1}))}catch(e){console.warn(e)}}
  render();
}

function rtMakeFact(){var f=rtPick(RT_FACTS);return{type:'fact',text:f.q,opts:rtShuffle(f.o),correct:f.a,hint:f.h||'Стандарт Caffelito',diff:(f.d||2)};}

    if(wrongs.length<3){const extra=rtShuffle(rtPool().filter(x=>x!==correct&&!wrongs.includes(x))).slice(0,3-wrongs.length);wrongs.push(...extra);}

function saveLastExam(d){try{localStorage.setItem(RT_EXAM_KEY,JSON.stringify(d))}catch(e){}}
function rtBuildExam(){
  // 30 soru: 40% Q1 (basit), 30% Q2 (что не входит), 30% Q3 (provokasyon)
  const qs=[];
  for(let i=0;i<30;i++){
    if(Math.random()<0.4){qs.push(rtMakeFact());continue;} // %40 bilgi sorusu (saklama/standart/...)
    const r=Math.random();
    let type='q1';
    if(r<0.4)type='q1';else if(r<0.7)type='q2';else type='q3';
    qs.push(rtMakeQ(type));
  }
  return qs;
}
function rtStartExam(){
  const last=getLastExam();
  if(last&&new Date(last.date).toDateString()===new Date().toDateString()){
    if(typeof toast==='function')toast('⏳ Уже сдавали сегодня — приходите завтра');
    return;
  }
  rtClearTimer();
  RT={mode:'exam',level:0,qs:rtBuildExam(),idx:0,correct:0,xp:0,streak:0,maxStreak:0,hearts:99,answered:false,pickedIdx:-1,done:false,total:30,ready:true,timeBonus:0,lastGain:0,lastSpeed:0,timedOut:false,timePerQ:15,timeLeft:15,examPass:90};
  render();
}
function rtStartExamTimer(){
  rtClearTimer();
  if(!RT)return;
  RT.timePerQ=(RT.mode==='exam')?15:10;RT.timeLeft=RT.timePerQ;RT.qStartedAt=Date.now();
  RT_TIMER=setInterval(function(){
    if(!RT||RT.answered||RT.done){rtClearTimer();return}
    RT.timeLeft=Math.max(0,RT.timePerQ-Math.floor((Date.now()-RT.qStartedAt)/1000));
    rtUpdateTimerDom();
    if(RT.timeLeft<=0){rtTimeout();return}
  },250);
}
function rtBegin(){
  if(!RT)return;
  RT.ready=false;
  if(RT.mode==='exam')rtStartExamTimer();else rtStartTimer();
  render();
}
function rtAbort(){rtClearTimer();RT=null;render();}
function showBonusFly(txt){
  try{
    const el=document.createElement('div');
    el.className='rt-bonus-fly';el.textContent=txt;
    document.body.appendChild(el);
    setTimeout(function(){el.remove()},900);
  }catch(e){}
}
function rtAnswer(i){
  if(!RT||RT.answered)return;
  rtClearTimer();
  RT.answered=true;RT.pickedIdx=i;RT.timedOut=false;
  const q=RT.qs[RT.idx],ok=q.opts[i]===q.correct;
  const elapsed=Math.min(10,(Date.now()-RT.qStartedAt)/1000);
  const speedSec=Math.max(0,10-elapsed); // hızlı cevap → daha çok puan
  if(ok){
    const base=10;
    const speedBonus=Math.round(speedSec*2); // max ~20 ekstra (10s × 2)
    const gain=base+speedBonus;
    RT.correct++;RT.xp+=gain;RT.lastGain=gain;RT.lastSpeed=Math.round(speedSec);
    RT.timeBonus+=speedBonus;
    RT.streak++;if(RT.streak>RT.maxStreak)RT.maxStreak=RT.streak;
    if(tg)tg.HapticFeedback?.notificationOccurred('success');
    showBonusFly('+'+gain);
  }
  else{RT.streak=0;RT.hearts=Math.max(0,RT.hearts-1);if(tg)tg.HapticFeedback?.notificationOccurred('error');}
  render();
}
function rtNext(){
  if(!RT)return;
  rtClearTimer();
  // Exam modu: can yok, sadece soru bittiğinde biter
  if(RT.mode!=='exam'&&RT.hearts<=0){RT.done=true;finishGame();render();return;}
  RT.idx++;RT.answered=false;RT.pickedIdx=-1;RT.timedOut=false;
  if(RT.idx>=RT.qs.length){RT.done=true;finishGame();}
  else{
    if(RT.mode==='exam')rtStartExamTimer();else rtStartTimer();
  }
  render();
}
/* ═══════════════════════════════════════
   РЕЗОФИЦИАЛЬНЫЙ ЗАЧЁТ — Remote Exam (FS)
   ═══════════════════════════════════════ */
const OKK_INSPECTIONS=[
  'корпус эспрессо-машины (чистота, без трещин)',
  'холдеры (все на месте, чистые)',
  'питчеры для молока (чистые, без накипи)',
  'темпер для кофе',
  'кофемолку и зону вокруг неё',
  'холодильник внутри',
  'витрину с круассанами',
  'льдогенератор внутри',
  'раковину и зону мойки',
  'полотенца для рук',
  'рабочую поверхность бара',
  'пол под оборудованием'
];
let EX=null;       // active exam state
let EX_TIMER=null;
function examInvite(barId,name){
  if(!confirm('Назначить зачёт для '+name+'?\n\nОн получит уведомление и должен открыть приложение.'))return;
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'exam_invite',target:barId}));}catch(e){console.warn(e)}}
  toast('🎓 Приглашение отправлено');
}
function certRevoke(barId,name){
  if(!confirm('Отозвать сертификат у '+name+'?\n\nБариста перестанет считаться сертифицированным и сможет пройти экзамен заново. Уже выплаченную премию это не возвращает.'))return;
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'cert_revoke',target:barId}));}catch(e){console.warn(e)}}
  toast('🔁 Сертификат отозван');
}
function examShouldOpen(){
  return PENDING_EXAM&&PENDING_EXAM.id&&!sessionStorage.getItem('exam_done_'+PENDING_EXAM.id);
}
function examBuild(){
  // СЕРТИФИКАЦИОННЫЙ ЭКЗАМЕН — 100 вопросов, адаптивная сложность (легко → сложно).
  // 90 bilgi sorusu: 30×лёгкий(d1) → 28×средний(d2) → 32×сложный/ловушки(d3) — SIRALI (gittikçe zorlaşır)
  // + 10 фото-проверок, серпиştirilmiş во вторую половину.
  const plan=[];
  for(let i=0;i<30;i++)plan.push(1);
  for(let i=0;i<28;i++)plan.push(2);
  for(let i=0;i<32;i++)plan.push(3);
  const recent=[];
  const know=plan.map(function(d){
    let q,tries=0;
    do{ q=(Math.random()<0.5)?rtMakeFactD(d):rtMakeQD(d); tries++; }
    while(tries<8 && recent.indexOf(q.text)>=0);
    recent.push(q.text); if(recent.length>14)recent.shift();
    return q;
  });
  // Фото-проверки (уникальные цели)
  const photoN=Math.min(10,OKK_INSPECTIONS.length);
  const used=new Set(),photos=[];
  while(photos.length<photoN){const t=OKK_INSPECTIONS[Math.floor(Math.random()*OKK_INSPECTIONS.length)];if(!used.has(t)){used.add(t);photos.push({kind:'photo',target:t,diff:2});}}
  // know уже отсортирован легко→сложно; фото равномерно с 50-го вопроса (вставляем с конца, чтобы не сбить порядок)
  const all=know.slice();
  for(let i=photos.length-1;i>=0;i--){
    const pos=Math.min(all.length,50+Math.round(i*(all.length-50)/Math.max(1,photos.length)));
    all.splice(pos,0,photos[i]);
  }
  return all; // ~100 вопросов
}
function examOpen(){
  if(!PENDING_EXAM)return;
  EX={inviteId:PENDING_EXAM.id,by:PENDING_EXAM.by,phase:'preflight',pre:{battery:false,camera:false,shift:false},certName:(MY_NAME||''),qs:[],idx:0,correct:0,answered:false,pickedIdx:-1,timeLeft:0,timePerQ:10,qStartedAt:0,timedOut:false,results:[],photos:{}};
  document.getElementById('exam-fs').classList.add('on');
  document.body.style.overflow='hidden';
  if(tg&&tg.expand)try{tg.expand()}catch(e){}
  if(tg&&tg.requestFullscreen)try{tg.requestFullscreen()}catch(e){}
  if(tg&&tg.disableClosingConfirmation)try{tg.disableClosingConfirmation()}catch(e){}
  if(tg&&tg.enableClosingConfirmation)try{tg.enableClosingConfirmation()}catch(e){}
  examRender();
}
function examClose(){
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  document.getElementById('exam-fs').classList.remove('on');
  document.body.style.overflow='';
  EX=null;
  if(PENDING_EXAM){sessionStorage.setItem('exam_done_'+PENDING_EXAM.id,'1');PENDING_EXAM=null;}
  render();
}
function examRender(){
  const fs=document.getElementById('exam-fs');if(!EX){fs.classList.remove('on');return}
  let h='<div class="ex-head"><div><div class="ex-brand">CAFFELITO · ЗАЧЁТ</div><div class="ex-byname">От: '+escH(EX.by||'Шеф')+'</div></div><div class="ex-locked">🔒 НЕ ЗАКРЫВАТЬ</div></div>';
  if(EX.phase==='preflight'){
    h+='<div class="ex-pre">';
    h+='<div class="ex-pre-ic">🎓</div>';
    h+='<div class="ex-pre-t">Зачётная сессия</div>';
    h+='<div class="ex-pre-by">Подтвердите готовность</div>';
    h+='<div style="width:100%;max-width:380px;margin:6px auto 0;text-align:left">'
      +'<div style="font-size:12px;color:rgba(255,255,255,.7);margin-bottom:5px">Ваше имя и фамилия (для сертификата)</div>'
      +'<input id="exName" type="text" value="'+escH(EX.certName||'')+'" oninput="EX.certName=this.value;exUpdateGate()" placeholder="например: Хасан Каримов" autocomplete="name" style="width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;font-family:inherit;font-size:14px;outline:none"></div>';
    h+='<div class="ex-check-list">';
    h+='<label class="ex-check '+(EX.pre.battery?'ok':'')+'"><input type="checkbox" '+(EX.pre.battery?'checked':'')+' onclick="EX.pre.battery=this.checked;examRender()"><span>🔋 Заряд телефона ≥ 50%</span></label>';
    h+='<label class="ex-check '+(EX.pre.camera?'ok':'')+'"><input type="checkbox" '+(EX.pre.camera?'checked':'')+' onclick="EX.pre.camera=this.checked;examRender()"><span>📷 Камера и интернет работают</span></label>';
    h+='<label class="ex-check '+(EX.pre.shift?'ok':'')+'"><input type="checkbox" '+(EX.pre.shift?'checked':'')+' onclick="EX.pre.shift=this.checked;examRender()"><span>🟢 Я нахожусь в смене</span></label>';
    h+='</div>';
    const ready=EX.pre.battery&&EX.pre.camera&&EX.pre.shift&&(EX.certName||'').trim().length>=2;
    h+='<button id="exGoBtn" class="ex-go" '+(ready?'':'disabled')+' onclick="examBegin()">Начать зачёт ▸</button>';
    h+='<div id="exNameWarn" style="font-size:11px;color:#fca5a5;margin-top:8px;text-align:center;display:'+((EX.certName||'').trim().length<2?'block':'none')+'">Введите имя — оно появится на сертификате</div>';
    h+='<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:14px;text-align:center;line-height:1.5">После начала экран нельзя закрыть.<br>100 вопросов · сложность растёт · бил. (10 сек) + фото (30 сек)<br><b style="color:#ffd257">Приз 1 000 000 — только за 100% (без единой ошибки)</b></div>';
    h+='</div>';
  } else if(EX.phase==='question'){
    const q=EX.qs[EX.idx],pct=(EX.idx/EX.qs.length)*100;
    const timerCls=EX.timeLeft<=2?'danger':(EX.timeLeft<=4?'warn':'');
    const tFillPct=(EX.timeLeft/EX.timePerQ)*100;
    h+='<div class="ex-q-bar"><span class="ex-q-idx">'+(EX.idx+1)+' / '+EX.qs.length+'</span><div class="ex-q-prog"><div class="ex-q-fill" style="width:'+pct+'%"></div></div><span class="ex-q-idx" id="exTNum"><span class="ex-timer-num '+timerCls+'" style="font-size:18px">'+EX.timeLeft+'с</span></span></div>';
    h+='<div class="ex-timer-bar"><div class="ex-timer-fill '+timerCls+'" id="exTFill" style="width:'+tFillPct+'%"></div></div>';
    if(q.kind==='know'){
      h+='<div class="ex-card"><div class="ex-kind">Вопрос знаний</div><div class="ex-text">'+q.text+'</div></div>';
      h+='<div class="ex-opts">';
      q.opts.forEach(function(opt,i){
        let cls='ex-opt';
        if(EX.answered){cls+=' disabled';if(opt===q.correct)cls+=EX.pickedIdx===i?' correct':' reveal';else if(EX.pickedIdx===i)cls+=' wrong';}
        h+='<div class="'+cls+'" onclick="'+(EX.answered?'':'examAnswer('+i+')')+'">'+opt+'</div>';
      });
      h+='</div>';
      if(EX.answered){
        const ok=q.opts[EX.pickedIdx]===q.correct;
        h+='<div class="ex-fb '+(ok?'ok':'no')+'">'+(ok?'✓ Верно':(EX.timedOut?'⏱ Время вышло. Правильно: '+q.correct:'✗ Правильно: '+q.correct))+'</div>';
        h+='<button class="ex-next" onclick="examNext()">'+(EX.idx+1>=EX.qs.length?'Завершить':'Дальше')+' ▸</button>';
      }
    } else {
      // photo question
      h+='<div class="ex-card"><div class="ex-kind photo">📷 Фото-проверка</div><div class="ex-text">Сфотографируйте: <b>'+q.target+'</b></div><div class="ex-photo-prompt">Откройте камеру, сфотографируйте указанный объект и отправьте его в личные сообщения боту. После — нажмите кнопку ниже.</div>';
      if(EX.photos[EX.idx]){
        h+='<div class="ex-photo-preview"><img src="'+EX.photos[EX.idx]+'"></div>';
      }
      h+='</div>';
      if(!EX.answered){
        h+='<input class="ex-photo-input" id="exPhotoInput" type="file" accept="image/*" capture="environment" onchange="examPhotoCaptured(event)">';
        h+='<button class="ex-photo-btn" onclick="document.getElementById(\'exPhotoInput\').click()">📷 Открыть камеру</button>';
        if(EX.photos[EX.idx]){
          h+='<button class="ex-next" style="margin-top:8px" onclick="examPhotoConfirm()">✓ Я сфотографировал — далее</button>';
        }
      } else {
        h+='<div class="ex-fb ok">✓ Принято</div>';
        h+='<button class="ex-next" onclick="examNext()">'+(EX.idx+1>=EX.qs.length?'Завершить':'Дальше')+' ▸</button>';
      }
    }
  } else if(EX.phase==='done'){
    const total=EX.qs.length,score=Math.round(EX.correct/total*100),passed=score>=100;
    h+='<div class="ex-pre">';
    h+='<div class="ex-pre-ic">'+(passed?'🏆':'💪')+'</div>';
    h+='<div class="ex-pre-t" style="color:'+(passed?'#a7f3d0':'#fca5a5')+'">'+(passed?'Зачёт сдан':'Не сдан')+'</div>';
    h+='<div class="ex-pre-by">Результат: '+score+'% ('+EX.correct+'/'+total+')</div>';
    h+='<div style="font-size:12px;margin-top:8px;color:'+(passed?'#a7f3d0':'#fca5a5')+'">'+(passed?'🎉 Идеально! Приз 1 000 000 сум':'Для приза нужно 100% — без единой ошибки')+'</div>';
    if(passed){
      h+='<div style="max-width:540px;margin:18px auto 0">'+certOverlayHTML(EX.certName||MY_NAME,certDateStr())+'</div>';
    }
    h+='<button class="ex-go" style="margin-top:24px" onclick="examClose()">Закрыть</button>';
    h+='</div>';
  }
  fs.innerHTML=h;
}
function exUpdateGate(){
  if(!EX)return;
  var ready=EX.pre.battery&&EX.pre.camera&&EX.pre.shift&&(EX.certName||'').trim().length>=2;
  var b=document.getElementById('exGoBtn');if(b)b.disabled=!ready;
  var w=document.getElementById('exNameWarn');if(w)w.style.display=((EX.certName||'').trim().length<2)?'block':'none';
}
function examBegin(){
  EX.qs=examBuild();EX.phase='question';EX.idx=0;
  examStartTimer();examRender();
}
function examStartTimer(){
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  if(!EX)return;
  const q=EX.qs[EX.idx];
  EX.timePerQ=(q&&q.kind==='photo')?30:10;
  EX.timeLeft=EX.timePerQ;
  EX.qStartedAt=Date.now();
  EX_TIMER=setInterval(function(){
    if(!EX||EX.answered||EX.phase!=='question'){clearInterval(EX_TIMER);EX_TIMER=null;return}
    EX.timeLeft=Math.max(0,EX.timePerQ-Math.floor((Date.now()-EX.qStartedAt)/1000));
    // Sadece timer DOM'unu güncelle
    const tFill=document.getElementById('exTFill');
    if(tFill){
      tFill.style.width=((EX.timeLeft/EX.timePerQ)*100)+'%';
      tFill.classList.toggle('warn',EX.timeLeft<=Math.ceil(EX.timePerQ*0.4)&&EX.timeLeft>Math.ceil(EX.timePerQ*0.2));
      tFill.classList.toggle('danger',EX.timeLeft<=Math.ceil(EX.timePerQ*0.2));
    }
    const tNum=document.querySelector('#exTNum .ex-timer-num');
    if(tNum){
      tNum.textContent=EX.timeLeft+'с';
      tNum.classList.toggle('warn',EX.timeLeft<=Math.ceil(EX.timePerQ*0.4)&&EX.timeLeft>Math.ceil(EX.timePerQ*0.2));
      tNum.classList.toggle('danger',EX.timeLeft<=Math.ceil(EX.timePerQ*0.2));
    }
    if(EX.timeLeft<=0)examTimeout();
  },250);
}
function examTimeout(){
  if(!EX||EX.answered)return;
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  EX.answered=true;EX.timedOut=true;EX.pickedIdx=-1;
  EX.results.push({i:EX.idx,kind:EX.qs[EX.idx].kind,ok:false,timedOut:true});
  if(tg)tg.HapticFeedback?.notificationOccurred('error');
  examReportProgress(false);
  examRender();
}
function examAnswer(i){
  if(!EX||EX.answered||EX.phase!=='question')return;
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  EX.answered=true;EX.pickedIdx=i;EX.timedOut=false;
  const q=EX.qs[EX.idx],ok=q.opts[i]===q.correct;
  if(ok){EX.correct++;if(tg)tg.HapticFeedback?.notificationOccurred('success');}
  else if(tg)tg.HapticFeedback?.notificationOccurred('error');
  EX.results.push({i:EX.idx,kind:'know',ok:ok,timedOut:false});
  examReportProgress(ok);
  examRender();
}
function examPhotoCaptured(ev){
  const f=ev.target.files&&ev.target.files[0];if(!f||!EX)return;
  const reader=new FileReader();
  reader.onload=function(e){
    // küçük preview için sıkıştır
    const img=new Image();img.onload=function(){
      const c=document.createElement('canvas');
      const maxW=800,scale=Math.min(1,maxW/img.width);
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      EX.photos[EX.idx]=c.toDataURL('image/jpeg',0.7);
      examRender();
    };img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}
function examPhotoConfirm(){
  if(!EX||EX.answered)return;
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  EX.answered=true;
  EX.correct++; // fotoğraf teslim edildi varsayılır (Phase 2'de owner onayına bağlanacak)
  EX.results.push({i:EX.idx,kind:'photo',ok:true});
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  examReportProgress(true);
  examRender();
}
function examReportProgress(ok){
  if(!EX||!tg||!tg.sendData)return;
  // Owner'a anlık bildirim — bu sendData app'i kapatır, dolayısıyla Phase 1'de kullanmıyoruz.
  // Sadece sınav sonunda toplu raporlayacağız.
}
function examNext(){
  if(!EX)return;
  EX.idx++;EX.answered=false;EX.pickedIdx=-1;EX.timedOut=false;
  if(EX.idx>=EX.qs.length){
    EX.phase='done';
    examFinish();
  } else {
    examStartTimer();
  }
  examRender();
}
function examFinish(){
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  if(!EX)return;
  const total=EX.qs.length,score=Math.round(EX.correct/total*100),passed=score>=100;
  if(tg&&tg.sendData){
    try{tg.sendData(JSON.stringify({
      action:'exam_finish',invite_id:EX.inviteId,correct:EX.correct,total:total,score:score,passed:passed?1:0,name:(EX.certName||'').trim()
    }));}catch(e){console.warn('exam finish fail',e)}
  }
}

function finishGame(){
  const pct=Math.round(RT.correct/RT.total*100);
  if(RT.mode==='exam'){
    const passed=pct>=(RT.examPass||90);
    saveLastExam({date:new Date().toISOString(),score:pct,correct:RT.correct,total:RT.total,passed:passed?1:0});
    if(tg)tg.HapticFeedback?.notificationOccurred(passed?'success':'error');
    RT._sent=true;
    if(tg&&tg.sendData){
      try{tg.sendData(JSON.stringify({
        action:'rt_exam',correct:RT.correct,total:RT.total,score:pct,passed:passed?1:0
      }));}catch(e){console.warn('rt exam send fail',e);}
    }
    return;
  }
  const gs=getGameState(),cfg=RT_LEVELS[RT.level-1],passed=pct>=cfg.pass;
  gs.xp=(gs.xp||0)+RT.xp;
  if(RT.maxStreak>(gs.bestStreak||0))gs.bestStreak=RT.maxStreak;
  if(passed&&RT.level>=gs.level){gs.level=Math.min(RT_LEVELS.length,RT.level+1);gs.maxLevel=Math.max(gs.maxLevel||1,gs.level);}
  saveGameState(gs);
  if(tg)tg.HapticFeedback?.notificationOccurred(passed?'success':'warning');
  // Sunucuya gönder — owner analytics için kayıt
  RT._sent=true;
  if(tg&&tg.sendData){
    try{tg.sendData(JSON.stringify({
      action:'rt_session',level:RT.level,correct:RT.correct,total:RT.total,
      xp:RT.xp,maxStreak:RT.maxStreak,passed:passed?1:0
    }));}catch(e){console.warn('rt send fail',e);}
  }
}

render();
// Trenajör/sınav otomatik açılışı kaldırıldı (kullanıcı isteği).
</script>
