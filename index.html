<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Caffelito</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf8f4;--bg-rgb:250,248,244;--card:#fff;--card2:#f5f2ec;--card3:#ece8e0;--border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);--t1:#1a1a1a;--t2:#6b6356;--t3:#a69e92;--gold:#d4a020;--gold2:#c4941a;--gold-bg:rgba(212,160,32,.08);--gold-border:rgba(212,160,32,.2);--yellow:#f5d44b;--yellow-bg:rgba(245,212,75,.15);--yellow-border:rgba(245,212,75,.4);--green:#16a34a;--green-bg:rgba(22,163,74,.06);--green-border:rgba(22,163,74,.15);--red:#dc2626;--red-bg:rgba(220,38,38,.06);--r:14px;--r2:10px;--shadow:0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 4px 16px rgba(0,0,0,.08)}
[data-theme="dark"]{--bg:#0f1115;--bg-rgb:15,17,21;--card:#1a1d24;--card2:#22262f;--card3:#2a2f3a;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--t1:#f1f1f1;--t2:#b0b6c0;--t3:#7a8290;--gold:#e6b942;--gold2:#f0c45a;--gold-bg:rgba(230,185,66,.12);--gold-border:rgba(230,185,66,.25);--yellow:#f5d44b;--yellow-bg:rgba(245,212,75,.18);--yellow-border:rgba(245,212,75,.35);--green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.25);--red:#ef4444;--red-bg:rgba(239,68,68,.12);--shadow:0 1px 2px rgba(0,0,0,.4);--shadow-lg:0 4px 16px rgba(0,0,0,.5)}
/* ─── Dark mode: hardcoded açık renk override'ları ─── */
[data-theme="dark"] .badge-today{background:rgba(245,212,75,.18);color:#fde68a}
[data-theme="dark"] .badge-month{background:rgba(167,139,250,.2);color:#d8b4fe}
[data-theme="dark"] .sf-hours,[data-theme="dark"] .opt-r,[data-theme="dark"] .qv.editing,[data-theme="dark"] .set-input,[data-theme="dark"] .set-tab.on{background:var(--card2);color:var(--t1)}
[data-theme="dark"] .opt.on .opt-r::after{background:var(--gold)}
[data-theme="dark"] .act-dot{background:#fff;box-shadow:0 0 0 0 rgba(255,255,255,.5)}
[data-theme="dark"] .btn-end{background:var(--card2);color:#34d399}
[data-theme="dark"] .tg-sw::after{background:var(--card)}
[data-theme="dark"] .split-toggle{background:rgba(245,212,75,.1);color:var(--t1)}
[data-theme="dark"] [style*="background:#f8fafc"]{background:var(--card2)!important;color:var(--t1)}
[data-theme="dark"] [style*="background:#ecfdf5"]{background:rgba(34,197,94,.08)!important;border-color:rgba(34,197,94,.3)!important;color:var(--t1)}
[data-theme="dark"] [style*="background:#fefce8"]{background:rgba(245,212,75,.08)!important;color:var(--t1)}
[data-theme="dark"] [style*="border:1px dashed #cbd5e1"],[data-theme="dark"] [style*="border:2px dashed #cbd5e1"]{border-color:var(--border2)!important}
[data-theme="dark"] input,[data-theme="dark"] textarea,[data-theme="dark"] select{color-scheme:dark}
[data-theme="dark"] input[type="number"],[data-theme="dark"] input[type="text"],[data-theme="dark"] input[type="time"],[data-theme="dark"] textarea{background:var(--card2);color:var(--t1);border-color:var(--border2)}
/* ── Salary card: dark mode'da sarı kalsın ama yazılar siyah/koyu olsun ── */
[data-theme="dark"] .sal-card{background:linear-gradient(135deg,#fde68a,#facc15 50%,#f59e0b);border:1px solid #ca8a04;box-shadow:0 4px 24px rgba(250,204,21,.35)}
[data-theme="dark"] .sal-card::before{background:radial-gradient(circle,rgba(0,0,0,.08),transparent 70%)}
[data-theme="dark"] .sal-amount,[data-theme="dark"] .sal-period,[data-theme="dark"] .sal-amount-sub{color:#1a1a1a!important;opacity:1}
[data-theme="dark"] .sal-amount-sub{opacity:.75}
[data-theme="dark"] .sal-stat{background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.08)}
[data-theme="dark"] .sal-stat-v{color:#1a1a1a!important}
[data-theme="dark"] .sal-stat-l{color:#6b6356!important;opacity:1}
[data-theme="dark"] .sal-stat-v.red{color:#dc2626!important}
.card,.set-row,.opt,.hist,.alert,.btn-end{transition:background .3s ease,border-color .3s ease,color .3s ease}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;padding-bottom:120px;-webkit-font-smoothing:antialiased;transition:background .3s ease,color .3s ease}
.hdr{position:sticky;top:0;z-index:100;background:rgba(var(--bg-rgb),.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);transition:background .3s ease,border-color .3s ease}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{width:38px;height:38px;background:var(--yellow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#1a1a1a;overflow:hidden;transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s ease;cursor:pointer;position:relative;box-shadow:0 0 0 0 var(--gold);transform:none}
.brand-logo img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;-webkit-user-drag:none}
/* Hover/active sadece gerçek mouse'lu cihazlarda — dokunmatik ekranda sticky kalmasın */
@media (hover:hover) and (pointer:fine){
  .brand-logo:hover{transform:scale(1.08) rotate(-3deg);box-shadow:0 0 0 3px var(--gold-border)}
  .brand-logo::after{content:'';position:absolute;inset:-4px;border-radius:14px;border:2px dashed var(--gold);opacity:0;transform:scale(.8);transition:all .3s ease;pointer-events:none}
  .brand-logo:hover::after{opacity:.5;transform:scale(1)}
}
/* Tıklama anında bir kez dönen animasyon — bittikten sonra nötr pozisyona döner */
@keyframes logoSpin{0%{transform:scale(1) rotate(0)}30%{transform:scale(.94) rotate(8deg)}60%{transform:scale(1.1) rotate(-12deg)}100%{transform:scale(1) rotate(0)}}
.brand-logo.spin{animation:logoSpin .55s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes themeFlash{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(2.5)}}
.theme-flash{position:fixed;top:30px;left:30px;width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);pointer-events:none;z-index:9999;animation:themeFlash .6s ease-out forwards}
.brand-name{font-size:18px;font-weight:800;letter-spacing:-.3px}
.brand-name .caffe{color:var(--yellow)}
.brand-name .lito{color:var(--t1)}
.clock-box{display:flex;align-items:center;gap:10px}
.clock-wrap{text-align:right}
.clock{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.clock-day{font-size:10px;color:var(--t2);font-weight:500}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border2);background:var(--card);color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn.on{background:var(--yellow);border-color:var(--gold-border);color:var(--t1)}
.tabs{display:flex;padding:0 16px;gap:2px}
.tab{flex:1;padding:10px 4px 12px;text-align:center;font-size:11px;font-weight:700;color:var(--t3);border-bottom:2.5px solid transparent;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.tab.on{color:var(--gold2);border-bottom-color:var(--gold)}
.wrap{padding:14px 18px}
.alert{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;font-size:12px;font-weight:500;line-height:1.5}
.alert b{font-weight:700}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px 18px;margin-bottom:8px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:space-between}
.card:active{transform:scale(.985);background:var(--card2)}
.card.today-card{background:var(--yellow-bg);border:2px solid var(--gold);box-shadow:0 4px 16px rgba(212,160,32,.15)}
.card.today-card .card-title{color:var(--gold2)}
.card-left{display:flex;align-items:center;gap:13px;flex:1;min-width:0}
.card-icon{width:40px;height:40px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.card-icon.today-icon{background:var(--yellow);font-size:20px}
.card-info{min-width:0}
.card-title{font-size:14px;font-weight:700}
.card-sub{font-size:11px;color:var(--t3);margin-top:2px;font-weight:500}
.card-right{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}
.badge-gold{background:var(--gold-bg);color:var(--gold2);border:1px solid var(--gold-border)}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-today{background:#fef3c7;color:#92400e;font-size:10px;padding:3px 7px;border-radius:6px}
.badge-week{background:#dbeafe;color:#1e40af;font-size:10px;padding:3px 7px;border-radius:6px}
.badge-month{background:#ede9fe;color:#5b21b6;font-size:10px;padding:3px 7px;border-radius:6px}
.badge-today-big{background:var(--yellow);color:var(--t1);font-size:10px;font-weight:800;padding:3px 10px;border-radius:6px;border:1px solid var(--gold)}
.arrow{color:var(--t3);font-size:18px;font-weight:300}
.item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;margin-bottom:5px;transition:all .15s}
.item.has{border-color:var(--gold-border);background:var(--yellow-bg)}
.item-left{flex:1;min-width:0;padding-right:10px}
.item-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-note{font-size:10px;color:var(--t3);margin-top:2px;font-style:italic}
.qty-box{display:flex;align-items:center;gap:3px}
.qb{width:34px;height:34px;border-radius:9px;border:none;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qb:active{transform:scale(.88)}.qb.m{background:var(--card2);color:var(--t2)}.qb.p{background:var(--yellow);color:var(--t1)}
.qv{min-width:30px;text-align:center;font-size:15px;font-weight:800;color:var(--gold2)}.qv.z{color:var(--t3);font-weight:500;font-size:13px}
.task{display:flex;align-items:flex-start;gap:13px;background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.task:active{background:var(--card2)}.task.done{background:var(--green-bg);border-color:var(--green-border)}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--card3);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:12px;font-weight:700;transition:all .2s}
.task.done .chk{background:var(--green);border-color:var(--green);color:#fff}
.task-body{flex:1;min-width:0}
.task-t{font-size:13px;font-weight:600;line-height:1.35}.task.done .task-t{color:var(--t3);text-decoration:line-through}
.task-d{font-size:11px;color:var(--t3);margin-top:3px;line-height:1.45}.task.done .task-d{opacity:.3}
.prog{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:12px}
.prog-top{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-label{font-size:13px;font-weight:600}.prog-num{font-size:13px;font-weight:700;color:var(--gold2)}
.pbar{height:5px;background:var(--card3);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold2),var(--yellow));transition:width .4s}.pfill.ok{background:linear-gradient(90deg,var(--green),#4ade80)}
.back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;font-size:12px;font-weight:600;border-radius:9px;background:var(--card);border:1px solid var(--border);color:var(--t2);cursor:pointer;margin-bottom:12px;font-family:inherit}
.bottom{position:fixed;bottom:0;left:0;right:0;padding:0 18px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 25%);z-index:100}
.mbtn{width:100%;padding:15px;border-radius:var(--r);border:none;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;background:var(--yellow);color:var(--t1);box-shadow:0 4px 20px rgba(212,160,32,.2)}
.mbtn:active{transform:scale(.98)}.mbtn:disabled{opacity:.2;cursor:not-allowed;box-shadow:none}
.mbtn.grn{background:var(--green);color:#fff;box-shadow:0 4px 20px rgba(22,163,74,.2)}
.add-row{display:flex;gap:7px;margin-bottom:12px}
.add-inp{flex:1;padding:11px 14px;border-radius:var(--r2);border:1px solid var(--border2);background:var(--card);color:var(--t1);font-family:inherit;font-size:13px;font-weight:500;outline:none}
.add-inp:focus{border-color:var(--gold)}.add-inp::placeholder{color:var(--t3)}
.add-btn{padding:11px 16px;border-radius:var(--r2);border:none;background:var(--yellow);color:var(--t1);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer}
.xbtn{width:26px;height:26px;border-radius:6px;border:1px solid rgba(220,38,38,.15);background:var(--red-bg);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mvbtn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border2);background:var(--card2);color:var(--t2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.edit-btns{display:flex;gap:3px;margin-left:6px}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:10px}
.rcard h3{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:10px}
.rtime{font-size:11px;color:var(--t3);margin-bottom:8px}
.rline{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;font-weight:500;border-bottom:1px solid var(--border)}.rline:last-child{border-bottom:none}.rline span:last-child{font-weight:700}
.empty{text-align:center;padding:50px 20px}.empty p{color:var(--t3);font-size:14px;margin-top:12px}
.sec{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 8px}
.sec.sec-today{color:var(--gold2);font-size:11px}
.footer{text-align:center;padding:20px;font-size:10px;font-weight:600;color:var(--card3);letter-spacing:3px;margin-top:20px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--green);color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;font-weight:700;z-index:300;transition:transform .35s;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.toast.show{transform:translateX(-50%) translateY(0)}
.ord-preview{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:8px;max-height:130px;overflow-y:auto}
.ord-preview-title{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.ord-line{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.ord-line:last-child{border-bottom:none}
.ord-line-name{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-right:8px}
.ord-line-qty{font-weight:800;color:var(--gold2);flex-shrink:0}
/* ─── Зарплата (Salary) ─── */
.sal-card{background:linear-gradient(135deg,#fef3c7,#fef9c3 50%,#fde68a);border-radius:18px;padding:22px 20px;margin-bottom:14px;border:1px solid var(--gold-border);box-shadow:0 4px 24px rgba(212,160,32,.15);position:relative;overflow:hidden}
.sal-card::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(212,160,32,.2),transparent 70%);border-radius:50%}
.sal-period{font-size:11px;font-weight:800;color:var(--gold2);text-transform:uppercase;letter-spacing:1.8px;opacity:.9;position:relative;z-index:1}
.sal-amount{font-size:36px;font-weight:800;color:var(--t1);line-height:1;margin:8px 0 2px;font-variant-numeric:tabular-nums;position:relative;z-index:1;letter-spacing:-1px}
.sal-amount-sub{font-size:11px;font-weight:600;color:var(--t2);opacity:.75;margin-bottom:16px;position:relative;z-index:1}
.sal-stats{display:flex;gap:6px;margin-top:12px;position:relative;z-index:1}
.sal-stat{flex:1;background:rgba(255,255,255,.65);border-radius:10px;padding:9px 6px;text-align:center;backdrop-filter:blur(8px)}
.sal-stat-v{font-size:14px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums}
.sal-stat-v.red{color:var(--red)}
.sal-stat-l{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;opacity:.85}
.sal-cta{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,#f5d44b,#d4a020);color:#1a1a1a;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:14px;box-shadow:0 4px 16px rgba(212,160,32,.28);letter-spacing:.3px}
.sal-cta:active{transform:scale(.98)}
.sal-cta-i{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;line-height:1}
.own-panel{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.own-title{font-size:11px;font-weight:800;color:var(--yellow);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.own-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.own-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s;position:relative;color:#fff;font-family:inherit}
.own-btn:active{background:rgba(255,255,255,.12);transform:scale(.97)}
.own-btn-i{font-size:22px;margin-bottom:4px;line-height:1}
.own-btn-t{font-size:12px;font-weight:700}
.own-btn-s{position:absolute;top:6px;right:8px;font-size:10px;font-weight:800;color:#1a1a1a;background:var(--yellow);padding:1px 7px;border-radius:8px}
.hist{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:5px}
.hist.fine{background:var(--red-bg);border-color:rgba(220,38,38,.12)}
.hist.paid{background:rgba(0,0,0,.03);opacity:.75}
.hist-l{flex:1;min-width:0;padding-right:8px}
.hist-d{font-size:13px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-m{font-size:11px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-r{font-size:14px;font-weight:800;color:var(--gold2);font-variant-numeric:tabular-nums;flex-shrink:0}
.hist-r.red{color:var(--red)}
.hist-r.grey{color:var(--t3)}
.empty-mini{text-align:center;padding:18px 12px;color:var(--t3);font-size:12px;font-weight:500;background:var(--card);border:1px dashed var(--border2);border-radius:10px;margin-bottom:8px}
.sf-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.sf-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sf-hours{width:100%;padding:14px;border:1.5px solid var(--border2);border-radius:10px;font-family:inherit;font-size:24px;font-weight:800;text-align:center;outline:none;color:var(--t1);background:#fff;-moz-appearance:textfield}
.sf-hours::-webkit-outer-spin-button,.sf-hours::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand()}

// ═══════════════════════════════════════
//  ТЕМА (день/ночь) — клик на NERO логотип
// ═══════════════════════════════════════
const THEME_COLORS={light:{header:'#faf8f4',bg:'#faf8f4'},dark:{header:'#0f1115',bg:'#0f1115'}};
function applyTheme(theme){
  const t=(theme==='dark')?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  // Telegram başlık + arka plan rengini eşitle (mini app penceresi tek renk gözüksün)
  if(tg){
    try{tg.setHeaderColor(THEME_COLORS[t].header);}catch(e){}
    try{tg.setBackgroundColor(THEME_COLORS[t].bg);}catch(e){}
  }
  try{localStorage.setItem('cf_theme',t);}catch(e){}
}
function toggleTheme(ev){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next=(cur==='dark')?'light':'dark';
  // Logo: tek seferlik dönüş animasyonu (bittikten sonra nötrde kalır)
  try{
    const logo=ev&&ev.currentTarget?ev.currentTarget:document.querySelector('.brand-logo');
    if(logo){
      logo.classList.remove('spin');
      // reflow trick — animasyon yeniden tetiklensin
      void logo.offsetWidth;
      logo.classList.add('spin');
      const onEnd=function(){logo.classList.remove('spin');logo.removeEventListener('animationend',onEnd)};
      logo.addEventListener('animationend',onEnd);
      // Mobilde focus/hover state'inin sticky kalmaması için blur ve aktif elementi temizle
      try{logo.blur&&logo.blur()}catch(_){}
      try{document.activeElement&&document.activeElement.blur&&document.activeElement.blur()}catch(_){}
    }
  }catch(e){}
  // Güzel görsel efekt: NERO'dan dalga yayılsın
  try{
    const f=document.createElement('div');
    f.className='theme-flash';
    if(ev&&ev.currentTarget){
      const r=ev.currentTarget.getBoundingClientRect();
      f.style.left=(r.left)+'px';f.style.top=(r.top)+'px';
      f.style.width=r.width+'px';f.style.height=r.height+'px';
    }
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),650);
  }catch(e){}
  if(tg)tg.HapticFeedback?.impactOccurred?.('medium');
  applyTheme(next);
}
// İlk açılışta kayıtlı tercihi uygula (yoksa Telegram'ın temasını izle)
(function initTheme(){
  let saved=null;
  try{saved=localStorage.getItem('cf_theme');}catch(e){}
  if(!saved && tg && tg.colorScheme){saved=tg.colorScheme;} // 'light' | 'dark'
  applyTheme(saved||'light');
})();

function gT(){
  // Toshkent vaqti UTC+5 — qurilma vaqt mintaqasidan qat'iy nazar to'g'ri ishlaydi
  const n=new Date();
  const utc=n.getTime()+n.getTimezoneOffset()*60000;
  return new Date(utc+5*3600000);
}

// Canlı saat — saniyeli, her saniye güncellenir
function uC(){
  const t=gT();
  document.getElementById('clk').textContent=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
  document.getElementById('day').textContent=DR[t.getDay()]+', '+t.getDate()+' '+MO[t.getMonth()];
}
uC();setInterval(uC,1000);

const DP_VER='5';
const DP={
  "Кофе":{icon:"&#9749;",items:[
    {id:"esp_mix",n:"Кофе эспрессо смесь (1 кг)"},

  ]},
  "Расходники":{icon:"&#128722;",items:[
    {id:"napkins",n:"Салфетки (1 пачка)"},
    {id:"straw_fl",n:"Трубочки плоские (4000 шт)"},
    {id:"straw_go",n:"Трубочки гофрированные (500 шт)"},
    {id:"straw_cl",n:"Трубочки для холодных напитков (400 шт)"},
    {id:"trash_bg",n:"Мусорный пакет (10 шт)"},

    {id:"cloth_cl",n:"Тряпка для уборки (1 шт)"},
    {id:"cloth_dl",n:"Тряпка дельфин (1 шт)"},

// ── Sipariş gönder — her zaman toast gösterir ──
function sO(){
  var tot=Object.values(ord).reduce(function(a,v){return a+v},0);
  if(!tot)return;
  // Payload — tam ürün isimleriyle gönder (bot uzun mesajları parçalar).
  // Sadece sendData 4096 byte limitini aşarsa kademeli kısaltmaya geç.
  var maxL=200; // pratik olarak hiçbir isim bunu aşmaz
  var ps;
  do{
    var g=[];
    Object.keys(P).forEach(function(ck){
      var d=P[ck],it=[];
      d.items.forEach(function(p){
        if(ord[p.id]){
          var nm=String(p.n||'');
          if(nm.length>maxL)nm=nm.substring(0,maxL);
          it.push(nm+':'+ord[p.id]);
        }
      });
      if(it.length)g.push(ck+'|'+it.join('|'));
    });
    ps=JSON.stringify({a:'o',g:g,c:tot});
    var bl=0;for(var i=0;i<ps.length;i++){bl+=ps.charCodeAt(i)>127?2:1}
    if(bl<=3800)break;
    maxL-=10;
  }while(maxL>=20);
  // Geçmiş kaydet (tam isimlerle)
  var allNames={};var all=allItems();
  Object.keys(ord).forEach(function(id){var p=all.find(function(x){return x.id===id});if(p)allNames[id]=p.n});
  hist.push({type:'order',items:JSON.parse(JSON.stringify(ord)),names:allNames,date:new Date().toISOString(),user:tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user.first_name:'Бариста'});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('Заказ отправлен!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  ord={};cat=null;render();
  if(tg&&tg.sendData){try{tg.sendData(ps);}catch(e){console.warn('sendData:',e)}}
}

function buildUCard(k,src,todayKey,highlight){
  const sk='uborka_'+k,st=ts[sk]||[],done=st.filter(Boolean).length,total=st.length,ok=done===total&&total>0;
  const isDay=k===todayKey,isEjd=k==='Ежедневно',isMon=k==='Ежемесячно';

  else if(isDay)fb='<span class="badge badge-today-big">&#9733; сегодня</span>';
  else if(isMon)fb='<span class="badge badge-month">ежемесячно</span>';
  else fb='<span class="badge badge-week">на неделе</span>';

  const cls='card'+(highlight?' today-card':'');
  return'<div class="'+cls+'" onclick="sub=\''+esc(k)+'\';render()"><div class="card-left">'+iconEl+'<div class="card-info"><div class="card-title">'+k+'</div><div class="card-sub">'+done+'/'+total+' '+fb+'</div></div></div><div class="card-right">'+(ok?'<span class="badge badge-green">&#10003;</span>':'')+(edit?'<button class="xbtn" onclick="event.stopPropagation();dSe(\''+esc(k)+'\')">&#10005;</button>':'<span class="arrow">&#8250;</span>')+'</div></div>';
}

  if(mView==='shiftEnd')return rMShiftEnd(m,b);
  if(mView==='shift')return rMShift(m,b);

  const s=SUMMARY||{};
  const active=s.active||null;
  let h='';
  // Rol pill (sadece isim)
  h+=(MY_ROLE==='owner'
      ? '<div class="role-pill owner">👑 Владелец · '+escH(MY_NAME)+'</div>'
      : '<div class="role-pill barista">👤 '+escH(MY_NAME)+'</div>');

  if(active){
    const startStr=fmtTime(active.start_time);
    const dur=liveDur(active.start_time);
    h+='<div class="act-card" id="actCard">'
      +'<div class="act-pulse"><span class="act-dot"></span>В смене</div>'
      +'<div class="act-time" id="actDur">'+dur+'</div>'
      +'<div class="act-sub">прошло с начала смены</div>'
      +'<div class="act-row"><span>Пришли в</span><b>'+startStr+'</b></div>'
      +'<button class="btn-end" onclick="openShiftEnd()">🔴 Завершить смену</button>'
    +'</div>';
    if(window._actTimer)clearInterval(window._actTimer);
    window._actTimer=setInterval(function(){
      const el=document.getElementById('actDur');
      if(!el){clearInterval(window._actTimer);return}
      el.textContent=liveDur(active.start_time);
    },1000);
  } else {
    h+='<button class="btn-start" onclick="startShiftNow()"><span class="ic">▶</span>Начать смену</button>';
    h+='<div class="refresh-hint" style="margin-top:10px">Нажмите «Начать смену» как только пришли. Время прихода фиксируется автоматически.</div>';

      +'<div style="display:flex;gap:8px;align-items:center">'
        +'<input type="time" id="cstStart" style="flex:1;padding:10px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px;font-family:inherit">'
        +'<button onclick="startShiftCustomTime()" style="padding:10px 14px;background:#0ea5e9;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer">Начать</button>'
      +'</div>'
    +'</div>';
  }

  // Şu an çalışan diğer baristalar
  const activeOthers=(BARISTAS||[]).filter(function(x){return x.active && x.id!==MY_UID});
  if(activeOthers.length){
    h+='<div class="sec">🟢 Сейчас в смене ('+activeOthers.length+')</div>';
    activeOthers.forEach(function(brs){
      h+='<div class="hist" style="background:#ecfdf5;border-color:#6ee7b7">'
        +'<div class="hist-l">'
          +'<div class="hist-d">'+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div>'
          +'<div class="hist-m">с '+fmtTime(brs.active.start_time)+' · <span id="oa_'+brs.id+'" data-st="'+escH(brs.active.start_time||'')+'">'+liveDur(brs.active.start_time)+'</span></div>'
        +'</div>'
        +'<div class="hist-r" style="color:#059669">🟢</div>'
      +'</div>';
    });
    // Diğer baristaların canlı süresini güncelle (saniye saniye)
    if(window._anyActTimer)clearInterval(window._anyActTimer);
    window._anyActTimer=setInterval(function(){
      if(tab!=='shift'){clearInterval(window._anyActTimer);return}
      let any=false;

        const el=document.getElementById('oa_'+brs.id);

// Aktif vardiya süresini canlı hesapla (H:MM:SS)
function liveDur(startIso){
  if(!startIso)return '0:00:00';
  try{
    const s=new Date(startIso);
    const now=gT();
    const diff=Math.max(0,Math.floor((now.getTime()-s.getTime())/1000)); // saniye
    const h=Math.floor(diff/3600),mn=Math.floor((diff%3600)/60),sc=diff%60;
    return h+':'+String(mn).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  }catch(e){return '0:00:00'}
}
function liveHours(startIso){
  if(!startIso)return 0;
  try{
    const s=new Date(startIso);
    const now=gT();
    return Math.max(0,(now.getTime()-s.getTime())/3600000);
  }catch(e){return 0}
}

// Saatleri okunabilir biçimde göster:
//   0.02h → "1м"
//   0.5h  → "30м"
//   1.5h  → "1ч 30м"
//   8h    → "8ч"
function fmtH(h){
  const n=Number(h)||0;
  if(n<=0)return '0м';
  const totalMin=Math.round(n*60);
  const hh=Math.floor(totalMin/60);
  const mm=totalMin%60;
  if(hh===0)return mm+'м';
  if(mm===0)return hh+'ч';
  return hh+'ч '+mm+'м';
}
function fmtTime(iso){
  if(!iso)return '--:--';
  try{const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}catch(e){return '--:--'}
}
function fmtDay(iso){
  if(!iso)return '';
  try{const d=new Date(iso);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()}catch(e){return ''}
}

// Hızlı istatistik (bugün/hafta) — bitmiş vardiyalardan
function calcQuickStats(shifts){
  const now=gT();
  const today=now.toDateString();
  const wkAgo=new Date(now.getTime()-7*86400000);
  let today_=0,todayShifts=0,week=0,weekShifts=0;
  shifts.forEach(function(sh){
    const dt=new Date(sh.start_time||sh.created_at||sh.date||0);
    if(isNaN(dt))return;
    if(dt.toDateString()===today){today_+=(sh.total||0);todayShifts++}
    if(dt>=wkAgo){week+=(sh.total||0);weekShifts++}
  });
  return {today:today_,todayShifts:todayShifts,week:week,weekShifts:weekShifts};
}

// ── Vardiyayı geriye dönük başlat (HH:MM girişi) ──
function startShiftCustomTime(){
  const inp=document.getElementById('cstStart');
  if(!inp||!inp.value){toast('Укажите время');return}
  const hhmm=inp.value; // 'HH:MM'
  // Bugün için datetime oluştur
  const now=new Date();
  const [hh,mm]=hhmm.split(':').map(function(x){return parseInt(x)||0});
  const customDt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0,0);
  // Geleceğe izin verme
  if(customDt-now>2*60*1000){toast('Время не может быть в будущем');return}
  // 12 saatten eski izin verme (yanlışlıkla)
  if(now-customDt>12*60*60*1000){
    if(!confirm('Указано время более 12 часов назад. Продолжить?'))return;
  }
  if(!confirm('Начать смену с '+hhmm+'?\nВремя прихода будет указано вручную.'))return;
  const customIso=customDt.toISOString();
  SUMMARY.active={start_time:customIso,end_time:null,hours:0,drinks:'{}',bonus:0,hourly_pay:0,total:0};
  toast('🟢 Смена началась с '+hhmm);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'shift_start',start_time:customIso}))}catch(e){console.warn(e)}}
  render();
}

  if(!hhmm){endDraft.endTime='';render();return}

function recalcEnd(){

  const liveH=Math.max(0,(effEnd-new Date(active.start_time))/3600000);

  DRINK_LIST.forEach(function(d){drinkBonus+=(parseInt(endDraft.drinks[d.id])||0)*d.r});
  let desBonus=0;
  DESSERT_LIST.forEach(function(d){desBonus+=(parseInt(endDraft.desserts[d.id])||0)*(parseInt(d.r)||DESSERT_RATE)});
  const hourly=Math.round(liveH*HOURLY_RATE);
  const total=hourly+drinkBonus+desBonus;
  const eHr=document.getElementById('seHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('seBonus');if(eBn)eBn.textContent=fmt(drinkBonus);
  const eDb=document.getElementById('seDesBonus');if(eDb)eDb.textContent=fmt(desBonus);
  const eTt=document.getElementById('seTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  // Saatleri de yenile (manuel saat değiştiyse)
  const ed=document.getElementById('seDur');if(ed)ed.textContent=fmtH(liveH);
  if(endDraft.endTime){
    const en=document.getElementById('seNow');if(en)en.textContent=fmtTime(effEnd.toISOString());
  }
}

function endShiftSave(){
  const active=(SUMMARY||{}).active;
  if(!active){toast('Нет активной смены');return}
  // Bitiş zamanı: manuel girildiyse onu kullan, yoksa şu an
  const effEnd=(endDraft.endTime?new Date(endDraft.endTime):new Date());
  const liveH=Math.max(0,(effEnd-new Date(active.start_time))/3600000);
  let drinkBonus=0;
  DRINK_LIST.forEach(function(d){drinkBonus+=(parseInt(endDraft.drinks[d.id])||0)*d.r});
  let desBonus=0;
  DESSERT_LIST.forEach(function(d){desBonus+=(parseInt(endDraft.desserts[d.id])||0)*(parseInt(d.r)||DESSERT_RATE)});
  const bonus=drinkBonus+desBonus;
  const hourly=Math.round(liveH*HOURLY_RATE);
  const total=hourly+bonus;
  const payload={
    action:'shift_end',
    drinks:endDraft.drinks,
    desserts:endDraft.desserts,
    note:endDraft.note
  };
  if(endDraft.endTime)payload.end_time=endDraft.endTime;
  // Optimistik güncelleme
  const finishedShift={
    start_time:active.start_time,
    end_time:effEnd.toISOString(),
    hours:Math.round(liveH*100)/100,
    drinks:JSON.stringify(endDraft.drinks),
    desserts:JSON.stringify(endDraft.desserts),
    bonus:bonus,dessert_bonus:desBonus,hourly_pay:hourly,total:total,
    note:endDraft.note,
    created_at:active.start_time
  };
  SUMMARY.shifts=SUMMARY.shifts||[];
  SUMMARY.shifts.push(finishedShift);
  SUMMARY.shifts_count=(SUMMARY.shifts_count||0)+1;
  SUMMARY.hours=(SUMMARY.hours||0)+finishedShift.hours;
  SUMMARY.hourly=(SUMMARY.hourly||0)+hourly;
  SUMMARY.bonus=(SUMMARY.bonus||0)+bonus;
  SUMMARY.gross=(SUMMARY.hourly)+(SUMMARY.bonus);
  SUMMARY.fines=SUMMARY.fines||0;
  SUMMARY.paid=SUMMARY.paid||0;
  SUMMARY.net=SUMMARY.gross-SUMMARY.fines-SUMMARY.paid;
  SUMMARY.active=null;
  if(window._endTimer){clearInterval(window._endTimer);window._endTimer=null}
  if(window._actTimer){clearInterval(window._actTimer);window._actTimer=null}
  hist.push({type:'shift',date:new Date().toISOString(),user:MY_NAME,hours:finishedShift.hours,drinks:endDraft.drinks,desserts:endDraft.desserts,note:endDraft.note,total:total});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('🔴 Смена закрыта · '+fmt(total)+' сум');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  endDraft={drinks:{},desserts:{},note:'',endTime:''};
  mView='main';
  render();
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('sendData:',e)}}
}

function dq(id,d){
  shiftDraft.drinks[id]=Math.max(0,(parseInt(shiftDraft.drinks[id])||0)+d);
  if(!shiftDraft.drinks[id])delete shiftDraft.drinks[id];
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function dqManual(id){
  const cur=parseInt(shiftDraft.drinks[id])||0;
  const v=prompt('Сколько штук?',cur||'');
  if(v===null)return;
  const n=Math.max(0,parseInt(v)||0);
  if(n===0)delete shiftDraft.drinks[id];else shiftDraft.drinks[id]=n;
  render();
}

function recalcShift(){
  const hours=parseFloat(shiftDraft.hours)||0;
  let bonus=0;
  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});
  const hourly=Math.round(hours*HOURLY_RATE);
  const total=hourly+bonus;
  const eHr=document.getElementById('sfHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('sfBonus');if(eBn)eBn.textContent=fmt(bonus);
  const eTt=document.getElementById('sfTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  const eHt=document.getElementById('sfHourHint');if(eHt)eHt.textContent=hours>0?(hours+'h × 12.000 = '+fmt(hourly)+' сум'):'Введите количество часов';
  const eBt=document.getElementById('sfBtn');if(eBt){const ok=hours>0;eBt.disabled=!ok;eBt.classList.toggle('grn',ok);eBt.textContent=ok?('💾 Записать смену · '+fmt(total)+' сум'):'Введите часы';}
}

function saveShift(){
  const hours=parseFloat(shiftDraft.hours)||0;
  if(hours<=0)return;
  let bonus=0;
  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});
  const hourly=Math.round(hours*HOURLY_RATE);
  const total=hourly+bonus;
  const payload={action:'shift',hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note};
  // Optimistik güncelleme — kullanıcı uygulamada hemen sonucu görür
  SUMMARY.hours=(SUMMARY.hours||0)+hours;
  SUMMARY.hourly=(SUMMARY.hourly||0)+hourly;
  SUMMARY.bonus=(SUMMARY.bonus||0)+bonus;
  SUMMARY.gross=(SUMMARY.hourly||0)+(SUMMARY.bonus||0);
  SUMMARY.fines=SUMMARY.fines||0;
  SUMMARY.paid=SUMMARY.paid||0;
  SUMMARY.net=SUMMARY.gross-SUMMARY.fines-SUMMARY.paid;
  SUMMARY.shifts_count=(SUMMARY.shifts_count||0)+1;
  SUMMARY.shifts=SUMMARY.shifts||[];
  SUMMARY.shifts.push({hours:hours,drinks:JSON.stringify(shiftDraft.drinks),bonus:bonus,hourly_pay:hourly,total:total,created_at:new Date().toISOString()});
  // Lokal geçmişe de kaydet
  hist.push({type:'shift',date:new Date().toISOString(),user:MY_NAME,hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note,total:total});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('💾 Смена записана!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  shiftDraft={hours:'',drinks:{},note:''};
  mView='main';
  render();
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('sendData:',e)}}
}

// ── Owner: Ceza ekleme ekranı (çoklu hedef + zorunlu sebep + split) ──
function rMFine(m,b){
  if(MY_ROLE!=='owner'){mView='main';render();return}
  // İlk açılışta inspection preset'iyse split otomatik aç
  const isInsp=String(fineDraft.type||'').indexOf('insp_')===0||fineDraft.type==='foreign';
  let h='<button class="back" onclick="mView=\'main\';render()">‹ Назад</button>';

  // Tip seç (önce)
  h+='<div class="sf-label" style="margin:8px 0 6px">Тип штрафа</div>';
  FINE_PRESETS.forEach(function(p){
    const sel=fineDraft.type===p.id;
    h+='<div class="opt '+(sel?'on':'')+'" onclick="selFineType(\''+p.id+'\')">'
      +'<div class="opt-r"></div>'
      +'<div class="opt-l"><div class="opt-t">'+p.l+'</div><div class="opt-s">'+p.s+'</div></div>'

      +'<input class="sf-hours" type="number" inputmode="numeric" min="1" value="'+escH(String(fineDraft.custom||''))+'" oninput="fineDraft.custom=this.value;fineDraft.amount=parseInt(this.value)||0;recalcFine()" placeholder="например 50000">';
  }

  // Split toggle (denetim cezalarında otomatik öneri)
  h+='<div class="sf-label" style="margin:14px 0 6px">Кому?</div>';
  h+='<div class="split-toggle '+(fineDraft.split?'on':'')+'" onclick="fineDraft.split=!fineDraft.split;render()">'
    +'<div><div class="split-toggle-t">⚖️ Разделить на нескольких</div><div class="split-toggle-s">'+(fineDraft.split?'Сумма поделится поровну':'Полная сумма каждому выбранному')+'</div></div>'
    +'<div class="tg-sw '+(fineDraft.split?'on':'')+'"></div>'
  +'</div>';
  if(isInsp&&!fineDraft.split){
    h+='<div class="refresh-hint" style="margin-top:0">💡 Это проверка — обычно штраф делится между баристами в смене.</div>';
  }

  // Çoklu barista seç (checkbox tarzı)
  if(!BARISTAS.length){
    h+='<div class="empty-mini">Нет баристов. Они должны написать боту /start.</div>';
  } else {
    BARISTAS.forEach(function(brs){
      const sel=fineDraft.targets.indexOf(brs.id)>=0;
      h+='<div class="opt multi '+(sel?'on':'')+'" onclick="toggleFineTarget('+brs.id+')">'
        +'<div class="opt-r"></div>'
        +'<div class="opt-l"><div class="opt-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="opt-s">'+(brs.u?'@'+escH(brs.u)+' · ':'')+'штраф в мес.: '+fmt(brs.f||0)+'</div></div>'
      +'</div>';
    });
  }

  // Sebep — ZORUNLU
  h+='<div class="sf-label" style="margin:14px 0 6px">Причина <span style="color:var(--red);font-weight:800">*</span></div>'
    +'<textarea class="sf-note" rows="2" placeholder="обязательно укажите причину" oninput="fineDraft.reason=this.value;recalcFine()">'+escH(fineDraft.reason||'')+'</textarea>';

  // Toplam
  const cnt=fineDraft.targets.length;
  const per=(fineDraft.split&&cnt>1)?Math.floor(fineDraft.amount/cnt):fineDraft.amount;
  h+='<div class="sf-total">'
    +'<div class="sf-tot-row"><span>Получателей</span><span>'+cnt+'</span></div>'

    +'<div class="sf-tot-big"><span>'+(fineDraft.split&&cnt>1?'Каждому':'Штраф')+'</span><span id="fnAmt">-'+fmt(per)+' сум</span></div>'
  +'</div>';

  h+='<div class="footer">XSYN</div>';
  m.innerHTML=h;
  b.style.display='block';
  const reasonOk=(fineDraft.reason||'').trim().length>0;

  b.innerHTML='<button class="mbtn" id="fnBtn" '+(ok?'':'disabled')+' onclick="saveFine()">'+(ok?'⚠️ Записать штраф · -'+fmt(per)+' сум'+(fineDraft.split&&cnt>1?' × '+cnt:''):(reasonOk?'Выберите получателей':'Укажите причину'))+'</button>';
}

function toggleFineTarget(uid){
  const i=fineDraft.targets.indexOf(uid);
  if(i>=0)fineDraft.targets.splice(i,1);else fineDraft.targets.push(uid);
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}

function selFineType(t){
  fineDraft.type=t;
  const p=FINE_PRESETS.find(function(x){return x.id===t});
  if(p&&t!=='custom')fineDraft.amount=p.amt;
  if(t==='custom')fineDraft.amount=parseInt(fineDraft.custom)||0;
  // Inspection preset'lerinde split otomatik aç (checkbox manuel kapatılırsa kapanır)
  if(t.indexOf('insp_')===0||t==='foreign')fineDraft.split=true;
  render();
}
function recalcFine(){
  // Sadece toplamı güncelle (re-render etmeden)
  const cnt=fineDraft.targets.length;
  const per=(fineDraft.split&&cnt>1)?Math.floor(fineDraft.amount/cnt):fineDraft.amount;
  const eA=document.getElementById('fnAmt');if(eA)eA.textContent='-'+fmt(per)+' сум';
  const eB=document.getElementById('fnBtn');if(eB){
    const reasonOk=(fineDraft.reason||'').trim().length>0;
    const ok=cnt>0&&fineDraft.amount>0&&reasonOk;
    eB.disabled=!ok;
    eB.textContent=ok?'⚠️ Записать штраф · -'+fmt(per)+' сум'+(fineDraft.split&&cnt>1?' × '+cnt:''):(reasonOk?'Выберите получателей':'Укажите причину');
  }
}

function saveFine(){
  const cnt=fineDraft.targets.length;
  const reason=(fineDraft.reason||'').trim();
  if(cnt===0||fineDraft.amount<=0||!reason){
    if(!reason)toast('❌ Причина обязательна');
    return;
  }
  const split=fineDraft.split&&cnt>1;
  const per=split?Math.floor(fineDraft.amount/cnt):fineDraft.amount;
  // Lokal güncelleme
  fineDraft.targets.forEach(function(uid){
    const t=BARISTAS.find(function(x){return x.id===uid});
    if(t){t.f=(t.f||0)+per;t.net=(t.net||0)-per}
  });
  const payload={action:'fine',targets:fineDraft.targets,amount:fineDraft.amount,reason:reason,type:fineDraft.type,split:split};
  toast(split?('⚠️ Штраф разделён · '+cnt+' чел.'):'⚠️ Штраф записан');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  fineDraft={targets:[],type:'clean',amount:30000,reason:'',custom:'',split:false};
  mView='main';
  render();
}

        +'</div>';

  h+='<div class="sf-label" style="margin:14px 0 6px">Заметка (необязательно)</div>'
    +'<textarea class="sf-note" rows="2" placeholder="например: вечерние чаевые" oninput="tipDraft.note=this.value">'+escH(tipDraft.note||'')+'</textarea>';

  const calc=calcTipPlan();
  h+='<div class="sf-total">'
    +'<div class="sf-tot-row"><span>Получателей</span><span>'+calc.cnt+'</span></div>'
    +'<div class="sf-tot-row"><span>Сумма</span><span id="tpTotal">'+fmt(calc.total)+' сум</span></div>'
    +(calc.cnt>0&&tipDraft.mode==='equal'?'<div class="sf-tot-row"><span>Каждому</span><span>+'+fmt(calc.per)+' сум</span></div>':'')

function toggleTipTarget(uid){
  if(tipDraft.distributions[uid]!==undefined)delete tipDraft.distributions[uid];
  else tipDraft.distributions[uid]=0;
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function setTipFor(uid,v){tipDraft.distributions[uid]=parseInt(v)||0;recalcTips()}
function calcTipPlan(){
  const total=parseInt(tipDraft.total)||0;
  const ids=Object.keys(tipDraft.distributions).map(function(x){return parseInt(x)});
  const cnt=ids.length;
  if(tipDraft.mode==='equal'){
    const per=cnt>0?Math.floor(total/cnt):0;
    return {cnt:cnt,total:total,per:per,sum:per*cnt};
  } else {
    let s=0;ids.forEach(function(u){s+=parseInt(tipDraft.distributions[u])||0});
    return {cnt:cnt,total:s,per:0,sum:s};
  }
}
function recalcTips(){
  const calc=calcTipPlan();
  const e=document.getElementById('tpTotal');if(e)e.textContent=fmt(calc.total)+' сум';
}
function saveTips(){
  const calc=calcTipPlan();
  if(calc.cnt===0||calc.sum<=0)return;
  // Dağıtım planı: {uid:amount}
  const dist={};
  if(tipDraft.mode==='equal'){
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=calc.per});
  } else {
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=parseInt(tipDraft.distributions[u])||0});
  }
  const payload={action:'tip_distribute',distributions:dist,note:(tipDraft.note||'').trim(),total:calc.sum,mode:tipDraft.mode};
  toast('💝 Чаевые розданы · '+calc.cnt+' чел.');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  tipDraft={total:'',distributions:{},note:'',mode:'equal'};
  mView='main';render();
}

function savePrice(drinkId){
  const el=document.getElementById('pr_'+drinkId);
  if(!el)return;
  const amount=parseInt(el.value)||0;
  if(amount<0){toast('❌ Неверная сумма');return}
  const drink=DRINK_LIST.find(function(x){return x.id===drinkId});
  if(drink)drink.r=amount;
  PRICES[drinkId]=amount;
  toast('💰 Цена сохранена');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'price_update',drink_id:drinkId,amount:amount}))}catch(e){console.warn(e)}}
}

function saveDisplayName(uid){
  const el=document.getElementById('nm_'+uid);
  if(!el)return;
  const name=(el.value||'').trim();
  if(!name){toast('❌ Имя не может быть пустым');return}
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.dn=name;t.n=name}
  toast('📝 Имя сохранено');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'rename_user',target:uid,name:name}))}catch(e){console.warn(e)}}
}

// ── Şifre yönetimi (owner) ──
function setBaristaPassword(uid){
  const el=document.getElementById('pw_'+uid);
  if(!el)return;
  const pwd=(el.value||'').trim();
  if(pwd.length<3){toast('❌ Пароль слишком короткий (мин 3 символа)');return}
  if(/\s/.test(pwd)){toast('❌ Пароль не должен содержать пробелы');return}
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.pw=1;t.auth=0}  // optimistik
  toast('🔐 Пароль установлен. Передайте бариста.');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'set_password',target:uid,password:pwd}))}catch(e){console.warn(e)}}
}

function clearBaristaPassword(uid,nm){
  if(!confirm('Удалить пароль для «'+(nm||'этого бариста')+'»?\nЕго доступ будет закрыт.'))return;
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.pw=0;t.auth=0}
  toast('🗑 Пароль удалён');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'clear_password',target:uid}))}catch(e){console.warn(e)}}
}

// ── Kullanıcı kaldırma (owner) — iki seçenekli: ARŞİV veya SİL ──
function removeUser(uid,nm,sc,fc){
  const hasData=(sc||0)+(fc||0)>0;
  const dataLine=hasData?('\n📊 У него: смен '+(sc||0)+', штрафов '+(fc||0)+'.\n'):'\n';
  // 1. ekran: ne yapacağını sor
  // confirm() sadece OK/Cancel — bu yüzden önce arşiv soruyoruz, "İptal"
  // dersen kalıcı silmeyi soruyoruz, ona da iptal dersen iptal.
  const ask1='Что сделать с «'+(nm||'?')+'»?'+dataLine
    +'\n✅ OK — 📦 Архивировать (история сохранится, доступ закрыт)'
    +'\n❌ Отмена — выбрать другой вариант';
  if(confirm(ask1)){
    // ARŞİV
    archiveUserConfirmed(uid,nm);
    return;
  }
  // 2. ekran: kalıcı sil mi yoksa iptal mi?
  const ask2='🗑 Удалить НАВСЕГДА «'+(nm||'?')+'»?'+dataLine
    +(hasData?'\n⚠️ Все данные будут стёрты БЕЗВОЗВРАТНО.\n':'')
    +'\n✅ OK — удалить навсегда'
    +'\n❌ Отмена — ничего не делать';
  if(!confirm(ask2))return;
  // Veri varsa ekstra ikinci doğrulama
  if(hasData){
    if(!confirm('Точно удалить «'+(nm||'?')+'» БЕЗ ВОЗМОЖНОСТИ ВОССТАНОВЛЕНИЯ?\nИстория ('+(sc||0)+' смен, '+(fc||0)+' штрафов) исчезнет.'))return;
  }
  deleteUserConfirmed(uid,nm,hasData);
}

function archiveUserConfirmed(uid,nm){
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.arch=1;t.auth=0;t.arch_at=new Date().toISOString()}
  toast('📦 «'+(nm||'?')+'» в архиве');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'archive_user',target:uid}))}catch(e){console.warn(e)}}
  render();
}

function restoreUser(uid,nm){
  if(!confirm('♻️ Вернуть «'+(nm||'?')+'» из архива?\nНе забудьте задать пароль для доступа.'))return;
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.arch=0;t.arch_at=''}
  toast('♻️ Восстановлен');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'unarchive_user',target:uid}))}catch(e){console.warn(e)}}
  render();
}

// Arşivden kalıcı silme (zaten arşivde)
function deleteUserPermanent(uid,nm,sc,fc){
  const hasData=(sc||0)+(fc||0)>0;
  const msg='🗑 Удалить «'+(nm||'?')+'» БЕЗ ВОЗВРАТА?\n'
    +(hasData?'\n⚠️ Останется в логах действий, но смены/штрафы/выплаты исчезнут.\n':'')
    +'\nПродолжить?';
  if(!confirm(msg))return;
  if(hasData){
    if(!confirm('Точно? Это действие НЕОБРАТИМО.'))return;
  }
  deleteUserConfirmed(uid,nm,hasData);
}

function deleteUserConfirmed(uid,nm,hasData){
  for(let i=BARISTAS.length-1;i>=0;i--){if(BARISTAS[i].id===uid)BARISTAS.splice(i,1)}
  toast('🗑 Удалён навсегда');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){
    try{tg.sendData(JSON.stringify({action:'delete_user',target:uid,confirm_with_data:hasData?1:0}))}catch(e){console.warn(e)}
  }
  render();
}

// ── Tatlı kataloğu CRUD (owner) ──
function saveDessert(id){
  const ic=(document.getElementById('dic_'+id)||{}).value||'🍮';
  const lb=((document.getElementById('dlb_'+id)||{}).value||'').trim();
  const pr=parseInt((document.getElementById('dpr_'+id)||{}).value)||0;
  if(!lb){toast('❌ Название обязательно');return}
  if(pr<0){toast('❌ Неверная цена');return}
  // Optimistik güncelle
  const d=DESSERT_CAT.find(function(x){return x.id===id});
  if(d){d.icon=ic;d.label=lb;d.price=pr}
  const dl=DESSERT_LIST.find(function(x){return x.id===id});
  if(dl){dl.c=ic;dl.l=lb;dl.r=pr}
  persistDesserts();  // localStorage'a yaz — app kapanırsa veri kaybolmasın
  toast('💾 Десерт сохранён');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_save',id:id,label:lb,icon:ic,price:pr,active:1}))}catch(e){console.warn(e)}}
  render();
}

function deleteDessert(id){
  const d=DESSERT_CAT.find(function(x){return x.id===id});
  if(!d)return;
  if(!confirm('Скрыть десерт «'+(d.label||id)+'»?\nОн больше не будет показан баристам.'))return;
  d.active=0;
  // DESSERT_LIST'ten de çıkar
  for(let i=DESSERT_LIST.length-1;i>=0;i--){if(DESSERT_LIST[i].id===id)DESSERT_LIST.splice(i,1)}
  persistDesserts();  // localStorage'a yaz
  toast('🗑 Скрыт');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_delete',id:id}))}catch(e){console.warn(e)}}
  render();
}

// Cyrillic → latin transliteration (id otomatik üretmek için)
function translit(s){
  const map={
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z',
    'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
    'с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch',
    'ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
  };
  let out='';
  for(const ch of (s||'').toLowerCase()){
    if(map[ch]!==undefined)out+=map[ch];
    else if(/[a-z0-9]/.test(ch))out+=ch;
    else if(ch===' '||ch==='-'||ch==='_')out+='_';
    // diğer karakterleri atla
  }
  // Birden fazla _ olmasın
  out=out.replace(/_+/g,'_').replace(/^_|_$/g,'');
  return out||'item';
}

function addNewDessert(){
  const ic=((document.getElementById('ndIc')||{}).value||'🍮').trim()||'🍮';
  const lb=((document.getElementById('ndLb')||{}).value||'').trim();
  const pr=Math.max(0,parseInt((document.getElementById('ndPr')||{}).value)||500);
  if(!lb){toast('❌ Введите название');return}
  // id otomatik: isimden transliteration
  let id=translit(lb);
  // Eğer aynı id varsa numaralandır: tiramisu, tiramisu_2, tiramisu_3...
  let base=id,n=2;
  while(DESSERT_CAT.some(function(x){return x.id===id})){
    id=base+'_'+n;n++;
  }
  // Optimistik
  const newD={id:id,label:lb,icon:ic,price:pr,sort_order:50,active:1};
  DESSERT_CAT.push(newD);
  DESSERT_LIST.push({id:id,l:lb,c:ic,r:pr,active:true});
  persistDesserts();  // localStorage'a yaz — app kapanırsa veri kaybolmasın
  // Inputları temizle
  ['ndIc','ndLb'].forEach(function(x){const el=document.getElementById(x);if(el)el.value=''});
  const pe=document.getElementById('ndPr');if(pe)pe.value='500';
  toast('➕ Добавлен: '+ic+' '+lb);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_save',id:id,label:lb,icon:ic,price:pr,active:1}))}catch(e){console.warn(e)}}
  render();
}
