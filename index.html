}

body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}

.sal-cta-i{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;line-height:1}
.own-panel{background:linear-gradient(135deg,#1a1a1a,#2d2d2d);color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.own-title{font-size:11px;font-weight:800;color:var(--yellow);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.own-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.own-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s;position:relative;color:#fff;font-family:inherit}
.own-btn:active{background:rgba(255,255,255,.12);transform:scale(.97)}
.own-btn-i{font-size:22px;margin-bottom:4px;line-height:1}
.own-btn-t{font-size:12px;font-weight:700}
.own-btn-s{position:absolute;top:6px;right:8px;font-size:10px;font-weight:800;color:#1a1a1a;background:var(--yellow);padding:1px 7px;border-radius:8px}
.hist{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:5px}
.hist.fine{background:var(--red-bg);border-color:rgba(220,38,38,.12)}
.hist.paid{background:rgba(0,0,0,.03);opacity:.75}
.hist-l{flex:1;min-width:0;padding-right:8px}
.hist-d{font-size:13px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-m{font-size:11px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-r{font-size:14px;font-weight:800;color:var(--gold2);font-variant-numeric:tabular-nums;flex-shrink:0}
.hist-r.red{color:var(--red)}
.hist-r.grey{color:var(--t3)}
.empty-mini{text-align:center;padding:18px 12px;color:var(--t3);font-size:12px;font-weight:500;background:var(--card);border:1px dashed var(--border2);border-radius:10px;margin-bottom:8px}
.sf-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.sf-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sf-hours{width:100%;padding:14px;border:1.5px solid var(--border2);border-radius:10px;font-family:inherit;font-size:24px;font-weight:800;text-align:center;outline:none;color:var(--t1);background:#fff;-moz-appearance:textfield}
.sf-hours::-webkit-outer-spin-button,.sf-hours::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sf-hours:focus{border-color:var(--gold)}
.sf-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:6px;font-weight:600}
.dr-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:5px;transition:all .15s}
.dr-item.has{border-color:var(--gold-border);background:var(--yellow-bg)}
.dr-l{flex:1;padding-right:8px;min-width:0}
.dr-n{font-size:13px;font-weight:700;color:var(--t1)}
.dr-s{font-size:10px;color:var(--t3);margin-top:1px;font-weight:500}
.sf-note{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:10px;font-family:inherit;font-size:13px;background:var(--card);color:var(--t1);outline:none;resize:vertical;margin-bottom:12px;font-weight:500}
.sf-note:focus{border-color:var(--gold)}
.sf-total{background:linear-gradient(135deg,var(--card2),var(--card3));border-radius:12px;padding:14px 16px;margin:14px 0 8px}
.sf-tot-row{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--t2);padding:3px 0;font-variant-numeric:tabular-nums}
.sf-tot-big{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:var(--t1);margin-top:8px;padding-top:10px;border-top:1.5px solid rgba(0,0,0,.08);font-variant-numeric:tabular-nums}
.sf-tot-big span:last-child{color:var(--gold2)}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.bcard.me{border-color:var(--gold-border);background:var(--yellow-bg)}
.bcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.bcard-l{flex:1;min-width:0}
.bcard-name{font-size:14px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bcard-name .crown{color:var(--gold2)}
.bcard-uname{font-size:10px;color:var(--t3);font-weight:500;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bcard-net{font-size:18px;font-weight:800;color:var(--gold2);font-variant-numeric:tabular-nums;flex-shrink:0}
.bcard-stat{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:var(--t2)}
.bcard-stat span:last-child{font-weight:700;color:var(--t1);font-variant-numeric:tabular-nums}
.bcard-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.bcard-act{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border2);background:var(--card2);color:var(--t1);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer}
.bcard-act:active{transform:scale(.97)}
.bcard-act.fine{background:var(--red-bg);color:var(--red);border-color:rgba(220,38,38,.15)}
.bcard-act.pay{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.opt{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.opt.on{border-color:var(--gold);background:var(--yellow-bg)}
.opt-r{width:18px;height:18px;border-radius:50%;border:2px solid var(--card3);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff}
.opt.on .opt-r{border-color:var(--gold);background:var(--gold)}
.opt.on .opt-r::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt-l{flex:1;min-width:0;padding-right:6px}
.opt-t{font-size:13px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.opt-s{font-size:10px;color:var(--t3);margin-top:1px;font-weight:500}
.opt-amt{font-size:12px;font-weight:800;color:var(--gold2);font-variant-numeric:tabular-nums;flex-shrink:0}
.role-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.role-pill.owner{background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1a1a;box-shadow:0 2px 8px rgba(212,160,32,.25)}
.role-pill.barista{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.no-owner-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid var(--gold);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center}
.no-owner-card .ic{font-size:36px;margin-bottom:8px}
.no-owner-card .t{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:4px}
.no-owner-card .s{font-size:11px;color:var(--t2);font-weight:500;line-height:1.5}
.refresh-hint{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:var(--gold2);font-weight:600;text-align:center;line-height:1.4}
/* ─── Aktif vardiya kartı (Активная смена) ─── */
.act-card{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-radius:18px;padding:18px 18px 14px;margin-bottom:14px;box-shadow:0 6px 22px rgba(16,185,129,.32);position:relative;overflow:hidden}
.act-card::before{content:'';position:absolute;top:-30px;right:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);border-radius:50%}
.act-pulse{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;position:relative;z-index:1}
.act-dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 #fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}70%{box-shadow:0 0 0 10px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.act-time{font-size:30px;font-weight:800;margin:6px 0 2px;font-variant-numeric:tabular-nums;letter-spacing:-.5px;position:relative;z-index:1}
.act-sub{font-size:11px;font-weight:600;opacity:.92;position:relative;z-index:1}
.act-row{display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.18);font-size:12px;font-weight:600;position:relative;z-index:1}
.act-row b{font-size:14px;font-weight:800}
.btn-end{width:100%;margin-top:12px;padding:13px;border:none;border-radius:11px;background:#fff;color:#059669;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;z-index:1}
.btn-end:active{transform:scale(.98)}
.btn-start{width:100%;padding:18px;border:none;border-radius:14px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;box-shadow:0 6px 18px rgba(16,185,129,.32);letter-spacing:.3px}
.btn-start:active{transform:scale(.99)}
.btn-start .ic{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:14px}
.sec-link{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px}
.sec-link a{color:var(--gold2);font-weight:700;text-transform:none;letter-spacing:0;font-size:12px;cursor:pointer}
.hist.click{cursor:pointer;transition:all .12s}
.hist.click:active{transform:scale(.98);background:var(--card2)}
.hist-arr{font-size:18px;color:var(--t3);margin-left:6px;flex-shrink:0}
/* Bardak sayısı tıklanabilir */
.qty-box{display:flex;align-items:center;gap:0;background:var(--card2);border-radius:10px;padding:0;border:1px solid var(--border)}
.qb{width:34px;height:34px;border:none;background:transparent;color:var(--t1);font-family:inherit;font-size:18px;font-weight:800;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;line-height:1}
.qb:active{background:rgba(0,0,0,.06);transform:scale(.92)}
.qb.m{color:var(--red)}
.qb.p{color:var(--green)}
.qv{min-width:34px;text-align:center;font-size:15px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;cursor:pointer;padding:6px 4px;border-radius:6px;user-select:none}
.qv:active{background:rgba(0,0,0,.08)}
.qv.z{color:var(--t3);font-weight:600}
.qv.editing{background:#fff;border:1.5px solid var(--gold);outline:none;width:50px}
/* Vardiya detay */
.det-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.det-h{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.det-times{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.det-time-box{background:var(--card2);border-radius:10px;padding:10px 8px;text-align:center}
.det-time-l{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.det-time-v{font-size:15px;font-weight:800;color:var(--t1);margin-top:3px;font-variant-numeric:tabular-nums}
.det-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-row span:last-child{color:var(--t1);font-weight:700;font-variant-numeric:tabular-nums}
.det-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:12px;border-top:1.5px solid var(--gold-border);font-size:18px;font-weight:800;color:var(--t1)}
.det-total span:last-child{color:var(--gold2)}
/* Owner: aktif baristalar */
.act-mini{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1px solid #6ee7b7;border-radius:10px;padding:10px 12px;margin-bottom:6px}
.act-mini-dot{width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0;animation:pulse 1.4s infinite}
.act-mini-l{flex:1;min-width:0}
.act-mini-n{font-size:13px;font-weight:800;color:#065f46;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-mini-t{font-size:10px;font-weight:600;color:#047857;margin-top:1px}
.act-mini-r{font-size:14px;font-weight:800;color:#065f46;font-variant-numeric:tabular-nums}
/* ─── Bahşiş kartı ─── */
.tip-card{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1px solid #6ee7b7;border-radius:12px;padding:11px 14px;margin-bottom:12px;gap:10px}
.tip-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tip-i{font-size:22px;flex-shrink:0}
.tip-t{font-size:11px;font-weight:700;color:#047857;text-transform:uppercase;letter-spacing:.5px}
.tip-v{font-size:15px;font-weight:800;color:#065f46;font-variant-numeric:tabular-nums;margin-top:2px}
.tip-btn{padding:8px 12px;border:none;border-radius:9px;background:#10b981;color:#fff;font-family:inherit;font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0;letter-spacing:.3px}
.tip-btn:active{transform:scale(.96)}
/* ─── İstatistik kutuları ─── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 6px;text-align:center}
.stat-l{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.stat-v{font-size:13px;font-weight:800;color:var(--t1);margin:3px 0 1px;font-variant-numeric:tabular-nums}
.stat-s{font-size:9px;color:var(--t3);font-weight:600}
/* ─── Settings tabs ─── */
.set-tabs{display:flex;gap:4px;background:var(--card2);padding:4px;border-radius:10px;margin-bottom:12px}
.set-tab{flex:1;padding:8px 6px;text-align:center;font-size:11px;font-weight:700;color:var(--t2);border-radius:7px;cursor:pointer;transition:all .15s}
.set-tab.on{background:#fff;color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.set-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:5px;gap:10px}
.set-row-l{flex:1;min-width:0}
.set-row-t{font-size:13px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.set-row-s{font-size:10px;color:var(--t3);margin-top:1px;font-weight:500}
.set-input{padding:7px 9px;border:1px solid var(--border2);border-radius:7px;font-family:inherit;font-size:12px;font-weight:700;width:90px;text-align:right;outline:none;color:var(--t1);background:#fff;font-variant-numeric:tabular-nums}
.set-input:focus{border-color:var(--gold)}
.set-input.wide{width:140px;text-align:left}
.set-save{padding:7px 11px;border:none;border-radius:7px;background:var(--gold);color:#1a1a1a;font-family:inherit;font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0}
.set-save:active{transform:scale(.95)}
.log-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 11px;margin-bottom:4px;font-size:11px;line-height:1.4}
.log-h{display:flex;justify-content:space-between;font-weight:700;color:var(--t1)}
.log-h-r{font-size:10px;color:var(--t3);font-weight:600}
.log-d{color:var(--t2);font-size:10px;margin-top:2px}
/* Multi-select chip */
.opt.multi .opt-r{border-radius:5px}
.opt.multi.on .opt-r::after{content:'\2713';color:#fff;font-size:11px;background:transparent;width:auto;height:auto;font-weight:800;display:flex;align-items:center;justify-content:center}
.split-toggle{display:flex;align-items:center;justify-content:space-between;background:#fef3c7;border:1px solid var(--gold-border);border-radius:10px;padding:10px 14px;margin-bottom:8px;cursor:pointer}
.split-toggle.on{background:linear-gradient(135deg,#f5d44b,#d4a020)}
.split-toggle-t{font-size:12px;font-weight:700;color:var(--t1)}
.split-toggle-s{font-size:10px;color:var(--t2);margin-top:2px}
.tg-sw{width:38px;height:22px;background:#d4d4d4;border-radius:11px;position:relative;flex-shrink:0;transition:all .2s}
.tg-sw.on{background:#10b981}
.tg-sw::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg-sw.on::after{left:18px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.wrap>*{animation:fadeIn .25s ease both}.wrap>*:nth-child(2){animation-delay:.03s}.wrap>*:nth-child(3){animation-delay:.06s}.wrap>*:nth-child(n+4){animation-delay:.09s}
/* ─── Recipe Trainer (Тренажёр рецептов) ─── */
.rt-card{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border:1px solid var(--gold-border);border-radius:18px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s;box-shadow:0 4px 14px rgba(212,160,32,.15)}
.rt-card:active{transform:scale(.98)}
.rt-card-ic{font-size:34px;flex-shrink:0}
.rt-card-info{flex:1;min-width:0}
.rt-card-t{font-size:15px;font-weight:800;color:#5a3e00}
.rt-card-s{font-size:11px;font-weight:600;color:#8a6a1a;margin-top:2px}
.rt-card-arr{color:#8a6a1a;font-size:20px}
.rt-hero{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid var(--gold-border);border-radius:20px;padding:20px;margin-bottom:14px;text-align:center}
.rt-hero-ic{font-size:42px;margin-bottom:6px}
.rt-hero-t{font-size:18px;font-weight:800;color:#5a3e00}
.rt-hero-s{font-size:12px;font-weight:600;color:#8a6a1a;margin-top:4px}
.rt-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.rt-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center}
.rt-stat-v{font-size:18px;font-weight:800;color:var(--t1)}
.rt-stat-k{font-size:10px;font-weight:600;color:var(--t3);margin-top:2px;letter-spacing:.3px}
.rt-levels{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rt-lvl{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;transition:transform .15s;position:relative}
.rt-lvl:active{transform:scale(.97)}
.rt-lvl.locked{opacity:.5;cursor:not-allowed}
.rt-lvl.done{border-color:#10b981;background:#ecfdf5}
.rt-lvl-n{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px}
.rt-lvl-t{font-size:14px;font-weight:800;color:var(--t1);margin-top:4px}
.rt-lvl-s{font-size:11px;color:var(--t3);margin-top:4px}
.rt-lvl-badge{position:absolute;top:8px;right:8px;font-size:16px}
.rt-q-bar{background:var(--card);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;border:1px solid var(--border)}
.rt-q-prog{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin:0 12px}
.rt-q-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f59e0b);border-radius:3px;transition:width .3s}
.rt-q-hearts{font-size:14px;letter-spacing:2px}
.rt-q-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:10px}
.rt-q-label{font-size:10.5px;font-weight:700;color:var(--gold2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.rt-q-text{font-size:16px;font-weight:700;line-height:1.4;color:var(--t1)}

<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand()}
// ─── Passcode auth (Wallet style, client-side SHA-256) ───
(function(){
  const HP2=new URLSearchParams((window.location.hash||'').replace(/^#/,''));
  const role=HP2.get('role')||'barista';
  const pwh=(HP2.get('pwh')||'').trim();
  // Owner her zaman içeri girer, passcode yok
  if(role==='owner')return;
  // Bu oturumda bir kez doğrulandıysa tekrar sorma
  try{if(sessionStorage.getItem('cf_pass_ok')==='1')return;}catch(e){}
  const ov=document.getElementById('pass-overlay');
  const boxes=document.querySelectorAll('#passBoxes .pass-box');
  const msg=document.getElementById('passMsg');
  const hint=document.getElementById('passHint');
  if(!pwh){
    document.getElementById('passTitle').textContent='Нет пароля';
    msg.textContent='Попросите владельца назначить вам пароль';
    msg.classList.add('err');
    hint.textContent='';
    document.querySelectorAll('#pass-overlay .pad-key').forEach(b=>b.style.opacity='.3');
  }
  ov.style.display='flex';
  let buf='';
  function paint(){
    boxes.forEach((b,i)=>{
      b.classList.toggle('filled',i<buf.length);
      b.classList.toggle('active',i===buf.length);
      b.textContent=i<buf.length?'•':'';
    });
  }
  async function sha256hex(s){
    const buf2=new TextEncoder().encode(s);
    const hash=await crypto.subtle.digest('SHA-256',buf2);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function submit(){
    if(buf.length!==4)return;
    msg.textContent='⏳ Проверка...';
    msg.classList.remove('err');
    try{
      const h=await sha256hex(buf);
      if(h===pwh){
        try{sessionStorage.setItem('cf_pass_ok','1')}catch(e){}
        msg.textContent='✅ Доступ открыт';
        try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred?.('success')}catch(e){}
        setTimeout(()=>{ov.style.display='none'},250);
      }else{
        msg.textContent='❌ Неверный пароль';
        msg.classList.add('err');
        try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred?.('error')}catch(e){}
        ov.classList.add('shake');setTimeout(()=>ov.classList.remove('shake'),400);
        buf='';setTimeout(paint,150);
      }
    }catch(e){
      msg.textContent='❌ Ошибка: '+e.message;
      msg.classList.add('err');
      buf='';paint();
    }
  }
  document.querySelectorAll('#pass-overlay .pad-key').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(!pwh)return;
      const k=btn.dataset.k;
      if(!k)return;
      if(k==='del'){buf=buf.slice(0,-1);paint();msg.textContent='';return;}
      if(buf.length>=4)return;
      buf+=k;paint();
      try{window.Telegram?.WebApp?.HapticFeedback?.selectionChanged?.()}catch(e){}
      if(buf.length===4)setTimeout(submit,150);
    });
  });
  paint();
})();

const THEME_COLORS={light:{header:'#faf8f4',bg:'#faf8f4'},dark:{header:'#0f1115',bg:'#0f1115'}};
function applyTheme(theme){
  const t=(theme==='dark')?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  // Telegram başlık + arka plan rengini eşitle (mini app penceresi tek renk gözüksün)
  if(tg){
    try{tg.setHeaderColor(THEME_COLORS[t].header);}catch(e){}
    try{tg.setBackgroundColor(THEME_COLORS[t].bg);}catch(e){}
  }
  try{localStorage.setItem('cf_theme',t);}catch(e){}
}
function toggleTheme(ev){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next=(cur==='dark')?'light':'dark';
  // Logo: tek seferlik dönüş animasyonu (bittikten sonra nötrde kalır)
  try{
    const logo=ev&&ev.currentTarget?ev.currentTarget:document.querySelector('.brand-logo');
    if(logo){
      logo.classList.remove('spin');
      // reflow trick — animasyon yeniden tetiklensin
      void logo.offsetWidth;
      logo.classList.add('spin');
      const onEnd=function(){logo.classList.remove('spin');logo.removeEventListener('animationend',onEnd)};
      logo.addEventListener('animationend',onEnd);
      // Mobilde focus/hover state'inin sticky kalmaması için blur ve aktif elementi temizle
      try{logo.blur&&logo.blur()}catch(_){}
      try{document.activeElement&&document.activeElement.blur&&document.activeElement.blur()}catch(_){}
    }
  }catch(e){}
  // Güzel görsel efekt: NERO'dan dalga yayılsın
  try{
    const f=document.createElement('div');
    f.className='theme-flash';
    if(ev&&ev.currentTarget){
      const r=ev.currentTarget.getBoundingClientRect();
      f.style.left=(r.left)+'px';f.style.top=(r.top)+'px';
      f.style.width=r.width+'px';f.style.height=r.height+'px';
    }
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),650);
  }catch(e){}
  if(tg)tg.HapticFeedback?.impactOccurred?.('medium');
  applyTheme(next);
}
// İlk açılışta kayıtlı tercihi uygula (yoksa Telegram'ın temasını izle)
(function initTheme(){
  let saved=null;
  try{saved=localStorage.getItem('cf_theme');}catch(e){}
  if(!saved && tg && tg.colorScheme){saved=tg.colorScheme;} // 'light' | 'dark'
  applyTheme(saved||'light');
})();

function gT(){
  // Toshkent vaqti UTC+5 — qurilma vaqt mintaqasidan qat'iy nazar to'g'ri ishlaydi
  const n=new Date();
  const utc=n.getTime()+n.getTimezoneOffset()*60000;
  return new Date(utc+5*3600000);
}

// Canlı saat — saniyeli, her saniye güncellenir
function uC(){
  const t=gT();
  document.getElementById('clk').textContent=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
  document.getElementById('day').textContent=DR[t.getDay()]+', '+t.getDate()+' '+MO[t.getMonth()];
}

function adjustBottomPadding(){
  const b=document.getElementById('bot');
  const tabs=document.getElementById('tabsEl');
  const tabH=tabs?tabs.offsetHeight:0;
  const botVisible=b&&b.style.display!=='none';
  const botH=botVisible?b.offsetHeight:0;
  const total=tabH+(botVisible?botH+12:8)+16;
  document.body.style.paddingBottom='calc('+total+'px + env(safe-area-inset-bottom))';
}

// ── Sipariş gönder — her zaman toast gösterir ──
function sO(){
  var tot=Object.values(ord).reduce(function(a,v){return a+v},0);
  if(!tot)return;
  // Payload — tam ürün isimleriyle gönder (bot uzun mesajları parçalar).
  // Sadece sendData 4096 byte limitini aşarsa kademeli kısaltmaya geç.
  var maxL=200; // pratik olarak hiçbir isim bunu aşmaz
  var ps;
  do{
    var g=[];
    Object.keys(P).forEach(function(ck){
      var d=P[ck],it=[];
      d.items.forEach(function(p){
        if(ord[p.id]){
          var nm=String(p.n||'');
          if(nm.length>maxL)nm=nm.substring(0,maxL);
          it.push(nm+':'+ord[p.id]);
        }
      });
      if(it.length)g.push(ck+'|'+it.join('|'));
    });
    ps=JSON.stringify({a:'o',g:g,c:tot});
    var bl=0;for(var i=0;i<ps.length;i++){bl+=ps.charCodeAt(i)>127?2:1}
    if(bl<=3800)break;
    maxL-=10;
  }while(maxL>=20);
  // Geçmiş kaydet (tam isimlerle)
  var allNames={};var all=allItems();
  Object.keys(ord).forEach(function(id){var p=all.find(function(x){return x.id===id});if(p)allNames[id]=p.n});
  hist.push({type:'order',items:JSON.parse(JSON.stringify(ord)),names:allNames,date:new Date().toISOString(),user:tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user.first_name:'Бариста'});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('Заказ отправлен!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  ord={};cat=null;render();
  if(tg&&tg.sendData){try{tg.sendData(ps);}catch(e){console.warn('sendData:',e)}}
}

function buildUCard(k,src,todayKey,highlight){
  const sk='uborka_'+k,st=ts[sk]||[],done=st.filter(Boolean).length,total=st.length,ok=done===total&&total>0;
  const isDay=k===todayKey,isEjd=k==='Ежедневно',isMon=k==='Ежемесячно';
  let fb='';
  if(isEjd)fb='<span class="badge badge-today">каждый день</span>';
  else if(isDay)fb='<span class="badge badge-today-big">&#9733; сегодня</span>';
  else if(isMon)fb='<span class="badge badge-month">ежемесячно</span>';
  else fb='<span class="badge badge-week">на неделе</span>';
  const iconEl=highlight?(isDay?'<div class="card-icon today-icon">&#9733;</div>':'<div class="card-icon today-icon">&#9200;</div>'):'';
  const cls='card'+(highlight?' today-card':'');
  return'<div class="'+cls+'" onclick="sub=\''+esc(k)+'\';render()"><div class="card-left">'+iconEl+'<div class="card-info"><div class="card-title">'+k+'</div><div class="card-sub">'+done+'/'+total+' '+fb+'</div></div></div><div class="card-right">'+(ok?'<span class="badge badge-green">&#10003;</span>':'')+(edit?'<button class="xbtn" onclick="event.stopPropagation();dSe(\''+esc(k)+'\')">&#10005;</button>':'<span class="arrow">&#8250;</span>')+'</div></div>';
}

// Aktif vardiya süresini canlı hesapla (H:MM:SS)
function liveDur(startIso){
  if(!startIso)return '0:00:00';
  try{
    const s=new Date(startIso);
    const now=gT();
    const diff=Math.max(0,Math.floor((now.getTime()-s.getTime())/1000)); // saniye
    const h=Math.floor(diff/3600),mn=Math.floor((diff%3600)/60),sc=diff%60;
    return h+':'+String(mn).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  }catch(e){return '0:00:00'}
}
function liveHours(startIso){
  if(!startIso)return 0;
  try{
    const s=new Date(startIso);
    const now=gT();
    return Math.max(0,(now.getTime()-s.getTime())/3600000);
  }catch(e){return 0}
}

// Saatleri okunabilir biçimde göster:
//   0.02h → "1м"
//   0.5h  → "30м"
//   1.5h  → "1ч 30м"
//   8h    → "8ч"
function fmtH(h){
  const n=Number(h)||0;
  if(n<=0)return '0м';
  const totalMin=Math.round(n*60);
  const hh=Math.floor(totalMin/60);
  const mm=totalMin%60;
  if(hh===0)return mm+'м';
  if(mm===0)return hh+'ч';
  return hh+'ч '+mm+'м';
}
function fmtTime(iso){
  if(!iso)return '--:--';
  try{const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}catch(e){return '--:--'}
}
function fmtDay(iso){
  if(!iso)return '';
  try{const d=new Date(iso);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()}catch(e){return ''}
}

// Hızlı istatistik (bugün/hafta) — bitmiş vardiyalardan
function calcQuickStats(shifts){
  const now=gT();
  const today=now.toDateString();
  const wkAgo=new Date(now.getTime()-7*86400000);
  let today_=0,todayShifts=0,week=0,weekShifts=0;
  shifts.forEach(function(sh){
    const dt=new Date(sh.start_time||sh.created_at||sh.date||0);
    if(isNaN(dt))return;
    if(dt.toDateString()===today){today_+=(sh.total||0);todayShifts++}
    if(dt>=wkAgo){week+=(sh.total||0);weekShifts++}
  });
  return {today:today_,todayShifts:todayShifts,week:week,weekShifts:weekShifts};
}

// ── Vardiyayı geriye dönük başlat (HH:MM girişi) ──
function startShiftCustomTime(){
  const inp=document.getElementById('cstStart');
  if(!inp||!inp.value){toast('Укажите время');return}
  const hhmm=inp.value; // 'HH:MM'
  // Bugün için datetime oluştur
  const now=new Date();
  const [hh,mm]=hhmm.split(':').map(function(x){return parseInt(x)||0});
  const customDt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0,0);
  // Geleceğe izin verme
  if(customDt-now>2*60*1000){toast('Время не может быть в будущем');return}
  // 12 saatten eski izin verme (yanlışlıkla)
  if(now-customDt>12*60*60*1000){
    if(!confirm('Указано время более 12 часов назад. Продолжить?'))return;
  }
  if(!confirm('Начать смену с '+hhmm+'?\nВремя прихода будет указано вручную.'))return;
  const customIso=customDt.toISOString();
  SUMMARY.active={start_time:customIso,end_time:null,hours:0,drinks:'{}',bonus:0,hourly_pay:0,total:0};
  toast('🟢 Смена началась с '+hhmm);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'shift_start',start_time:customIso}))}catch(e){console.warn(e)}}
  render();
}

// Manuel bitiş saati — input değiştiğinde
function setEndTime(hhmm){
  if(!hhmm){endDraft.endTime='';render();return}
  const [hh,mm]=hhmm.split(':').map(function(x){return parseInt(x)||0});
  const now=new Date();
  const dt=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0,0);
  endDraft.endTime=dt.toISOString();
  recalcEnd();
}

// Tatlılar için ± ve manuel giriş
function dqDes(id,d){
  endDraft.desserts[id]=Math.max(0,(parseInt(endDraft.desserts[id])||0)+d);
  if(!endDraft.desserts[id])delete endDraft.desserts[id];
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function dqDesManual(id){
  const cur=parseInt(endDraft.desserts[id])||0;
  const v=prompt('Сколько штук?',cur||'');
  if(v===null)return;
  const n=Math.max(0,parseInt(v)||0);
  if(n===0)delete endDraft.desserts[id];else endDraft.desserts[id]=n;
  render();
}

function dqEnd(id,d){
  endDraft.drinks[id]=Math.max(0,(parseInt(endDraft.drinks[id])||0)+d);
  if(!endDraft.drinks[id])delete endDraft.drinks[id];
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function dqEndManual(id){
  const cur=parseInt(endDraft.drinks[id])||0;
  const v=prompt('Сколько штук?',cur||'');
  if(v===null)return;
  const n=Math.max(0,parseInt(v)||0);
  if(n===0)delete endDraft.drinks[id];else endDraft.drinks[id]=n;
  render();
}
function recalcEnd(){
  const active=(SUMMARY||{}).active;if(!active)return;
  // Bitiş zamanı: manuel girildiyse onu kullan, yoksa şu an
  const effEnd=(endDraft.endTime?new Date(endDraft.endTime):new Date());
  const liveH=Math.max(0,(effEnd-new Date(active.start_time))/3600000);
  let drinkBonus=0;
  DRINK_LIST.forEach(function(d){drinkBonus+=(parseInt(endDraft.drinks[d.id])||0)*d.r});
  let desBonus=0;
  DESSERT_LIST.forEach(function(d){desBonus+=(parseInt(endDraft.desserts[d.id])||0)*(parseInt(d.r)||DESSERT_RATE)});
  const hourly=Math.round(liveH*HOURLY_RATE);
  const total=hourly+drinkBonus+desBonus;
  const eHr=document.getElementById('seHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('seBonus');if(eBn)eBn.textContent=fmt(drinkBonus);
  const eDb=document.getElementById('seDesBonus');if(eDb)eDb.textContent=fmt(desBonus);
  const eTt=document.getElementById('seTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  // Saatleri de yenile (manuel saat değiştiyse)
  const ed=document.getElementById('seDur');if(ed)ed.textContent=fmtH(liveH);
  if(endDraft.endTime){
    const en=document.getElementById('seNow');if(en)en.textContent=fmtTime(effEnd.toISOString());
  }
}

function endShiftSave(){
  const active=(SUMMARY||{}).active;
  if(!active){toast('Нет активной смены');return}
  // Bitiş zamanı: manuel girildiyse onu kullan, yoksa şu an
  const effEnd=(endDraft.endTime?new Date(endDraft.endTime):new Date());
  const liveH=Math.max(0,(effEnd-new Date(active.start_time))/3600000);
  let drinkBonus=0;
  DRINK_LIST.forEach(function(d){drinkBonus+=(parseInt(endDraft.drinks[d.id])||0)*d.r});
  let desBonus=0;
  DESSERT_LIST.forEach(function(d){desBonus+=(parseInt(endDraft.desserts[d.id])||0)*(parseInt(d.r)||DESSERT_RATE)});
  const bonus=drinkBonus+desBonus;
  const hourly=Math.round(liveH*HOURLY_RATE);
  const total=hourly+bonus;
  const payload={
    action:'shift_end',
    drinks:endDraft.drinks,
    desserts:endDraft.desserts,
    note:endDraft.note
  };
  if(endDraft.endTime)payload.end_time=endDraft.endTime;
  // Optimistik güncelleme
  const finishedShift={
    start_time:active.start_time,
    end_time:effEnd.toISOString(),
    hours:Math.round(liveH*100)/100,
    drinks:JSON.stringify(endDraft.drinks),
    desserts:JSON.stringify(endDraft.desserts),
    bonus:bonus,dessert_bonus:desBonus,hourly_pay:hourly,total:total,
    note:endDraft.note,
    created_at:active.start_time
  };
  SUMMARY.shifts=SUMMARY.shifts||[];
  SUMMARY.shifts.push(finishedShift);
  SUMMARY.shifts_count=(SUMMARY.shifts_count||0)+1;
  SUMMARY.hours=(SUMMARY.hours||0)+finishedShift.hours;
  SUMMARY.hourly=(SUMMARY.hourly||0)+hourly;
  SUMMARY.bonus=(SUMMARY.bonus||0)+bonus;
  SUMMARY.gross=(SUMMARY.hourly)+(SUMMARY.bonus);
  SUMMARY.fines=SUMMARY.fines||0;
  SUMMARY.paid=SUMMARY.paid||0;
  SUMMARY.net=SUMMARY.gross-SUMMARY.fines-SUMMARY.paid;
  SUMMARY.active=null;
  if(window._endTimer){clearInterval(window._endTimer);window._endTimer=null}
  if(window._actTimer){clearInterval(window._actTimer);window._actTimer=null}
  hist.push({type:'shift',date:new Date().toISOString(),user:MY_NAME,hours:finishedShift.hours,drinks:endDraft.drinks,desserts:endDraft.desserts,note:endDraft.note,total:total});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('🔴 Смена закрыта · '+fmt(total)+' сум');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  endDraft={drinks:{},desserts:{},note:'',endTime:''};
  mView='main';
  render();
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('sendData:',e)}}
}

      +'<div class="hist-r">'+(isOpen?'<span style="color:#059669">●</span>':'+'+fmt(r.total||0))+'</div>'
    +'</div>';

function dq(id,d){
  shiftDraft.drinks[id]=Math.max(0,(parseInt(shiftDraft.drinks[id])||0)+d);
  if(!shiftDraft.drinks[id])delete shiftDraft.drinks[id];
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function dqManual(id){
  const cur=parseInt(shiftDraft.drinks[id])||0;
  const v=prompt('Сколько штук?',cur||'');
  if(v===null)return;
  const n=Math.max(0,parseInt(v)||0);
  if(n===0)delete shiftDraft.drinks[id];else shiftDraft.drinks[id]=n;
  render();
}

function recalcShift(){
  const hours=parseFloat(shiftDraft.hours)||0;
  let bonus=0;
  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});
  const hourly=Math.round(hours*HOURLY_RATE);
  const total=hourly+bonus;
  const eHr=document.getElementById('sfHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('sfBonus');if(eBn)eBn.textContent=fmt(bonus);
  const eTt=document.getElementById('sfTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  const eHt=document.getElementById('sfHourHint');if(eHt)eHt.textContent=hours>0?(hours+'h × 12.000 = '+fmt(hourly)+' сум'):'Введите количество часов';
  const eBt=document.getElementById('sfBtn');if(eBt){const ok=hours>0;eBt.disabled=!ok;eBt.classList.toggle('grn',ok);eBt.textContent=ok?('💾 Записать смену · '+fmt(total)+' сум'):'Введите часы';}
}

function saveShift(){
  const hours=parseFloat(shiftDraft.hours)||0;
  if(hours<=0)return;
  let bonus=0;
  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});
  const hourly=Math.round(hours*HOURLY_RATE);
  const total=hourly+bonus;
  const payload={action:'shift',hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note};
  // Optimistik güncelleme — kullanıcı uygulamada hemen sonucu görür
  SUMMARY.hours=(SUMMARY.hours||0)+hours;
  SUMMARY.hourly=(SUMMARY.hourly||0)+hourly;
  SUMMARY.bonus=(SUMMARY.bonus||0)+bonus;
  SUMMARY.gross=(SUMMARY.hourly||0)+(SUMMARY.bonus||0);
  SUMMARY.fines=SUMMARY.fines||0;
  SUMMARY.paid=SUMMARY.paid||0;
  SUMMARY.net=SUMMARY.gross-SUMMARY.fines-SUMMARY.paid;
  SUMMARY.shifts_count=(SUMMARY.shifts_count||0)+1;
  SUMMARY.shifts=SUMMARY.shifts||[];
  SUMMARY.shifts.push({hours:hours,drinks:JSON.stringify(shiftDraft.drinks),bonus:bonus,hourly_pay:hourly,total:total,created_at:new Date().toISOString()});
  // Lokal geçmişe de kaydet
  hist.push({type:'shift',date:new Date().toISOString(),user:MY_NAME,hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note,total:total});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('💾 Смена записана!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  shiftDraft={hours:'',drinks:{},note:''};
  mView='main';
  render();
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('sendData:',e)}}
}

// ── Owner: Ceza ekleme ekranı (çoklu hedef + zorunlu sebep + split) ──
function rMFine(m,b){
  if(MY_ROLE!=='owner'){mView='main';render();return}
  // İlk açılışta inspection preset'iyse split otomatik aç
  const isInsp=String(fineDraft.type||'').indexOf('insp_')===0||fineDraft.type==='foreign';
  let h='<button class="back" onclick="mView=\'main\';render()">‹ Назад</button>';
  h+='<div class="sec">⚠️ Добавить штраф</div>';

  // Tip seç (önce)
  h+='<div class="sf-label" style="margin:8px 0 6px">Тип штрафа</div>';
  FINE_PRESETS.forEach(function(p){
    const sel=fineDraft.type===p.id;
    h+='<div class="opt '+(sel?'on':'')+'" onclick="selFineType(\''+p.id+'\')">'
      +'<div class="opt-r"></div>'
      +'<div class="opt-l"><div class="opt-t">'+p.l+'</div><div class="opt-s">'+p.s+'</div></div>'
      +(p.amt?'<div class="opt-amt">'+fmt(p.amt)+'</div>':'')

  });

  // Custom amount
  if(fineDraft.type==='custom'){
    h+='<div class="sf-label" style="margin:14px 0 6px">Сумма (сум)</div>'
      +'<input class="sf-hours" type="number" inputmode="numeric" min="1" value="'+escH(String(fineDraft.custom||''))+'" oninput="fineDraft.custom=this.value;fineDraft.amount=parseInt(this.value)||0;recalcFine()" placeholder="например 50000">';
  }

  // Split toggle (denetim cezalarında otomatik öneri)
  h+='<div class="sf-label" style="margin:14px 0 6px">Кому?</div>';
  h+='<div class="split-toggle '+(fineDraft.split?'on':'')+'" onclick="fineDraft.split=!fineDraft.split;render()">'
    +'<div><div class="split-toggle-t">⚖️ Разделить на нескольких</div><div class="split-toggle-s">'+(fineDraft.split?'Сумма поделится поровну':'Полная сумма каждому выбранному')+'</div></div>'
    +'<div class="tg-sw '+(fineDraft.split?'on':'')+'"></div>'
  +'</div>';
  // Şef %50 öder toggle (sadece denetim/проверка cezalarında öneri)
  h+='<div class="split-toggle '+(fineDraft.chefShare?'on':'')+'" style="margin-top:6px" onclick="fineDraft.chefShare=!fineDraft.chefShare;render()">'
    +'<div><div class="split-toggle-t">🍴 Шеф платит 50%</div><div class="split-toggle-s">'+(fineDraft.chefShare?'Половина суммы — на шефа (вы)':'Бариста платят полную сумму')+'</div></div>'
    +'<div class="tg-sw '+(fineDraft.chefShare?'on':'')+'"></div>'
  +'</div>';
  if(isInsp&&!fineDraft.split){
    h+='<div class="refresh-hint" style="margin-top:0">💡 Это проверка — обычно штраф делится между баристами в смене.</div>';
  }

  // Çoklu barista seç (checkbox tarzı)
  const _FB=BARISTAS.filter(function(x){return !x.arch});
  if(!_FB.length){
    h+='<div class="empty-mini">Нет баристов. Они должны написать боту /start.</div>';
  } else {
    _FB.forEach(function(brs){
      const sel=fineDraft.targets.indexOf(brs.id)>=0;
      h+='<div class="opt multi '+(sel?'on':'')+'" onclick="toggleFineTarget('+brs.id+')">'
        +'<div class="opt-r"></div>'
        +'<div class="opt-l"><div class="opt-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="opt-s">'+(brs.u?'@'+escH(brs.u)+' · ':'')+'штраф в мес.: '+fmt(brs.f||0)+'</div></div>'
      +'</div>';
    });
  }

  // Sebep — ZORUNLU
  h+='<div class="sf-label" style="margin:14px 0 6px">Причина <span style="color:var(--red);font-weight:800">*</span></div>'
    +'<textarea class="sf-note" rows="2" placeholder="обязательно укажите причину" oninput="fineDraft.reason=this.value;recalcFine()">'+escH(fineDraft.reason||'')+'</textarea>';

  // Toplam
  const cnt=fineDraft.targets.length;
  const totalAmt=fineDraft.amount;
  const baristaPool=fineDraft.chefShare?Math.floor(totalAmt/2):totalAmt;
  const chefAmt=fineDraft.chefShare?(totalAmt-baristaPool):0;
  const per=(fineDraft.split&&cnt>1)?Math.floor(baristaPool/cnt):baristaPool;
  h+='<div class="sf-total">'
    +'<div class="sf-tot-row"><span>Получателей</span><span>'+cnt+'</span></div>'
    +(fineDraft.chefShare?'<div class="sf-tot-row"><span>Полная сумма</span><span>-'+fmt(totalAmt)+'</span></div>':'')
    +(fineDraft.chefShare?'<div class="sf-tot-row" style="color:#f59e0b"><span>🍴 Доля шефа (вы)</span><span>-'+fmt(chefAmt)+'</span></div>':'')
    +(fineDraft.split&&cnt>1?'<div class="sf-tot-row"><span>На баристов</span><span>-'+fmt(baristaPool)+'</span></div>':'')
    +'<div class="sf-tot-big"><span>'+(fineDraft.split&&cnt>1?'Каждому':'Штраф бариста')+'</span><span id="fnAmt">-'+fmt(per)+' сум</span></div>'
  +'</div>';

  h+='<div class="footer">XSYN</div>';

  const ok=cnt>0&&fineDraft.amount>0&&reasonOk;
  b.innerHTML='<button class="mbtn" id="fnBtn" '+(ok?'':'disabled')+' onclick="saveFine()">'+(ok?'⚠️ Записать штраф · -'+fmt(per)+' сум'+(fineDraft.split&&cnt>1?' × '+cnt:'')+(fineDraft.chefShare?' (+ вы -'+fmt(chefAmt)+')':''):(reasonOk?'Выберите получателей':'Укажите причину'))+'</button>';
}

function toggleFineTarget(uid){
  const i=fineDraft.targets.indexOf(uid);
  if(i>=0)fineDraft.targets.splice(i,1);else fineDraft.targets.push(uid);
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}

function selFineType(t){
  fineDraft.type=t;
  const p=FINE_PRESETS.find(function(x){return x.id===t});
  if(p&&t!=='custom')fineDraft.amount=p.amt;
  if(t==='custom')fineDraft.amount=parseInt(fineDraft.custom)||0;
  // Inspection preset'lerinde split otomatik aç (checkbox manuel kapatılırsa kapanır)
  if(t.indexOf('insp_')===0||t==='foreign')fineDraft.split=true;
  render();
}
function recalcFine(){
  // Sadece toplamı güncelle (re-render etmeden)
  const cnt=fineDraft.targets.length;
  const per=(fineDraft.split&&cnt>1)?Math.floor(fineDraft.amount/cnt):fineDraft.amount;
  const eA=document.getElementById('fnAmt');if(eA)eA.textContent='-'+fmt(per)+' сум';
  const eB=document.getElementById('fnBtn');if(eB){
    const reasonOk=(fineDraft.reason||'').trim().length>0;
    const ok=cnt>0&&fineDraft.amount>0&&reasonOk;
    eB.disabled=!ok;
    eB.textContent=ok?'⚠️ Записать штраф · -'+fmt(per)+' сум'+(fineDraft.split&&cnt>1?' × '+cnt:''):(reasonOk?'Выберите получателей':'Укажите причину');
  }
}

function saveFine(){
  const cnt=fineDraft.targets.length;
  const reason=(fineDraft.reason||'').trim();
  if(cnt===0||fineDraft.amount<=0||!reason){
    if(!reason)toast('❌ Причина обязательна');
    return;
  }
  const chefShare=!!fineDraft.chefShare;
  const totalAmt=fineDraft.amount;
  const baristaPool=chefShare?Math.floor(totalAmt/2):totalAmt;
  const chefAmt=chefShare?(totalAmt-baristaPool):0;
  const split=fineDraft.split&&cnt>1;
  const per=split?Math.floor(baristaPool/cnt):baristaPool;
  // Lokal güncelleme — baristalar
  fineDraft.targets.forEach(function(uid){
    const t=BARISTAS.find(function(x){return x.id===uid});
    if(t){t.f=(t.f||0)+per;t.net=(t.net||0)-per}
  });
  // Lokal güncelleme — şefin (kendi) payı
  if(chefShare&&chefAmt>0){
    const me=BARISTAS.find(function(x){return x.id===MY_UID});
    if(me){me.f=(me.f||0)+chefAmt;me.net=(me.net||0)-chefAmt}
  }
  const payload={action:'fine',targets:fineDraft.targets,amount:totalAmt,reason:reason,type:fineDraft.type,split:split,chef_share:chefShare};
  toast(chefShare?('🍴 Штраф разделён со шефом'):(split?('⚠️ Штраф разделён · '+cnt+' чел.'):'⚠️ Штраф записан'));
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  fineDraft={targets:[],type:'clean',amount:30000,reason:'',custom:'',split:false,chefShare:false};
  mView='main';
  render();
}

function rMTips(m,b){
  if(MY_ROLE!=='owner'){mView='main';render();return}
  let h='<button class="back" onclick="mView=\'main\';render()">‹ Назад</button>';
  h+='<div class="sec">💝 Раздать чаевые</div>';
  h+='<div class="refresh-hint" style="margin-top:0">Введите общую сумму, выберите кому, при необходимости вручную распределите.</div>';

  h+='<div class="sf-label" style="margin:6px 0 6px">Общая сумма (сум)</div>'
    +'<input class="sf-hours" type="number" inputmode="numeric" min="0" placeholder="например 200000" value="'+escH(String(tipDraft.total||''))+'" oninput="tipDraft.total=this.value;recalcTips()">';

  // Mod seç (eşit / manuel)
  h+='<div class="sf-label" style="margin:14px 0 6px">Распределение</div>';
  h+='<div class="set-tabs">'
    +'<div class="opt '+(tipDraft.mode==='equal'?'on':'')+'" style="flex:1;margin:0" onclick="tipDraft.mode=\'equal\';render()"><div class="opt-r"></div><div class="opt-l"><div class="opt-t">⚖️ Поровну</div><div class="opt-s">между выбранными</div></div></div>'
    +'<div class="opt '+(tipDraft.mode==='custom'?'on':'')+'" style="flex:1;margin:0" onclick="tipDraft.mode=\'custom\';render()"><div class="opt-r"></div><div class="opt-l"><div class="opt-t">✏️ Вручную</div><div class="opt-s">укажите каждому</div></div></div>'
  +'</div>';

  // Bariston seç / dağıt
  h+='<div class="sf-label" style="margin:14px 0 6px">Кому?</div>';
  const _TB=BARISTAS.filter(function(x){return !x.arch});
  if(!_TB.length){
    h+='<div class="empty-mini">Нет баристов.</div>';
  } else {
    _TB.forEach(function(brs){
      const sel=tipDraft.distributions[brs.id]!==undefined;
      const val=tipDraft.distributions[brs.id]||0;
      if(tipDraft.mode==='custom'){
        h+='<div class="set-row">'
          +'<div class="set-row-l"><div class="set-row-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div>'
            +'<div class="set-row-s">'+(brs.u?'@'+escH(brs.u):'')+'</div></div>'
          +'<input class="set-input" type="number" inputmode="numeric" min="0" placeholder="0" value="'+(val||'')+'" oninput="setTipFor('+brs.id+',this.value)">'
        +'</div>';
      } else {
        h+='<div class="opt multi '+(sel?'on':'')+'" onclick="toggleTipTarget('+brs.id+')">'
          +'<div class="opt-r"></div>'
          +'<div class="opt-l"><div class="opt-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="opt-s">'+(brs.u?'@'+escH(brs.u):'')+'</div></div>'
        +'</div>';
      }
    });
  }

  // Not
  h+='<div class="sf-label" style="margin:14px 0 6px">Заметка (необязательно)</div>'
    +'<textarea class="sf-note" rows="2" placeholder="например: вечерние чаевые" oninput="tipDraft.note=this.value">'+escH(tipDraft.note||'')+'</textarea>';

  // Toplam
  const calc=calcTipPlan();
  h+='<div class="sf-total">'
    +'<div class="sf-tot-row"><span>Получателей</span><span>'+calc.cnt+'</span></div>'
    +'<div class="sf-tot-row"><span>Сумма</span><span id="tpTotal">'+fmt(calc.total)+' сум</span></div>'
    +(calc.cnt>0&&tipDraft.mode==='equal'?'<div class="sf-tot-row"><span>Каждому</span><span>+'+fmt(calc.per)+' сум</span></div>':'')
    +'<div class="sf-tot-big"><span>ИТОГО</span><span>+'+fmt(calc.sum)+' сум</span></div>'
  +'</div>';

  h+='<div class="footer">XSYN</div>';
  m.innerHTML=h;b.style.display='block';
  const ok=calc.cnt>0&&calc.sum>0;
  b.innerHTML='<button class="mbtn '+(ok?'grn':'')+'" '+(ok?'':'disabled')+' onclick="saveTips()">'+(ok?'💝 Раздать +'+fmt(calc.sum)+' сум':'Введите сумму и выберите бариста')+'</button>';
}
function toggleTipTarget(uid){
  if(tipDraft.distributions[uid]!==undefined)delete tipDraft.distributions[uid];
  else tipDraft.distributions[uid]=0;
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function setTipFor(uid,v){tipDraft.distributions[uid]=parseInt(v)||0;recalcTips()}
function calcTipPlan(){
  const total=parseInt(tipDraft.total)||0;
  const ids=Object.keys(tipDraft.distributions).map(function(x){return parseInt(x)});
  const cnt=ids.length;
  if(tipDraft.mode==='equal'){
    const per=cnt>0?Math.floor(total/cnt):0;
    return {cnt:cnt,total:total,per:per,sum:per*cnt};
  } else {
    let s=0;ids.forEach(function(u){s+=parseInt(tipDraft.distributions[u])||0});
    return {cnt:cnt,total:s,per:0,sum:s};
  }
}
function recalcTips(){
  const calc=calcTipPlan();
  const e=document.getElementById('tpTotal');if(e)e.textContent=fmt(calc.total)+' сум';
}
function saveTips(){
  const calc=calcTipPlan();
  if(calc.cnt===0||calc.sum<=0)return;
  // Dağıtım planı: {uid:amount}
  const dist={};
  if(tipDraft.mode==='equal'){
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=calc.per});
  } else {
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=parseInt(tipDraft.distributions[u])||0});
  }
  const payload={action:'tip_distribute',distributions:dist,note:(tipDraft.note||'').trim(),total:calc.sum,mode:tipDraft.mode};
  toast('💝 Чаевые розданы · '+calc.cnt+' чел.');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  tipDraft={total:'',distributions:{},note:'',mode:'equal'};
  mView='main';render();
}

// Cyrillic → latin transliteration (id otomatik üretmek için)
function translit(s){
  const map={
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z',
    'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
    'с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch',
    'ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
  };
  let out='';
  for(const ch of (s||'').toLowerCase()){
    if(map[ch]!==undefined)out+=map[ch];
    else if(/[a-z0-9]/.test(ch))out+=ch;
    else if(ch===' '||ch==='-'||ch==='_')out+='_';
    // diğer karakterleri atla
  }
  // Birden fazla _ olmasın
  out=out.replace(/_+/g,'_').replace(/^_|_$/g,'');
  return out||'item';
}

const RT_LEVELS=[
  {n:1,t:'Новичок',d:'Простые вопросы',q:8,mix:{q1:1,q2:0,q3:0},pass:70},
  {n:2,t:'Ученик',d:'Больше вариантов',q:10,mix:{q1:1,q2:0,q3:0},pass:75},
  {n:3,t:'Бариста',d:'+ Что не входит?',q:12,mix:{q1:.6,q2:.4,q3:0},pass:75},
  {n:4,t:'Мастер',d:'+ Провокации',q:14,mix:{q1:.45,q2:.3,q3:.25},pass:80},
  {n:5,t:'Эксперт',d:'Максимальный хардкор',q:16,mix:{q1:.3,q2:.3,q3:.4},pass:85}
];
function rtPool(){const s=new Set();RT_RECIPES.forEach(r=>r.i.forEach(x=>s.add(x[0])));return Array.from(s);}
function rtNotIn(r){const set=new Set(r.i.map(x=>x[0]));return rtPool().filter(x=>!set.has(x));}
function rtAllValues(){const s=new Set();RT_RECIPES.forEach(r=>r.i.forEach(x=>s.add(x[1])));return Array.from(s);}
function rtShuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a;}
function rtPick(a){return a[Math.floor(Math.random()*a.length)];}
function rtUnit(v){const m=/(г|мл|шт)$/.exec(v);return m?m[1]:'';}
function rtFakeVals(correct,n){const u=rtUnit(correct),pool=rtAllValues().filter(v=>rtUnit(v)===u&&v!==correct);return rtShuffle(pool).slice(0,n);}
function rtMakeQ(type){
  const r=rtPick(RT_RECIPES);
  if(type==='q1'||(!r.i.length)){
    const ing=rtPick(r.i);
    const opts=rtShuffle([ing[1],...rtFakeVals(ing[1],3)]);
    return{type:'q1',text:'Сколько «'+ing[0]+'» в напитке «'+r.n+'»?',opts:opts,correct:ing[1],hint:r.n};
  }
  if(type==='q2'){
    const ni=rtNotIn(r);if(!ni.length)return rtMakeQ('q1');
    const correct=rtPick(ni);
    const wrongs=rtShuffle(r.i.map(x=>x[0])).slice(0,3);
    if(wrongs.length<3){const extra=rtShuffle(rtPool().filter(x=>x!==correct&&!wrongs.includes(x))).slice(0,3-wrongs.length);wrongs.push(...extra);}
    return{type:'q2',text:'Что НЕ входит в «'+r.n+'»?',opts:rtShuffle([correct,...wrongs]),correct:correct,hint:'Внимательно подумай о составе'};
  }
  // q3 — trick
  const ni=rtNotIn(r);if(!ni.length)return rtMakeQ('q1');
  const fake=rtPick(ni);
  const fakeAmounts=rtShuffle(rtAllValues().filter(v=>rtUnit(v)==='мл'||rtUnit(v)==='г')).slice(0,3);
  return{type:'q3',text:'Сколько «'+fake+'» добавляется в «'+r.n+'»?',opts:rtShuffle(['не добавляется',...fakeAmounts]),correct:'не добавляется',hint:'Подумай, есть ли вообще этот ингредиент?'};
}
function rtBuildSession(level){
  const cfg=RT_LEVELS[level-1],qs=[],mix=cfg.mix;
  for(let i=0;i<cfg.q;i++){
    const r=Math.random();let type='q1';
    if(r<mix.q1)type='q1';else if(r<mix.q1+mix.q2)type='q2';else type='q3';
    qs.push(rtMakeQ(type));
  }
  return qs;
}

let RT_TIMER=null;
function rtClearTimer(){if(RT_TIMER){clearInterval(RT_TIMER);RT_TIMER=null}}
function rtUpdateTimerDom(){
  const ring=document.querySelector('.rt-timer-ring');if(!ring||!RT)return;
  const tLeft=Math.max(0,RT.timeLeft||0),tMax=RT.timePerQ||10;
  const ringR=15,ringC=2*Math.PI*ringR;
  const dash=ringC*(1-tLeft/tMax);
  ring.classList.toggle('warn',tLeft<=4&&tLeft>2);
  ring.classList.toggle('danger',tLeft<=2);
  const fg=ring.querySelector('.fg');if(fg)fg.setAttribute('stroke-dashoffset',dash);
  const num=ring.querySelector('.rt-timer-num');if(num)num.textContent=tLeft;
}
function rtStartTimer(){
  rtClearTimer();
  if(!RT)return;
  RT.timePerQ=10;RT.timeLeft=10;RT.qStartedAt=Date.now();
  RT_TIMER=setInterval(function(){
    if(!RT||RT.answered||RT.done){rtClearTimer();return}
    RT.timeLeft=Math.max(0,RT.timePerQ-Math.floor((Date.now()-RT.qStartedAt)/1000));
    rtUpdateTimerDom();
    if(RT.timeLeft<=0){rtTimeout();return}
  },250);
}
function rtTimeout(){
  if(!RT||RT.answered)return;
  rtClearTimer();
  RT.answered=true;RT.pickedIdx=-1;RT.timedOut=true;
  RT.streak=0;RT.hearts=Math.max(0,RT.hearts-1);
  if(tg)tg.HapticFeedback?.notificationOccurred('error');
  render();
}
function rtStart(level){
  rtClearTimer();
  RT={mode:'practice',level:level,qs:rtBuildSession(level),idx:0,correct:0,xp:0,streak:0,maxStreak:0,hearts:3,answered:false,pickedIdx:-1,done:false,total:0,ready:true,timeBonus:0,lastGain:0,lastSpeed:0,timedOut:false,timePerQ:10,timeLeft:10};
  RT.total=RT.qs.length;
  render();
}
// ─── Resmi Sınav (Зачёт) ───
const RT_EXAM_KEY='cf_rt_exam_v1';
function getLastExam(){try{return JSON.parse(localStorage.getItem(RT_EXAM_KEY))||null}catch(e){return null}}
function saveLastExam(d){try{localStorage.setItem(RT_EXAM_KEY,JSON.stringify(d))}catch(e){}}
function rtBuildExam(){
  // 30 soru: 40% Q1 (basit), 30% Q2 (что не входит), 30% Q3 (provokasyon)
  const qs=[];
  for(let i=0;i<30;i++){
    const r=Math.random();
    let type='q1';
    if(r<0.4)type='q1';else if(r<0.7)type='q2';else type='q3';
    qs.push(rtMakeQ(type));
  }
  return qs;
}
function rtStartExam(){
  const last=getLastExam();
  if(last&&new Date(last.date).toDateString()===new Date().toDateString()){
    if(typeof toast==='function')toast('⏳ Уже сдавали сегодня — приходите завтра');
    return;
  }
  rtClearTimer();
  RT={mode:'exam',level:0,qs:rtBuildExam(),idx:0,correct:0,xp:0,streak:0,maxStreak:0,hearts:99,answered:false,pickedIdx:-1,done:false,total:30,ready:true,timeBonus:0,lastGain:0,lastSpeed:0,timedOut:false,timePerQ:15,timeLeft:15,examPass:90};
  render();
}
function rtStartExamTimer(){
  rtClearTimer();
  if(!RT)return;
  RT.timePerQ=(RT.mode==='exam')?15:10;RT.timeLeft=RT.timePerQ;RT.qStartedAt=Date.now();
  RT_TIMER=setInterval(function(){
    if(!RT||RT.answered||RT.done){rtClearTimer();return}
    RT.timeLeft=Math.max(0,RT.timePerQ-Math.floor((Date.now()-RT.qStartedAt)/1000));
    rtUpdateTimerDom();
    if(RT.timeLeft<=0){rtTimeout();return}
  },250);
}
function rtBegin(){
  if(!RT)return;
  RT.ready=false;
  if(RT.mode==='exam')rtStartExamTimer();else rtStartTimer();
  render();
}
function rtAbort(){rtClearTimer();RT=null;render();}
function showBonusFly(txt){
  try{
    const el=document.createElement('div');
    el.className='rt-bonus-fly';el.textContent=txt;
    document.body.appendChild(el);
    setTimeout(function(){el.remove()},900);
  }catch(e){}
}
function rtAnswer(i){
  if(!RT||RT.answered)return;
  rtClearTimer();
  RT.answered=true;RT.pickedIdx=i;RT.timedOut=false;
  const q=RT.qs[RT.idx],ok=q.opts[i]===q.correct;
  const elapsed=Math.min(10,(Date.now()-RT.qStartedAt)/1000);
  const speedSec=Math.max(0,10-elapsed); // hızlı cevap → daha çok puan
  if(ok){
    const base=10;
    const speedBonus=Math.round(speedSec*2); // max ~20 ekstra (10s × 2)
    const gain=base+speedBonus;
    RT.correct++;RT.xp+=gain;RT.lastGain=gain;RT.lastSpeed=Math.round(speedSec);
    RT.timeBonus+=speedBonus;
    RT.streak++;if(RT.streak>RT.maxStreak)RT.maxStreak=RT.streak;
    if(tg)tg.HapticFeedback?.notificationOccurred('success');
    showBonusFly('+'+gain);
  }
  else{RT.streak=0;RT.hearts=Math.max(0,RT.hearts-1);if(tg)tg.HapticFeedback?.notificationOccurred('error');}
  render();
}
function rtNext(){
  if(!RT)return;
  rtClearTimer();
  // Exam modu: can yok, sadece soru bittiğinde biter
  if(RT.mode!=='exam'&&RT.hearts<=0){RT.done=true;finishGame();render();return;}
  RT.idx++;RT.answered=false;RT.pickedIdx=-1;RT.timedOut=false;
  if(RT.idx>=RT.qs.length){RT.done=true;finishGame();}
  else{
    if(RT.mode==='exam')rtStartExamTimer();else rtStartTimer();
  }
  render();
}

const OKK_INSPECTIONS=[
  'корпус эспрессо-машины (чистота, без трещин)',
  'холдеры (все на месте, чистые)',
  'питчеры для молока (чистые, без накипи)',
  'темпер для кофе',
  'кофемолку и зону вокруг неё',
  'холодильник внутри',
  'витрину с круассанами',
  'льдогенератор внутри',
  'раковину и зону мойки',
  'полотенца для рук',
  'рабочую поверхность бара',
  'пол под оборудованием'
];
let EX=null;       // active exam state
let EX_TIMER=null;
function examInvite(barId,name){
  if(!confirm('Назначить зачёт для '+name+'?\n\nОн получит уведомление и должен открыть приложение.'))return;
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'exam_invite',target:barId}));}catch(e){console.warn(e)}}
  toast('🎓 Приглашение отправлено');
}
function examShouldOpen(){
  return PENDING_EXAM&&PENDING_EXAM.id&&!sessionStorage.getItem('exam_done_'+PENDING_EXAM.id);
}
function examBuild(){
  // 12 bilgi sorusu + 8 fotoğrafli denetim, karışık sıra
  const know=[];for(let i=0;i<12;i++){const r=Math.random();let t='q1';if(r<0.5)t='q1';else if(r<0.8)t='q2';else t='q3';know.push(Object.assign({kind:'know'},rtMakeQ(t)));}
  const insp=[];const usedTargets=new Set();
  while(insp.length<8){const tg2=OKK_INSPECTIONS[Math.floor(Math.random()*OKK_INSPECTIONS.length)];if(!usedTargets.has(tg2)){usedTargets.add(tg2);insp.push({kind:'photo',target:tg2});}}
  // Karışık dizilim: 5 know, 1 photo, 5 know, 4 photo, 2 know, 3 photo (örnek değil — basit shuffle)
  const all=know.concat(insp);
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]]}
  return all;
}
function examOpen(){
  if(!PENDING_EXAM)return;
  EX={inviteId:PENDING_EXAM.id,by:PENDING_EXAM.by,phase:'preflight',pre:{battery:false,camera:false,shift:false},qs:[],idx:0,correct:0,answered:false,pickedIdx:-1,timeLeft:0,timePerQ:10,qStartedAt:0,timedOut:false,results:[],photos:{}};
  document.getElementById('exam-fs').classList.add('on');
  document.body.style.overflow='hidden';
  if(tg&&tg.expand)try{tg.expand()}catch(e){}
  if(tg&&tg.requestFullscreen)try{tg.requestFullscreen()}catch(e){}
  if(tg&&tg.disableClosingConfirmation)try{tg.disableClosingConfirmation()}catch(e){}
  if(tg&&tg.enableClosingConfirmation)try{tg.enableClosingConfirmation()}catch(e){}
  examRender();
}
function examClose(){
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  document.getElementById('exam-fs').classList.remove('on');
  document.body.style.overflow='';
  EX=null;
  if(PENDING_EXAM){sessionStorage.setItem('exam_done_'+PENDING_EXAM.id,'1');PENDING_EXAM=null;}
  render();
}
function examRender(){
  const fs=document.getElementById('exam-fs');if(!EX){fs.classList.remove('on');return}
  let h='<div class="ex-head"><div><div class="ex-brand">CAFFELITO · ЗАЧЁТ</div><div class="ex-byname">От: '+escH(EX.by||'Шеф')+'</div></div><div class="ex-locked">🔒 НЕ ЗАКРЫВАТЬ</div></div>';
  if(EX.phase==='preflight'){
    h+='<div class="ex-pre">';
    h+='<div class="ex-pre-ic">🎓</div>';
    h+='<div class="ex-pre-t">Зачётная сессия</div>';
    h+='<div class="ex-pre-by">Подтвердите готовность</div>';
    h+='<div class="ex-check-list">';
    h+='<label class="ex-check '+(EX.pre.battery?'ok':'')+'"><input type="checkbox" '+(EX.pre.battery?'checked':'')+' onclick="EX.pre.battery=this.checked;examRender()"><span>🔋 Заряд телефона ≥ 50%</span></label>';
    h+='<label class="ex-check '+(EX.pre.camera?'ok':'')+'"><input type="checkbox" '+(EX.pre.camera?'checked':'')+' onclick="EX.pre.camera=this.checked;examRender()"><span>📷 Камера и интернет работают</span></label>';
    h+='<label class="ex-check '+(EX.pre.shift?'ok':'')+'"><input type="checkbox" '+(EX.pre.shift?'checked':'')+' onclick="EX.pre.shift=this.checked;examRender()"><span>🟢 Я нахожусь в смене</span></label>';
    h+='</div>';
    const ready=EX.pre.battery&&EX.pre.camera&&EX.pre.shift;
    h+='<button class="ex-go" '+(ready?'':'disabled')+' onclick="examBegin()">Начать зачёт ▸</button>';
    h+='<div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:14px;text-align:center;line-height:1.5">После начала экран нельзя закрыть.<br>20 вопросов · бил. (10 сек) + фото (30 сек)</div>';
    h+='</div>';
  } else if(EX.phase==='question'){
    const q=EX.qs[EX.idx],pct=(EX.idx/EX.qs.length)*100;
    const timerCls=EX.timeLeft<=2?'danger':(EX.timeLeft<=4?'warn':'');
    const tFillPct=(EX.timeLeft/EX.timePerQ)*100;
    h+='<div class="ex-q-bar"><span class="ex-q-idx">'+(EX.idx+1)+' / '+EX.qs.length+'</span><div class="ex-q-prog"><div class="ex-q-fill" style="width:'+pct+'%"></div></div><span class="ex-q-idx" id="exTNum"><span class="ex-timer-num '+timerCls+'" style="font-size:18px">'+EX.timeLeft+'с</span></span></div>';
    h+='<div class="ex-timer-bar"><div class="ex-timer-fill '+timerCls+'" id="exTFill" style="width:'+tFillPct+'%"></div></div>';
    if(q.kind==='know'){
      h+='<div class="ex-card"><div class="ex-kind">Вопрос знаний</div><div class="ex-text">'+q.text+'</div></div>';
      h+='<div class="ex-opts">';
      q.opts.forEach(function(opt,i){
        let cls='ex-opt';
        if(EX.answered){cls+=' disabled';if(opt===q.correct)cls+=EX.pickedIdx===i?' correct':' reveal';else if(EX.pickedIdx===i)cls+=' wrong';}
        h+='<div class="'+cls+'" onclick="'+(EX.answered?'':'examAnswer('+i+')')+'">'+opt+'</div>';
      });
      h+='</div>';
      if(EX.answered){
        const ok=q.opts[EX.pickedIdx]===q.correct;
        h+='<div class="ex-fb '+(ok?'ok':'no')+'">'+(ok?'✓ Верно':(EX.timedOut?'⏱ Время вышло. Правильно: '+q.correct:'✗ Правильно: '+q.correct))+'</div>';
        h+='<button class="ex-next" onclick="examNext()">'+(EX.idx+1>=EX.qs.length?'Завершить':'Дальше')+' ▸</button>';
      }
    } else {
      // photo question
      h+='<div class="ex-card"><div class="ex-kind photo">📷 Фото-проверка</div><div class="ex-text">Сфотографируйте: <b>'+q.target+'</b></div><div class="ex-photo-prompt">Откройте камеру, сфотографируйте указанный объект и отправьте его в личные сообщения боту. После — нажмите кнопку ниже.</div>';
      if(EX.photos[EX.idx]){
        h+='<div class="ex-photo-preview"><img src="'+EX.photos[EX.idx]+'"></div>';
      }
      h+='</div>';
      if(!EX.answered){
        h+='<input class="ex-photo-input" id="exPhotoInput" type="file" accept="image/*" capture="environment" onchange="examPhotoCaptured(event)">';
        h+='<button class="ex-photo-btn" onclick="document.getElementById(\'exPhotoInput\').click()">📷 Открыть камеру</button>';
        if(EX.photos[EX.idx]){
          h+='<button class="ex-next" style="margin-top:8px" onclick="examPhotoConfirm()">✓ Я сфотографировал — далее</button>';
        }
      } else {
        h+='<div class="ex-fb ok">✓ Принято</div>';
        h+='<button class="ex-next" onclick="examNext()">'+(EX.idx+1>=EX.qs.length?'Завершить':'Дальше')+' ▸</button>';
      }
    }
  } else if(EX.phase==='done'){
    const total=EX.qs.length,score=Math.round(EX.correct/total*100),passed=score>=80;
    h+='<div class="ex-pre">';
    h+='<div class="ex-pre-ic">'+(passed?'🏆':'💪')+'</div>';
    h+='<div class="ex-pre-t" style="color:'+(passed?'#a7f3d0':'#fca5a5')+'">'+(passed?'Зачёт сдан':'Не сдан')+'</div>';
    h+='<div class="ex-pre-by">Результат: '+score+'% ('+EX.correct+'/'+total+')</div>';
    h+='<button class="ex-go" style="margin-top:24px" onclick="examClose()">Закрыть</button>';
    h+='</div>';
  }
  fs.innerHTML=h;
}
function examBegin(){
  EX.qs=examBuild();EX.phase='question';EX.idx=0;
  examStartTimer();examRender();
}
function examStartTimer(){
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  if(!EX)return;
  const q=EX.qs[EX.idx];
  EX.timePerQ=(q&&q.kind==='photo')?30:10;
  EX.timeLeft=EX.timePerQ;
  EX.qStartedAt=Date.now();
  EX_TIMER=setInterval(function(){
    if(!EX||EX.answered||EX.phase!=='question'){clearInterval(EX_TIMER);EX_TIMER=null;return}
    EX.timeLeft=Math.max(0,EX.timePerQ-Math.floor((Date.now()-EX.qStartedAt)/1000));
    // Sadece timer DOM'unu güncelle
    const tFill=document.getElementById('exTFill');
    if(tFill){
      tFill.style.width=((EX.timeLeft/EX.timePerQ)*100)+'%';
      tFill.classList.toggle('warn',EX.timeLeft<=Math.ceil(EX.timePerQ*0.4)&&EX.timeLeft>Math.ceil(EX.timePerQ*0.2));
      tFill.classList.toggle('danger',EX.timeLeft<=Math.ceil(EX.timePerQ*0.2));
    }
    const tNum=document.querySelector('#exTNum .ex-timer-num');
    if(tNum){
      tNum.textContent=EX.timeLeft+'с';
      tNum.classList.toggle('warn',EX.timeLeft<=Math.ceil(EX.timePerQ*0.4)&&EX.timeLeft>Math.ceil(EX.timePerQ*0.2));
      tNum.classList.toggle('danger',EX.timeLeft<=Math.ceil(EX.timePerQ*0.2));
    }
    if(EX.timeLeft<=0)examTimeout();
  },250);
}
function examTimeout(){
  if(!EX||EX.answered)return;
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  EX.answered=true;EX.timedOut=true;EX.pickedIdx=-1;
  EX.results.push({i:EX.idx,kind:EX.qs[EX.idx].kind,ok:false,timedOut:true});
  if(tg)tg.HapticFeedback?.notificationOccurred('error');
  examReportProgress(false);
  examRender();
}
function examAnswer(i){
  if(!EX||EX.answered||EX.phase!=='question')return;
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  EX.answered=true;EX.pickedIdx=i;EX.timedOut=false;
  const q=EX.qs[EX.idx],ok=q.opts[i]===q.correct;
  if(ok){EX.correct++;if(tg)tg.HapticFeedback?.notificationOccurred('success');}
  else if(tg)tg.HapticFeedback?.notificationOccurred('error');
  EX.results.push({i:EX.idx,kind:'know',ok:ok,timedOut:false});
  examReportProgress(ok);
  examRender();
}
function examPhotoCaptured(ev){
  const f=ev.target.files&&ev.target.files[0];if(!f||!EX)return;
  const reader=new FileReader();
  reader.onload=function(e){
    // küçük preview için sıkıştır
    const img=new Image();img.onload=function(){
      const c=document.createElement('canvas');
      const maxW=800,scale=Math.min(1,maxW/img.width);
      c.width=img.width*scale;c.height=img.height*scale;
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      EX.photos[EX.idx]=c.toDataURL('image/jpeg',0.7);
      examRender();
    };img.src=e.target.result;
  };
  reader.readAsDataURL(f);
}
function examPhotoConfirm(){
  if(!EX||EX.answered)return;
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  EX.answered=true;
  EX.correct++; // fotoğraf teslim edildi varsayılır (Phase 2'de owner onayına bağlanacak)
  EX.results.push({i:EX.idx,kind:'photo',ok:true});
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  examReportProgress(true);
  examRender();
}
function examReportProgress(ok){
  if(!EX||!tg||!tg.sendData)return;
  // Owner'a anlık bildirim — bu sendData app'i kapatır, dolayısıyla Phase 1'de kullanmıyoruz.
  // Sadece sınav sonunda toplu raporlayacağız.
}
function examNext(){
  if(!EX)return;
  EX.idx++;EX.answered=false;EX.pickedIdx=-1;EX.timedOut=false;
  if(EX.idx>=EX.qs.length){
    EX.phase='done';
    examFinish();
  } else {
    examStartTimer();
  }
  examRender();
}
function examFinish(){
  if(EX_TIMER){clearInterval(EX_TIMER);EX_TIMER=null}
  if(!EX)return;
  const total=EX.qs.length,score=Math.round(EX.correct/total*100),passed=score>=80;
  if(tg&&tg.sendData){
    try{tg.sendData(JSON.stringify({
      action:'exam_finish',invite_id:EX.inviteId,correct:EX.correct,total:total,score:score,passed:passed?1:0
    }));}catch(e){console.warn('exam finish fail',e)}
  }
}

function finishGame(){
  const pct=Math.round(RT.correct/RT.total*100);
  if(RT.mode==='exam'){
    const passed=pct>=(RT.examPass||90);
    saveLastExam({date:new Date().toISOString(),score:pct,correct:RT.correct,total:RT.total,passed:passed?1:0});
    if(tg)tg.HapticFeedback?.notificationOccurred(passed?'success':'error');
    RT._sent=true;
    if(tg&&tg.sendData){
      try{tg.sendData(JSON.stringify({
        action:'rt_exam',correct:RT.correct,total:RT.total,score:pct,passed:passed?1:0
      }));}catch(e){console.warn('rt exam send fail',e);}
    }
    return;
  }
  const gs=getGameState(),cfg=RT_LEVELS[RT.level-1],passed=pct>=cfg.pass;
  gs.xp=(gs.xp||0)+RT.xp;
  if(RT.maxStreak>(gs.bestStreak||0))gs.bestStreak=RT.maxStreak;
  if(passed&&RT.level>=gs.level){gs.level=Math.min(RT_LEVELS.length,RT.level+1);gs.maxLevel=Math.max(gs.maxLevel||1,gs.level);}
  saveGameState(gs);
  if(tg)tg.HapticFeedback?.notificationOccurred(passed?'success':'warning');
  // Sunucuya gönder — owner analytics için kayıt
  RT._sent=true;
  if(tg&&tg.sendData){
    try{tg.sendData(JSON.stringify({
      action:'rt_session',level:RT.level,correct:RT.correct,total:RT.total,
      xp:RT.xp,maxStreak:RT.maxStreak,passed:passed?1:0
    }));}catch(e){console.warn('rt send fail',e);}
  }
}

render();
// Resmi sınav daveti varsa otomatik fullscreen aç
if(examShouldOpen()){
  try{examOpen()}catch(e){console.warn('exam open fail',e)}
}
</script>
</body>
</html>
