// Aktif vardiya süresini canlı hesapla (H:MM:SS)
function liveDur(startIso){
  if(!startIso)return '0:00:00';
  try{
    const s=new Date(startIso);
    const now=gT();
    const diff=Math.max(0,Math.floor((now.getTime()-s.getTime())/1000)); // saniye
    const h=Math.floor(diff/3600),mn=Math.floor((diff%3600)/60),sc=diff%60;
    return h+':'+String(mn).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  }catch(e){return '0:00:00'}
}
function liveHours(startIso){
  if(!startIso)return 0;
  try{
    const s=new Date(startIso);
    const now=gT();
    return Math.max(0,(now.getTime()-s.getTime())/3600000);
  }catch(e){return 0}
}
// Ödenecek saat — backend paid_hours ile BİREBİR: ham süreden kapalı pencere
// (закрытие→открытие) düşülür, max ile sınırlanır. {raw, unpaid, paid} döner.
// PAY_WIN = şubenin {open, close, unpaid, max} penceresi (payload'dan).
function paidHours(startIso, endIso){
  try{
    var s=new Date(startIso), e=endIso?new Date(endIso):gT();
    if(!(e>s))return {raw:0,unpaid:0,paid:0};
    var raw=(e-s)/3600000;
    var w=PAY_WIN||{};
    // "Не оплачивать" KAPALI → tüm süre ödenir (düşüm+cap yok) — backend ile aynı
    // paid TAM HASSAS (yuvarlama YOK) → canlı hesap her saniye akıcı güncellenir
    if(!w.unpaid)return {raw:raw, unpaid:0, paid:raw};
    var unpaid=0;
    var oh=parseInt(w.open); if(isNaN(oh))oh=7;
    var ch=parseInt(w.close); if(isNaN(ch))ch=3;
    if(ch>=0 && ch<oh && oh<=24){
      var day=new Date(s.getFullYear(),s.getMonth(),s.getDate());
      var endDay=new Date(e.getFullYear(),e.getMonth(),e.getDate());
      var guard=0;
      while(day.getTime()<=endDay.getTime() && guard<400){
        var w0=new Date(day); w0.setHours(ch,0,0,0);
        var w1=new Date(day); w1.setHours(oh,0,0,0);
        var ov=(Math.min(e.getTime(),w1.getTime())-Math.max(s.getTime(),w0.getTime()))/3600000;
        if(ov>0)unpaid+=ov;
        day=new Date(day.getTime()+86400000); guard++;
      }
    }
    var paid=Math.max(0,raw-unpaid);
    var mx=parseInt(w.max); if(!isNaN(mx)&&mx>0&&paid>mx)paid=mx;
    return {raw:raw, unpaid:unpaid, paid:paid};  // yuvarlama YOK → akıcı canlı
  }catch(_e){return {raw:0,unpaid:0,paid:0};}
}
// Bu vardiyanın CANLI fazla mesaisi — aylık norm üstü ARTIMLI kısım (backend end_shift ile aynı).
// prev = bu ayın kapanmış vardiyaları (SUMMARY.hours). {h: saat, amount: сум, perH: saatlik}.
function liveOvertime(liveH){
  var o=OT_CFG||{};var thr=parseInt(o.hours)||0;
  if(thr<=0||!(liveH>0))return {h:0,amount:0,perH:0};
  var prev=(SUMMARY&&SUMMARY.hours)||0;
  var before=Math.max(0,prev-thr),after=Math.max(0,(prev+liveH)-thr);
  var oth=Math.max(0,after-before);
  var perH=(o.type==='percent')?Math.round(HOURLY_RATE*(parseInt(o.value)||0)/100):(parseInt(o.value)||0);
  return {h:oth, amount:Math.round(oth*perH), perH:perH};
}
// Vardiya-kapatma kırılım satırı — Отработано / kapalı düşüm / max limit → к оплате.
// paid==raw ise (düşüm yok) boş döner (temiz). Canlı güncellenir.
function endBreakdownHTML(ph){
  if(!ph||(ph.raw-ph.paid)<=0.01)return '';
  var w=PAY_WIN||{};
  var cl=String(parseInt(w.close)||0).padStart(2,'0'),op=String(parseInt(w.open)||7).padStart(2,'0');
  var s='🕐 Отработано <b>'+fmtH(ph.raw)+'</b>';
  if(ph.unpaid>0.01)s+=' · закрытые часы (<b>'+cl+':00–'+op+':00</b>) не оплачиваются <b style="color:var(--red)">−'+fmtH(ph.unpaid)+'</b>';
  var mx=parseInt(w.max)||0;
  if(mx&&(ph.raw-ph.unpaid)>mx+0.01)s+=' · <b style="color:#d97706">макс. '+mx+'ч</b>';
  s+=' → к оплате <b style="color:#059669">'+fmtH(ph.paid)+'</b>';
  return '<div class="refresh-hint" style="margin:8px 0 0;color:var(--t2);line-height:1.5">'+s+'</div>';
}

// Saatleri okunabilir biçimde göster:
//   0.02h → "1м"
//   0.5h  → "30м"
//   1.5h  → "1ч 30м"
//   8h    → "8ч"
function fmtH(h){
  const n=Number(h)||0;
  if(n<=0)return '0м';
  const totalMin=Math.round(n*60);
  const hh=Math.floor(totalMin/60);
  const mm=totalMin%60;
  if(hh===0)return mm+'м';
  if(mm===0)return hh+'ч';
  return hh+'ч '+mm+'м';
}
function fmtTime(iso){
  if(!iso)return '--:--';
  try{const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}catch(e){return '--:--'}
}
function fmtDay(iso){
  if(!iso)return '';
  try{const d=new Date(iso);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()}catch(e){return ''}
}

// Hızlı istatistik (bugün/hafta) — bitmiş vardiyalardan
function calcQuickStats(shifts){
  const now=gT();
  const today=now.toDateString();
  const wkAgo=new Date(now.getTime()-7*86400000);
  let today_=0,todayShifts=0,week=0,weekShifts=0;
  shifts.forEach(function(sh){
    const dt=new Date(sh.start_time||sh.created_at||sh.date||0);
    if(isNaN(dt))return;
    if(dt.toDateString()===today){today_+=(sh.total||0);todayShifts++}
    if(dt>=wkAgo){week+=(sh.total||0);weekShifts++}
  });
  return {today:today_,todayShifts:todayShifts,week:week,weekShifts:weekShifts};
}

function cfConfetti(cv){
  var ctx=cv.getContext('2d');var W=cv.width=cv.offsetWidth,H=cv.height=cv.offsetHeight;
  var cols=['#f8d765','#e2ac16','#10b981','#ffffff','#fcefc3'];
  var N=120,parts=[];
  for(var i=0;i<N;i++){parts.push({x:W/2+(Math.random()-.5)*90,y:H*0.42+(Math.random()-.5)*40,vx:(Math.random()-.5)*11,vy:-6-Math.random()*9,g:.28+Math.random()*.12,s:5+Math.random()*6,r:Math.random()*6.28,vr:(Math.random()-.5)*.4,c:cols[i%cols.length],life:0});}
  var t0=performance.now();
  (function frame(now){var el=now-t0;ctx.clearRect(0,0,W,H);var alive=false;
    for(var i=0;i<parts.length;i++){var p=parts[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.r+=p.vr;p.life=el;
      var a=el<2600?1:Math.max(0,1-(el-2600)/900);if(p.y<H+20&&a>0){alive=true;}
      ctx.save();ctx.globalAlpha=a;ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();}
    if(el<3600&&alive)requestAnimationFrame(frame);else ctx.clearRect(0,0,W,H);
  })(t0);
}
// ── Non-blocking konfeti patlaması (overlay, pointer-events yok) ──
function cfConfettiBurst(originYRatio,zIndex){
  try{
    if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
    var cv=document.createElement('canvas');
    cv.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:'+(zIndex||3800);
    document.body.appendChild(cv);
    var W=cv.width=cv.offsetWidth,H=cv.height=cv.offsetHeight;
    var oy=H*(originYRatio||0.32);
    var ctx=cv.getContext('2d');var cols=['#f8d765','#e2ac16','#10b981','#ffffff','#fcefc3'];
    var N=90,parts=[];
    for(var i=0;i<N;i++){parts.push({x:W/2+(Math.random()-.5)*W*0.5,y:oy+(Math.random()-.5)*30,vx:(Math.random()-.5)*9,vy:-5-Math.random()*8,g:.3+Math.random()*.12,s:5+Math.random()*5,r:Math.random()*6.28,vr:(Math.random()-.5)*.4,c:cols[i%cols.length]});}
    var t0=performance.now();
    (function frame(now){var el=now-t0;ctx.clearRect(0,0,W,H);var alive=false;
      for(var i=0;i<parts.length;i++){var p=parts[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.r+=p.vr;
        var a=el<1900?1:Math.max(0,1-(el-1900)/700);if(p.y<H+20&&a>0)alive=true;
        ctx.save();ctx.globalAlpha=a;ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();}
      if(el<2700&&alive)requestAnimationFrame(frame);else{try{cv.remove()}catch(_e){}}
    })(t0);
    setTimeout(function(){try{cv.remove()}catch(_e){}},3000);
  }catch(_e){}
}

        +'<button class="cf-mod-btn pri" id="cfModYes">'+(opts.okText||(isNum?'ОК':'Да'))+'</button>'
      +'</div>';
    ov.appendChild(box);document.body.appendChild(ov);
    var done=false;
    function finish(val){if(done)return;done=true;ov.classList.remove('on');setTimeout(function(){try{ov.remove()}catch(_e){}},280);resolve(val);}
    var inp=box.querySelector('#cfModInp');
    if(isNum&&inp){
      var cur=function(){return Math.max(0,parseInt(inp.value)||0);};
      var setV=function(v){inp.value=Math.max(0,v);if(tg&&tg.HapticFeedback)try{tg.HapticFeedback.impactOccurred('light')}catch(_){}};
      box.querySelector('#cfModMinus').addEventListener('click',function(){setV(cur()-1);});
      box.querySelector('#cfModPlus').addEventListener('click',function(){setV(cur()+1);});
      box.querySelectorAll('.cf-chip').forEach(function(ch){ch.addEventListener('click',function(){if(ch.dataset.set!=null)setV(parseInt(ch.dataset.set)||0);else setV(cur()+(parseInt(ch.dataset.add)||0));});});
    }
    box.querySelector('#cfModYes').addEventListener('click',function(){
      if(isText){var tv=box.querySelector('#cfModTxt');finish((tv.value||'').trim());}
      else finish(isNum?(inp.value===''?null:Math.max(0,parseInt(inp.value)||0)):true);
    });
    box.querySelector('#cfModNo').addEventListener('click',function(){finish((isNum||isText)?null:false);});
    ov.addEventListener('click',function(e){if(e.target===ov)finish((isNum||isText)?null:false);});
    var txt=box.querySelector('#cfModTxt');
    if(txt){txt.addEventListener('keydown',function(e){if(e.key==='Enter')finish((txt.value||'').trim());});}
    if(inp){inp.addEventListener('keydown',function(e){if(e.key==='Enter'){finish(inp.value===''?null:Math.max(0,parseInt(inp.value)||0));}});}
    requestAnimationFrame(function(){ov.classList.add('on');var fi=inp||box.querySelector('#cfModTxt');if(fi){setTimeout(function(){fi.focus();fi.select&&fi.select();},120);}});
  });
}

// ── Vardiyayı geriye dönük başlat (HH:MM girişi) ──
async function startShiftCustomTime(){
  const inp=document.getElementById('cstStart');
  if(!inp||!inp.value){toast('Укажите время');return}
  const hhmm=inp.value; // 'HH:MM'
  // Tarih girişi (yoksa bugün)
  const dInp=document.getElementById('cstDate');
  const now=new Date();
  var Y=now.getFullYear(),Mo=now.getMonth(),D=now.getDate();
  if(dInp&&dInp.value){var p=dInp.value.split('-');Y=parseInt(p[0]);Mo=parseInt(p[1])-1;D=parseInt(p[2]);}
  const [hh,mm]=hhmm.split(':').map(function(x){return parseInt(x)||0});
  const customDt=new Date(Y,Mo,D,hh,mm,0,0);
  // Geleceğe izin verme
  if(customDt-now>2*60*1000){toast('Время не может быть в будущем');return}
  // 24 saatten eski izin verme (yanlışlıkla — gece vardiyası için 24h)
  if(now-customDt>24*60*60*1000){
    if(!(await cfAsk('Указано время более суток назад. Продолжить?',{icon:'⏰'})))return;
  }
  var dtLabel=String(D).padStart(2,'0')+'.'+String(Mo+1).padStart(2,'0')+' '+hhmm;
  if(!(await cfAsk('Начать смену с '+dtLabel+'?\nВремя прихода будет указано вручную.',{okText:'Начать',icon:'🟢'})))return;
  const customIso=customDt.toISOString();
  SUMMARY.active={start_time:customIso,end_time:null,hours:0,drinks:'{}',bonus:0,hourly_pay:0,total:0};
  toast('🟢 Смена началась с '+dtLabel);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'shift_start',start_time:customIso,branch:(startBranch||MY_BRANCH)}))}catch(e){console.warn(e)}}
  render();
  cfShiftStartedPop();
}

function recalcEnd(){
  const active=(SUMMARY||{}).active;if(!active)return;
  // Bitiş zamanı: manuel girildiyse onu kullan, yoksa şu an
  const effEnd=(endDraft.endTime?new Date(endDraft.endTime):new Date());
  const _ph=paidHours(active.start_time, effEnd.toISOString());
  const liveH=_ph.paid;
  let drinkBonus=0,drinkSold=0;
  DRINK_LIST.forEach(function(d){
    var b=parseInt(endDraft.bylo[d.id])||0,r=parseInt(endDraft.zavoz[d.id])||0;
    var oRaw=endDraft.ostalos[d.id],counted=!(oRaw===''||oRaw==null);
    var s=counted?Math.max(0,b+r-(parseInt(oRaw)||0)):0;  // Осталость boşsa Продано=0
    endDraft.drinks[d.id]=s;  // Продано = Было + Завоз − Осталось → bonus + сменный отчёт
    var el=document.getElementById('es_'+d.id);if(el)el.textContent=s;
    drinkBonus+=s*drinkRate(d); drinkSold+=s;
  });
  var etc=document.getElementById('esTotalCups');if(etc)etc.textContent=fmt(drinkSold)+' шт';
  const desN=parseInt(endDraft.dessertsTotal)||0;
  let desBonus=desN*DESSERT_RATE;
  const hourly=Math.round(liveH*HOURLY_RATE);
  // Canlı fazla mesai (bu vardiya) — norm üstü saat × saatlik fazla mesai ücreti
  const ot=liveOvertime(liveH);
  const total=hourly+drinkBonus+desBonus+ot.amount;
  // Günlük bonus (kasadan alınır) — POS para mutabakatı kaldırıldı
  var _daily=drinkBonus+desBonus;
  var _edb=document.getElementById('eDailyBonus');if(_edb)_edb.textContent=fmt(_daily);
  const eHr=document.getElementById('seHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('seBonus');if(eBn)eBn.textContent=fmt(drinkBonus);
  const eDb=document.getElementById('seDesBonus');if(eDb)eDb.textContent=fmt(desBonus);
  const eOt=document.getElementById('seOtRow');
  if(eOt)eOt.innerHTML=(ot.amount>0)?('<div class="sf-tot-row" style="color:#7c3aed"><span>⏱ Переработка ('+fmtH(ot.h)+' × '+fmt(ot.perH)+'/ч)</span><span>+'+fmt(ot.amount)+'</span></div>'):'';
  const eTt=document.getElementById('seTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  // Saatleri + kırılımı yenile (manuel saat değişince VEYA canlı tik)
  const ed=document.getElementById('seDur');if(ed)ed.textContent=fmtH(liveH);
  const sb=document.getElementById('seBreak');if(sb)sb.innerHTML=endBreakdownHTML(_ph);
  const en=document.getElementById('seNow');if(en)en.textContent=fmtTime(effEnd.toISOString());
}

// ── Geç kalma takibi (basit) — beklenen açılış 07:00 ──
// Günün AÇICI (en erken) vardiyası 07:00'den ne kadar geç başladı? Sadece sabah penceresinde
// (<12:00) başlayan, o günün ilk vardiyası kontrol edilir (öğleden sonra/akşam vardiyaları muaf,
// gece geriye-dönük girişler de doğal olarak muaf). Erken/zamanında → null. Dönüş: gecikme dakikası.
const OPEN_HOUR=7;
function openerLate(sh,allShifts){
  if(!sh||!sh.start_time)return null;
  var st=new Date(sh.start_time);if(isNaN(st)||st.getHours()>=12)return null; // sadece sabah
  var dk=st.toDateString(),earliest=null;
  (allShifts||[]).forEach(function(x){
    if(!x||!x.start_time)return;
    var d=new Date(x.start_time);if(isNaN(d)||d.getHours()>=12||d.toDateString()!==dk)return;
    if(!earliest||d<earliest)earliest=d;
  });
  if(!earliest||Math.abs(earliest-st)>1000)return null; // bu vardiya o günün açıcısı değil
  var exp=new Date(st.getFullYear(),st.getMonth(),st.getDate(),OPEN_HOUR,0,0,0);
  var diff=Math.round((st-exp)/60000);
  return diff>0?diff:null; // erken/zamanında → işaret yok
}
function lateLabel(min){if(!min)return '';if(min<60)return '+'+min+' мин';var hh=Math.floor(min/60),mm=min%60;return '+'+hh+'ч'+(mm?' '+mm+'м':'');}

  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});

  const total=hourly+bonus;
  const eHr=document.getElementById('sfHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('sfBonus');if(eBn)eBn.textContent=fmt(bonus);
  const eTt=document.getElementById('sfTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  const eHt=document.getElementById('sfHourHint');if(eHt)eHt.textContent=hours>0?(hours+'h × '+fmt(HOURLY_RATE)+' = '+fmt(hourly)+' сум'):'Введите количество часов';
  const eBt=document.getElementById('sfBtn');if(eBt){const ok=hours>0;eBt.disabled=!ok;eBt.classList.toggle('grn',ok);eBt.textContent=ok?('💾 Записать смену · '+fmt(total)+' сум'):'Введите часы';}

function saveShift(){
  const hours=parseFloat(shiftDraft.hours)||0;
  if(hours<=0)return;
  let bonus=0;
  DRINK_LIST.forEach(function(d){bonus+=(parseInt(shiftDraft.drinks[d.id])||0)*d.r});
  const hourly=Math.round(hours*HOURLY_RATE);
  const total=hourly+bonus;
  const payload={action:'shift',hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note};
  // Optimistik güncelleme — kullanıcı uygulamada hemen sonucu görür
  SUMMARY.hours=(SUMMARY.hours||0)+hours;
  SUMMARY.hourly=(SUMMARY.hourly||0)+hourly;
  SUMMARY.bonus=(SUMMARY.bonus||0)+bonus;
  SUMMARY.gross=(SUMMARY.hourly||0)+(SUMMARY.bonus||0);
  SUMMARY.fines=SUMMARY.fines||0;
  SUMMARY.paid=SUMMARY.paid||0;
  SUMMARY.net=SUMMARY.gross-SUMMARY.fines-SUMMARY.paid;
  SUMMARY.shifts_count=(SUMMARY.shifts_count||0)+1;
  SUMMARY.shifts=SUMMARY.shifts||[];
  SUMMARY.shifts.push({hours:hours,drinks:JSON.stringify(shiftDraft.drinks),bonus:bonus,hourly_pay:hourly,total:total,created_at:new Date().toISOString()});
  // Lokal geçmişe de kaydet
  hist.push({type:'shift',date:new Date().toISOString(),user:MY_NAME,hours:hours,drinks:shiftDraft.drinks,note:shiftDraft.note,total:total});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('💾 Смена записана!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  shiftDraft={hours:'',drinks:{},note:''};
  mView='main';
  render();
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('sendData:',e)}}
}

// ── Owner: Ceza ekleme ekranı (çoklu hedef + zorunlu sebep + split) ──
function rMFine(m,b){

    const sel=fineDraft.type===p.id;
    h+='<div class="opt '+(sel?'on':'')+'" onclick="selFineType(\''+p.id+'\')">'
      +'<div class="opt-r"></div>'

  }

  h+='<div class="sf-label" style="margin:14px 0 6px">Кому?</div>';

    +'<div><div class="split-toggle-t">⚖️ Разделить на нескольких</div><div class="split-toggle-s">'+(fineDraft.split?'Сумма поделится поровну':'Полная сумма каждому выбранному')+'</div></div>'
    +'<div class="tg-sw '+(fineDraft.split?'on':'')+'"></div>'
  +'</div>';
  // Şef %50 öder toggle (sadece denetim/проверка cezalarında öneri)
  h+='<div class="split-toggle '+(fineDraft.chefShare?'on':'')+'" style="margin-top:6px" onclick="fineDraft.chefShare=!fineDraft.chefShare;render()">'
    +'<div><div class="split-toggle-t">🍴 Шеф платит 50%</div><div class="split-toggle-s">'+(fineDraft.chefShare?'Половина суммы — на шефа (вы)':'Бариста платят полную сумму')+'</div></div>'
    +'<div class="tg-sw '+(fineDraft.chefShare?'on':'')+'"></div>'
  +'</div>';
  if(isInsp&&!fineDraft.split){
    h+='<div class="refresh-hint" style="margin-top:0">💡 Это проверка — обычно штраф делится между баристами в смене.</div>';
  }

  // Çoklu barista seç (checkbox tarzı)
  const _FB=BARISTAS.filter(function(x){return !x.arch});
  if(!_FB.length){
    h+='<div class="empty-mini">Нет баристов. Они должны написать боту /start.</div>';
  } else {
    _FB.forEach(function(brs){
      const sel=fineDraft.targets.indexOf(brs.id)>=0;
      h+='<div class="opt multi '+(sel?'on':'')+'" onclick="toggleFineTarget('+brs.id+')">'
        +'<div class="opt-r"></div>'
        +'<div class="opt-l"><div class="opt-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="opt-s">'+(brs.u?'@'+escH(brs.u)+' · ':'')+'штраф в мес.: '+fmt(brs.f||0)+'</div></div>'
      +'</div>';
    });
  }

  h+='<div class="sf-label" style="margin:14px 0 6px">Причина <span style="color:var(--red);font-weight:800">*</span></div>'
    +'<textarea class="sf-note" rows="2" placeholder="обязательно укажите причину" oninput="fineDraft.reason=this.value;recalcFine()">'+escH(fineDraft.reason||'')+'</textarea>';

  // Toplam
  const cnt=fineDraft.targets.length;
  const totalAmt=fineDraft.amount;
  const baristaPool=fineDraft.chefShare?Math.floor(totalAmt/2):totalAmt;
  const chefAmt=fineDraft.chefShare?(totalAmt-baristaPool):0;
  const per=(fineDraft.split&&cnt>1)?Math.floor(baristaPool/cnt):baristaPool;
  h+='<div class="sf-total">'
    +'<div class="sf-tot-row"><span>Получателей</span><span>'+cnt+'</span></div>'
    +(fineDraft.chefShare?'<div class="sf-tot-row"><span>Полная сумма</span><span>-'+fmt(totalAmt)+'</span></div>':'')

    +(fineDraft.split&&cnt>1?'<div class="sf-tot-row"><span>На баристов</span><span>-'+fmt(baristaPool)+'</span></div>':'')

}

function toggleFineTarget(uid){
  const i=fineDraft.targets.indexOf(uid);
  if(i>=0)fineDraft.targets.splice(i,1);else fineDraft.targets.push(uid);
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}

function selFineType(t){
  fineDraft.type=t;
  const p=FINE_PRESETS.find(function(x){return x.id===t});
  if(p&&t!=='custom')fineDraft.amount=p.amt;
  if(t==='custom')fineDraft.amount=parseInt(fineDraft.custom)||0;
  // Inspection preset'lerinde split otomatik aç (checkbox manuel kapatılırsa kapanır)
  if(t.indexOf('insp_')===0||t==='foreign')fineDraft.split=true;
  render();
}
function recalcFine(){
  // Sadece toplamı güncelle (re-render etmeden)
  const cnt=fineDraft.targets.length;
  const per=(fineDraft.split&&cnt>1)?Math.floor(fineDraft.amount/cnt):fineDraft.amount;
  const eA=document.getElementById('fnAmt');if(eA)eA.textContent='-'+fmt(per)+' сум';
  const eB=document.getElementById('fnBtn');if(eB){
    const reasonOk=(fineDraft.reason||'').trim().length>0;
    const ok=cnt>0&&fineDraft.amount>0&&reasonOk;
    eB.disabled=!ok;
    eB.textContent=ok?'⚠️ Записать штраф · -'+fmt(per)+' сум'+(fineDraft.split&&cnt>1?' × '+cnt:''):(reasonOk?'Выберите получателей':'Укажите причину');
  }
}

function saveFine(){
  const cnt=fineDraft.targets.length;
  const reason=(fineDraft.reason||'').trim();
  if(cnt===0||fineDraft.amount<=0||!reason){
    if(!reason)toast('❌ Причина обязательна');
    return;
  }
  const chefShare=!!fineDraft.chefShare;
  const totalAmt=fineDraft.amount;
  const baristaPool=chefShare?Math.floor(totalAmt/2):totalAmt;
  const chefAmt=chefShare?(totalAmt-baristaPool):0;
  const split=fineDraft.split&&cnt>1;
  const per=split?Math.floor(baristaPool/cnt):baristaPool;
  // Lokal güncelleme — baristalar
  fineDraft.targets.forEach(function(uid){
    const t=BARISTAS.find(function(x){return x.id===uid});
    if(t){t.f=(t.f||0)+per;t.net=(t.net||0)-per}
  });
  // Lokal güncelleme — şefin (kendi) payı
  if(chefShare&&chefAmt>0){
    const me=BARISTAS.find(function(x){return x.id===MY_UID});
    if(me){me.f=(me.f||0)+chefAmt;me.net=(me.net||0)-chefAmt}
  }
  const payload={action:'fine',targets:fineDraft.targets,amount:totalAmt,reason:reason,type:fineDraft.type,split:split,chef_share:chefShare};
  toast(chefShare?('🍴 Штраф разделён со шефом'):(split?('⚠️ Штраф разделён · '+cnt+' чел.'):'⚠️ Штраф записан'));
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  fineDraft={targets:[],type:'clean',amount:30000,reason:'',custom:'',split:false,chefShare:false};
  mView='main';
  render();
}

// Saat (0–23 tam sayı) → "HH:00" (time input değeri); geçersizse d varsayılanı
function hourHHMM(x,d){var h=(x==null||x==='')?d:(parseInt(x)||0);h=Math.max(0,Math.min(23,h));return ('0'+h).slice(-2)+':00';}
// "HH:MM" veya "H" → saat tamsayısı (dakika yok sayılır)
function parseHour(v,d){if(v==null||v==='')return d;var h=parseInt(String(v).split(':')[0]);return isNaN(h)?d:Math.max(0,Math.min(23,h));}
function saveBranchHours(id){
  var o=parseHour((document.getElementById('bo_'+id)||{}).value,7);
  var c=parseHour((document.getElementById('bc_'+id)||{}).value,3);
  var u=(document.getElementById('bu_'+id)||{}).checked?1:0;
  var br=(BRANCHES||[]).find(function(x){return x.id===id});if(br){br.open=o;br.close=c;br.unpaid=u;}
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'branch_hours',branch_id:id,open:o,close:c,unpaid:u}))}catch(e){}}
  toast('🕐 Часы филиала сохранены');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
}

  } else {

        h+='<div class="set-row">'
          +'<div class="set-row-l"><div class="set-row-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div>'

        +'</div>';
      } else {
        h+='<div class="opt multi '+(sel?'on':'')+'" onclick="toggleTipTarget('+brs.id+')">'
          +'<div class="opt-r"></div>'
          +'<div class="opt-l"><div class="opt-t">'+(brs.active?'🟢 ':'')+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="opt-s">'+(brs.u?'@'+escH(brs.u):'')+'</div></div>'
        +'</div>';
      }
    });
  }

  // Not
  h+='<div class="sf-label" style="margin:14px 0 6px">Заметка (необязательно)</div>'
    +'<textarea class="sf-note" rows="2" placeholder="например: вечерние чаевые" oninput="tipDraft.note=this.value">'+escH(tipDraft.note||'')+'</textarea>';

  // Toplam
  const calc=calcTipPlan();
  h+='<div class="sf-total" id="tpSummary">'+tipSummaryInner(calc)+'</div>';

  h+='<div class="footer">XSYN</div>';
  m.innerHTML=h;b.style.display='block';
  b.innerHTML=tipButtonInner(calc);
}
function tipSummaryInner(calc){
  return '<div class="sf-tot-row"><span>Получателей</span><span>'+calc.cnt+'</span></div>'
    +'<div class="sf-tot-row"><span>Сумма</span><span>'+fmt(calc.total)+' сум</span></div>'
    +(calc.cnt>0&&tipDraft.mode==='equal'?'<div class="sf-tot-row"><span>Каждому</span><span>+'+fmt(calc.per)+' сум</span></div>':'')
    +'<div class="sf-tot-big"><span>ИТОГО</span><span>+'+fmt(calc.sum)+' сум</span></div>';
}
function tipButtonInner(calc){
  var ok=calc.cnt>0&&calc.sum>0;
  return '<button class="mbtn '+(ok?'grn':'')+'" '+(ok?'':'disabled')+' onclick="saveTips()">'+(ok?'💝 Раздать +'+fmt(calc.sum)+' сум':'Введите сумму и выберите бариста')+'</button>';
}
function toggleTipTarget(uid){
  if(tipDraft.distributions[uid]!==undefined)delete tipDraft.distributions[uid];
  else tipDraft.distributions[uid]=0;
  if(tg)tg.HapticFeedback?.impactOccurred('light');
  render();
}
function setTipFor(uid,v){tipDraft.distributions[uid]=parseInt(v)||0;recalcTips()}
function calcTipPlan(){
  const total=parseInt(tipDraft.total)||0;
  const ids=Object.keys(tipDraft.distributions).map(function(x){return parseInt(x)});
  const cnt=ids.length;
  if(tipDraft.mode==='equal'){
    const per=cnt>0?Math.floor(total/cnt):0;
    return {cnt:cnt,total:total,per:per,sum:per*cnt};
  } else {
    let s=0;ids.forEach(function(u){s+=parseInt(tipDraft.distributions[u])||0});
    return {cnt:cnt,total:s,per:0,sum:s};
  }
}
function recalcTips(){
  const calc=calcTipPlan();
  const s=document.getElementById('tpSummary');if(s)s.innerHTML=tipSummaryInner(calc);
  const bt=document.getElementById('bot');if(bt)bt.innerHTML=tipButtonInner(calc);
}
function saveTips(){
  const calc=calcTipPlan();
  if(calc.cnt===0||calc.sum<=0)return;
  // Dağıtım planı: {uid:amount}
  const dist={};
  if(tipDraft.mode==='equal'){
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=calc.per});
  } else {
    Object.keys(tipDraft.distributions).forEach(function(u){dist[u]=parseInt(tipDraft.distributions[u])||0});
  }
  const payload={action:'tip_distribute',distributions:dist,note:(tipDraft.note||'').trim(),total:calc.sum,mode:tipDraft.mode};
  toast('💝 Чаевые розданы · '+calc.cnt+' чел.');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  tipDraft={total:'',distributions:{},note:'',mode:'equal'};
  mView='main';render();
}

}

// ─── Geçmiş temizleme (owner) — bot tarafında silinir ───
function _clrSend(payload){
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn('clr send',e)}}
}
function clrTypes(){var a=[];document.querySelectorAll('.clr-type:checked').forEach(function(c){a.push(c.value)});return a;}
function clrBranchSel(){var el=document.getElementById('clrBranch');return el?(parseInt(el.value)||0):0;}
function clrBranchLbl(bid){return bid?(' · '+branchName(bid)):' · все филиалы';}
async function clrHistAll(){
  var types=clrTypes();if(!types.length){toast('Отметьте хотя бы одно');return}
  var bid=clrBranchSel();
  var msg='Удалить отмеченное ('+types.length+' видов'+clrBranchLbl(bid)+') НАВСЕГДА?\nЭто НЕЛЬЗЯ отменить.';
  if(await cfAsk(msg,{danger:true,okText:'Удалить'})){_clrSend({action:'clear_history',mode:'all',types:types,branch_id:bid})}
}
async function clrHistBefore(){
  var el=document.getElementById('clrDate');var val=el?el.value:'';
  if(!val){toast('Выберите дату');return}
  var types=clrTypes();if(!types.length){toast('Отметьте хотя бы одно');return}
  var bid=clrBranchSel();
  var msg='Удалить отмеченное ДО '+val+clrBranchLbl(bid)+'?\nЭто НЕЛЬЗЯ отменить.';
  if(await cfAsk(msg,{danger:true,okText:'Удалить'})){_clrSend({action:'clear_history',mode:'before',date:val,types:types,branch_id:bid})}
}

// ── Зарплатные категории (Maaş kategorileri) ──
function saveSalCat(id){
  var nm=((document.getElementById('sc_n_'+id)||{}).value||'').trim();
  if(!nm){toast('Укажите название');return}
  var rate=parseInt((document.getElementById('sc_r_'+id)||{}).value)||0;
  var desc=((document.getElementById('sc_d_'+id)||{}).value||'').trim();
  var act=(document.getElementById('sc_a_'+id)||{}).checked?1:0;
  var kpi=(document.getElementById('sc_k_'+id)||{}).checked?1:0;
  var bsys=((document.getElementById('sc_bs_'+id)||{}).value==='caffelito')?'caffelito':'own';
  // Optimistik: yerel SAL_CATS güncelle
  var c=(SAL_CATS||[]).find(function(x){return x.id===id});
  if(c){c.name=nm;c.hourly_rate=rate;c.description=desc;c.active=act;c.use_kpi=kpi;c.bonus_system=bsys;}
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'salcat_save',id:id,name:nm,rate:rate,description:desc,active:act,use_kpi:kpi,bonus_system:bsys}))}catch(e){}}
  toast('💾 Категория сохранена');if(tg)tg.HapticFeedback?.notificationOccurred('success');render();
}
function addSalCat(){
  var nm=((document.getElementById('ncName')||{}).value||'').trim();
  if(!nm){toast('Укажите название');return}
  var rate=parseInt((document.getElementById('ncRate')||{}).value)||0;
  var kpi=(document.getElementById('ncKpi')||{}).checked?1:0;
  var bsys=((document.getElementById('ncBsys')||{}).value==='caffelito')?'caffelito':'own';
  // Optimistik: geçici id ile listeye ekle (sunucu gerçek id ile refreshState'te düzeltir)
  SAL_CATS=SAL_CATS||[];SAL_CATS.push({id:('tmp'+Date.now()),name:nm,hourly_rate:rate,description:'',active:1,use_kpi:kpi,bonus_system:bsys});
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'salcat_save',name:nm,rate:rate,use_kpi:kpi,active:1,bonus_system:bsys}))}catch(e){}}
  toast('✅ Категория создана');if(tg)tg.HapticFeedback?.notificationOccurred('success');render();
}
async function deleteSalCat(id){
  var c=(SAL_CATS||[]).find(function(x){return x.id===id});
  var cnt=(BARISTAS||[]).filter(function(x){return x.cat===id}).length;
  var warn='Удалить категорию «'+((c&&c.name)||'')+'»?'+(cnt?('\n'+cnt+' барист(ов) перейдут на общую ставку.'):'');
  if(!(await cfAsk(warn,{danger:true,okText:'Удалить'})))return;
  SAL_CATS=(SAL_CATS||[]).filter(function(x){return x.id!==id});
  (BARISTAS||[]).forEach(function(x){if(x.cat===id)x.cat=null;});
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'salcat_delete',id:id}))}catch(e){}}
  toast('🗑 Категория удалена');render();
}

// ── Şifre yönetimi (owner) ──
function setBaristaPassword(uid){
  const el=document.getElementById('pw_'+uid);
  if(!el)return;
  const pwd=(el.value||'').trim();
  if(pwd.length<3){toast('❌ Пароль слишком короткий (мин 3 символа)');return}
  if(/\s/.test(pwd)){toast('❌ Пароль не должен содержать пробелы');return}
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.pw=1;t.auth=0}  // optimistik
  toast('🔐 Пароль установлен. Передайте бариста.');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'set_password',target:uid,password:pwd}))}catch(e){console.warn(e)}}
}

// ── Kullanıcı kaldırma (owner) — iki seçenekli: ARŞİV veya SİL ──
async function removeUser(uid,nm,sc,fc){
  const hasData=(sc||0)+(fc||0)>0;
  const dataLine=hasData?('\n📊 У него: смен '+(sc||0)+', штрафов '+(fc||0)+'.'):'';
  // 1) Архив ми?
  if(await cfAsk('Архивировать «'+(nm||'?')+'»?'+dataLine+'\nИстория сохранится, доступ закроется.',{okText:'📦 Архив',cancelText:'Другое',icon:'📦'})){
    archiveUserConfirmed(uid,nm);
    return;
  }
  // 2) Калыцı sil mi?
  if(!(await cfAsk('🗑 Удалить НАВСЕГДА «'+(nm||'?')+'»?'+dataLine+(hasData?'\n⚠️ Все данные будут стёрты безвозвратно.':''),{danger:true,okText:'Удалить',cancelText:'Отмена'})))return;
  if(hasData){
    if(!(await cfAsk('Точно удалить «'+(nm||'?')+'» БЕЗ ВОЗМОЖНОСТИ ВОССТАНОВЛЕНИЯ?\nИстория ('+(sc||0)+' смен, '+(fc||0)+' штрафов) исчезнет.',{danger:true,okText:'Да, удалить'})))return;
  }
  deleteUserConfirmed(uid,nm,hasData);
}

function archiveUserConfirmed(uid,nm){
  const t=BARISTAS.find(function(x){return x.id===uid});
  if(t){t.arch=1;t.auth=0;t.arch_at=new Date().toISOString()}

  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'archive_user',target:uid}))}catch(e){console.warn(e)}}

}

function saveDessert(id){
  const ic=(document.getElementById('dic_'+id)||{}).value||'🍮';
  const lb=((document.getElementById('dlb_'+id)||{}).value||'').trim();
  const pr=parseInt((document.getElementById('dpr_'+id)||{}).value)||0;
  if(!lb){toast('❌ Название обязательно');return}
  if(pr<0){toast('❌ Неверная цена');return}
  // Optimistik güncelle
  const d=DESSERT_CAT.find(function(x){return x.id===id});
  if(d){d.icon=ic;d.label=lb;d.price=pr}
  const dl=DESSERT_LIST.find(function(x){return x.id===id});
  if(dl){dl.c=ic;dl.l=lb;dl.r=pr}
  persistDesserts();  // localStorage'a yaz — app kapanırsa veri kaybolmasın
  toast('💾 Десерт сохранён');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_save',id:id,label:lb,icon:ic,price:pr,active:1}))}catch(e){console.warn(e)}}
  render();
}

async function deleteDessert(id){
  const d=DESSERT_CAT.find(function(x){return x.id===id});
  if(!d)return;
  if(!(await cfAsk('🗑 Удалить десерт «'+(d.label||id)+'» из каталога?\n\nЕго больше не будет ни у баристов, ни у вас.\nИстория старых смен сохранится.',{danger:true,okText:'Удалить'})))return;
  // Hem owner katalog listesinden hem aktif listeden çıkar (artık tamamen silinmiş gibi)
  for(let i=DESSERT_CAT.length-1;i>=0;i--){if(DESSERT_CAT[i].id===id)DESSERT_CAT.splice(i,1)}
  for(let i=DESSERT_LIST.length-1;i>=0;i--){if(DESSERT_LIST[i].id===id)DESSERT_LIST.splice(i,1)}
  persistDesserts();  // localStorage'a yaz
  toast('🗑 Удалён');
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_delete',id:id}))}catch(e){console.warn(e)}}
  render();
}

// Cyrillic → latin transliteration (id otomatik üretmek için)
function translit(s){
  const map={
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z',
    'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
    'с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch',
    'ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
  };
  let out='';
  for(const ch of (s||'').toLowerCase()){
    if(map[ch]!==undefined)out+=map[ch];
    else if(/[a-z0-9]/.test(ch))out+=ch;
    else if(ch===' '||ch==='-'||ch==='_')out+='_';
    // diğer karakterleri atla
  }
  // Birden fazla _ olmasın
  out=out.replace(/_+/g,'_').replace(/^_|_$/g,'');
  return out||'item';
}

function addNewDessert(){
  const ic=((document.getElementById('ndIc')||{}).value||'🍮').trim()||'🍮';
  const lb=((document.getElementById('ndLb')||{}).value||'').trim();
  const pr=Math.max(0,parseInt((document.getElementById('ndPr')||{}).value)||500);
  if(!lb){toast('❌ Введите название');return}
  // id otomatik: isimden transliteration
  let id=translit(lb);
  // Eğer aynı id varsa numaralandır: tiramisu, tiramisu_2, tiramisu_3...
  let base=id,n=2;
  while(DESSERT_CAT.some(function(x){return x.id===id})){
    id=base+'_'+n;n++;
  }
  // Optimistik
  const newD={id:id,label:lb,icon:ic,price:pr,sort_order:50,active:1};
  DESSERT_CAT.push(newD);
  DESSERT_LIST.push({id:id,l:lb,c:ic,r:pr,active:true});
  persistDesserts();  // localStorage'a yaz — app kapanırsa veri kaybolmasın
  // Inputları temizle
  ['ndIc','ndLb'].forEach(function(x){const el=document.getElementById(x);if(el)el.value=''});
  const pe=document.getElementById('ndPr');if(pe)pe.value='500';
  toast('➕ Добавлен: '+ic+' '+lb);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'dessert_save',id:id,label:lb,icon:ic,price:pr,active:1}))}catch(e){console.warn(e)}}
  render();
}

function rtIsRange(v){return /\d\s*[–-]\s*\d/.test(String(v));}
function rtFakeRange(correct,n){
  // "36–40 г" → yakın YANLIŞ aralıklar (38–42, 34–38, 18–23...) — tek sayı değil, aralık olsun
  var m=/(\d+)\s*[–-]\s*(\d+)\s*(\D.*)?$/.exec(correct);
  if(!m)return [];
  var lo=parseInt(m[1]),hi=parseInt(m[2]),unit=(m[3]||'').trim(),span=Math.max(1,hi-lo),out=[],seen={},t=0;
  seen[lo+'–'+hi]=1;
  while(out.length<n&&t<50){
    t++;
    var nlo=lo+(Math.floor(Math.random()*11)-5); if(nlo<1)continue;       // ±5 kaydır
    var nhi=nlo+Math.max(1,span+(Math.floor(Math.random()*5)-2));          // span ±2
    var key=nlo+'–'+nhi; if(seen[key])continue; seen[key]=1;
    out.push(nlo+'–'+nhi+(unit?' '+unit:''));
  }
  return out;
}
function rtFakeVals(correct,n){
  if(rtIsRange(correct)){var rr=rtFakeRange(correct,n);if(rr.length>=n)return rr.slice(0,n);}
  var u=rtUnit(correct),pool=rtAllValues().filter(function(v){return rtUnit(v)===u&&v!==correct&&!rtIsRange(v);});
  return rtShuffle(pool).slice(0,n);
}
function rtMakeQ(type){
  const r=rtPick(RT_RECIPES);
  if(type==='q1'||(!r.i.length)){
    const ing=rtPick(r.i);
    var fakes=rtFakeVals(ing[1],3);
    // Tuzak: bazı sorulara «не добавляется» şıkkı ekle (ingredient VAR ama bu yanlış cevap)
    if(Math.random()<0.4&&fakes.length)fakes[Math.floor(Math.random()*fakes.length)]='не добавляется';
    const opts=rtShuffle([ing[1],...fakes]);
    return{type:'q1',text:'Сколько «'+ing[0]+'» в напитке «'+r.n+'»?',opts:opts,correct:ing[1],hint:r.n};
  }
  if(type==='q2'){
    const ni=rtNotIn(r);if(!ni.length)return rtMakeQ('q1');
    const correct=rtPick(ni);
    // Şıklar SADECE bu tarifte GERÇEKTEN olan malzemeler olmalı (yoksa birden çok "doğru" çıkar).
    // 3 gerçek malzeme yoksa bu tarif "что не входит" için uygun değil → q1'e düş.
    const wrongs=rtShuffle(r.i.map(x=>x[0]).filter(x=>x!==correct)).slice(0,3);
    if(wrongs.length<3)return rtMakeQ('q1');
    return{type:'q2',text:'Что НЕ входит в «'+r.n+'»?',opts:rtShuffle([correct,...wrongs]),correct:correct,hint:'Внимательно подумай о составе'};
  }
  // q3 — trick
  const ni=rtNotIn(r);if(!ni.length)return rtMakeQ('q1');
  const fake=rtPick(ni);
  const fakeAmounts=rtShuffle(rtAllValues().filter(v=>rtUnit(v)==='мл'||rtUnit(v)==='г')).slice(0,3);
  return{type:'q3',text:'Сколько «'+fake+'» добавляется в «'+r.n+'»?',opts:rtShuffle(['не добавляется',...fakeAmounts]),correct:'не добавляется',hint:'Подумай, есть ли вообще этот ингредиент?'};
}
function rtBuildSession(level){
  const cfg=RT_LEVELS[level-1],qs=[],mix=cfg.mix;
  for(let i=0;i<cfg.q;i++){
    if(Math.random()<0.33){qs.push(rtMakeFact());continue;} // ~%33 bilgi sorusu
    const r=Math.random();let type='q1';
    if(r<mix.q1)type='q1';else if(r<mix.q1+mix.q2)type='q2';else type='q3';
    qs.push(rtMakeQ(type));
  }
  return qs;
}

let RT_TIMER=null;
function rtClearTimer(){if(RT_TIMER){clearInterval(RT_TIMER);RT_TIMER=null}}
function rtUpdateTimerDom(){
  const ring=document.querySelector('.rt-timer-ring');if(!ring||!RT)return;
  const tLeft=Math.max(0,RT.timeLeft||0),tMax=RT.timePerQ||10;
  const ringR=15,ringC=2*Math.PI*ringR;
  const dash=ringC*(1-tLeft/tMax);
  ring.classList.toggle('warn',tLeft<=4&&tLeft>2);
  ring.classList.toggle('danger',tLeft<=2);
  const fg=ring.querySelector('.fg');if(fg)fg.setAttribute('stroke-dashoffset',dash);
  const num=ring.querySelector('.rt-timer-num');if(num)num.textContent=tLeft;
}
function rtStartTimer(){
  rtClearTimer();
  if(!RT)return;
  RT.timePerQ=10;RT.timeLeft=10;RT.qStartedAt=Date.now();
  RT_TIMER=setInterval(function(){
    if(!RT||RT.answered||RT.done){rtClearTimer();return}
    RT.timeLeft=Math.max(0,RT.timePerQ-Math.floor((Date.now()-RT.qStartedAt)/1000));
    rtUpdateTimerDom();
    if(RT.timeLeft<=0){rtTimeout();return}
  },250);
}
function rtTimeout(){
  if(!RT||RT.answered)return;

function rtBuildExam(){
  // 30 soru: 40% Q1 (basit), 30% Q2 (что не входит), 30% Q3 (provokasyon)
  const qs=[];
  for(let i=0;i<30;i++){
    if(Math.random()<0.4){qs.push(rtMakeFact());continue;} // %40 bilgi sorusu (saklama/standart/...)
    const r=Math.random();
    let type='q1';
    if(r<0.4)type='q1';else if(r<0.7)type='q2';else type='q3';
    qs.push(rtMakeQ(type));
  }
  return qs;
}

function examBuild(){
  // СЕРТИФИКАЦИОННЫЙ ЭКЗАМЕН — 100 вопросов знаний, адаптивная сложность (легко → сложно).
  // 34×лёгкий(d1) → 33×средний(d2) → 33×сложный/ловушки(d3) — SIRALI (gittikçe zorlaşır)
  const plan=[];
  for(let i=0;i<34;i++)plan.push(1);
  for(let i=0;i<33;i++)plan.push(2);
  for(let i=0;i<33;i++)plan.push(3);
  const recent=[];
  const know=plan.map(function(d){
    let q,tries=0;
    do{ q=(Math.random()<0.5)?rtMakeFactD(d):rtMakeQD(d); tries++; }
    while(tries<8 && recent.indexOf(q.text)>=0);
    recent.push(q.text); if(recent.length>14)recent.shift();
    return q;
  });
  return know; // 100 вопросов (без фото)
}

var KEYS=Object.keys(I).sort(function(a,b){return b.length-a.length});
var esc=function(s){return s.replace(/[.*+?^$()|[\]{}\\]/g,'\\$&')};
var RX=new RegExp('('+KEYS.map(esc).join('|')+')','g');
var busy=false;
function iconify(root){
  if(!root||root.nodeType!==1)return;
  var w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,null);
  var hits=[];
  while(w.nextNode()){
    var n=w.currentNode,p=n.parentNode;
    if(!p)continue;
    var tag=p.nodeName;
    if(tag==='SCRIPT'||tag==='STYLE'||tag==='TEXTAREA'||tag==='OPTION')continue;
    if(p.closest&&p.closest('svg'))continue;
    var v=n.nodeValue.replace(/\uFE0F/g,'');
    RX.lastIndex=0;
    if(RX.test(v))hits.push([n,v]);
  }
  if(!hits.length)return;
  busy=true;
  hits.forEach(function(h){
    var span=document.createElement('span');
    span.className='ni-w';
    RX.lastIndex=0;
    span.innerHTML=h[1].replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(RX,function(m){return I[m]});
    h[0].parentNode.replaceChild(span,h[0]);
  });
  busy=false;
}
try{
  new MutationObserver(function(muts){
    if(busy)return;
    muts.forEach(function(m){
      for(var i=0;i<m.addedNodes.length;i++){
        var nd=m.addedNodes[i];
        if(nd.nodeType===1)iconify(nd);
        else if(nd.nodeType===3&&nd.parentNode&&nd.parentNode.nodeType===1)iconify(nd.parentNode);
      }
    });
  }).observe(document.body,{childList:true,subtree:true});
  iconify(document.body);
}catch(e){}
window.neroIconify=iconify;
