/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   REDESIGN ‚Äî animasyonlar, mikro-etkile≈üimler, skeleton
   (tamamen ek; Caffelito kimliƒüi korunur)
   ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
/* Sekme / alt-g√∂r√ºn√ºm ge√ßi≈üi ‚Äî kademeli (stagger) giri≈ü */
@keyframes cfViewIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
#main.cf-in>*{animation:cfViewIn .40s cubic-bezier(.2,.75,.25,1) both}
#main.cf-in>*:nth-child(1){animation-delay:.02s}
#main.cf-in>*:nth-child(2){animation-delay:.06s}
#main.cf-in>*:nth-child(3){animation-delay:.10s}
#main.cf-in>*:nth-child(4){animation-delay:.14s}
#main.cf-in>*:nth-child(5){animation-delay:.18s}
#main.cf-in>*:nth-child(6){animation-delay:.21s}
#main.cf-in>*:nth-child(7){animation-delay:.24s}
#main.cf-in>*:nth-child(n+8){animation-delay:.27s}
/* Sekme deƒüi≈üimi: y√∂n bazlƒ± yatay kaydƒ±rma (b√ºt√ºn konteyner) */
@keyframes cfSlideInR{from{opacity:0;transform:translateX(34px)}to{opacity:1;transform:none}}
@keyframes cfSlideInL{from{opacity:0;transform:translateX(-34px)}to{opacity:1;transform:none}}
#main.cf-slide-r{animation:cfSlideInR .34s cubic-bezier(.2,.75,.25,1) both}
#main.cf-slide-l{animation:cfSlideInL .34s cubic-bezier(.2,.75,.25,1) both}
/* Pull-to-refresh g√∂stergesi */
#cfPtr{position:fixed;top:calc(env(safe-area-inset-top, 0px) + 8px);left:50%;transform:translateX(-50%);z-index:120;width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);box-shadow:0 4px 14px rgba(76,57,26,.18);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s ease}
#cfPtr.on{opacity:1}
.cf-ptr-spin{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--gold-border);border-top-color:var(--gold2)}
/* Sipari≈ü arama √ßubuƒüu */
.ord-search{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:11px 14px;margin-bottom:12px;box-shadow:var(--shadow)}
.ord-search-ic{font-size:15px;opacity:.6;flex-shrink:0}
.ord-search-inp{flex:1;min-width:0;border:none;background:transparent;outline:none;font-family:inherit;font-size:14px;font-weight:600;color:var(--t1)}
.ord-search-inp::placeholder{color:var(--t3);font-weight:500}
.ord-search-x{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:none;background:var(--card3);color:var(--t2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.item-cat{font-size:10px;color:var(--gold2);font-weight:700;margin-top:2px}
#cfPtr.spin .cf-ptr-spin{animation:cfSpin .7s linear infinite}
@keyframes cfSpin{to{transform:rotate(360deg)}}
/* Aktif vardiya kartƒ± ‚Äî √∂zel kutlama giri≈üi (cascade'i ezer) */
@keyframes cfActPop{0%{opacity:0;transform:scale(.9) translateY(16px)}55%{transform:scale(1.02) translateY(0)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes cfGlow{0%{box-shadow:0 6px 22px rgba(16,185,129,.32),0 0 0 0 rgba(16,185,129,.55)}70%{box-shadow:0 6px 22px rgba(16,185,129,.32),0 0 0 18px rgba(16,185,129,0)}100%{box-shadow:0 6px 22px rgba(16,185,129,.32),0 0 0 0 rgba(16,185,129,0)}}
#main.cf-in>.act-card{animation:cfActPop .55s cubic-bezier(.34,1.4,.5,1) both;will-change:transform,opacity}
#main .act-card.act-just{animation:cfActPop .55s cubic-bezier(.34,1.4,.5,1) both,cfGlow 1.15s ease-out .18s}
/* Ba≈ülat butonu ‚Äî nefes alan parƒ±ltƒ± + yaylƒ± basƒ±≈ü */
.btn-start{position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(16,185,129,.32);transition:transform .18s cubic-bezier(.34,1.5,.5,1),box-shadow .25s ease}
.btn-start::after{content:'';position:absolute;top:0;left:-65%;width:45%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.38),transparent);transform:skewX(-18deg);animation:cfSheen 3.6s ease-in-out infinite;pointer-events:none}
@keyframes cfSheen{0%,10%{left:-65%}55%,100%{left:135%}}
.btn-start:active{transform:scale(.965)}
.btn-start .ic{transition:transform .3s cubic-bezier(.34,1.5,.5,1)}
.btn-start:active .ic{transform:scale(.85) rotate(-10deg)}
/* Bitir butonu + owner mbtn ‚Äî yaylƒ± basƒ±≈ü */
.btn-end{transition:transform .18s cubic-bezier(.34,1.5,.5,1),background .2s ease,color .2s ease}
.btn-end:active{transform:scale(.955)}
.mbtn{transition:transform .18s cubic-bezier(.34,1.5,.5,1),box-shadow .2s ease,filter .2s ease}
.mbtn:active{transform:scale(.965)}
/* Kart basƒ±≈üƒ± ‚Äî yaylƒ± */

.card:active{transform:scale(.97) translateY(1px)}
/* Alt sekme √ßubuƒüu ‚Äî aktif ikon pop + yaylƒ± basƒ±≈ü */
@keyframes cfTabPop{0%{transform:scale(.55)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.tab{transition:transform .2s cubic-bezier(.34,1.5,.5,1),color .25s ease,background .28s cubic-bezier(.2,.7,.2,1)}
.tab:active{transform:scale(.9)}
.tab.on .tab-ic{animation:cfTabPop .44s cubic-bezier(.34,1.6,.5,1)}
/* ‚îÄ‚îÄ‚îÄ Skeleton (y√ºkleme iskeleti) ‚îÄ‚îÄ‚îÄ */
@keyframes cfShimmer{0%{background-position:-180px 0}100%{background-position:calc(180px + 100%) 0}}
.skel{background-color:var(--card2);background-image:linear-gradient(100deg,transparent 25%,rgba(255,255,255,.55) 50%,transparent 75%);background-size:180px 100%;background-repeat:no-repeat;background-position:-180px 0;animation:cfShimmer 1.25s ease-in-out infinite;border-radius:10px}
[data-theme="dark"] .skel{background-image:linear-gradient(100deg,transparent 25%,rgba(255,255,255,.08) 50%,transparent 75%)}
.skel-card{border-radius:16px;margin-bottom:11px}
.sk-fade{animation:cfViewIn .3s ease both}
/* ‚îÄ‚îÄ‚îÄ Ekran-i√ßi mikro animasyonlar (t√ºm sekmeler) ‚îÄ‚îÄ‚îÄ */
/* G√∂rev onay kutusu ‚Äî i≈üaretlenince kutu + tik pop */
@keyframes cfCheckBox{0%{transform:scale(1)}45%{transform:scale(1.18)}100%{transform:scale(1)}}
.chk{transition:background .25s ease,border-color .25s ease}
.task.done .chk{animation:cfCheckBox .4s cubic-bezier(.34,1.6,.5,1)}
/* Radyo / se√ßim noktasƒ± ‚Äî se√ßilince pop */
@keyframes cfDot{0%{transform:scale(0)}70%{transform:scale(1.35)}100%{transform:scale(1)}}
.opt.on .opt-r::after{animation:cfDot .34s cubic-bezier(.34,1.6,.5,1)}
.opt{transition:border-color .22s ease,background .22s ease,transform .18s cubic-bezier(.34,1.4,.5,1)!important}
.opt:active{transform:scale(.985)}
/* ƒ∞lerleme √ßubuƒüu dolgusunda kayan parƒ±ltƒ± */
.pfill{position:relative;overflow:hidden}
.pfill::after{content:'';position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.45) 50%,transparent 70%);transform:translateX(-100%);animation:cfBarSheen 2.8s ease-in-out infinite}
@keyframes cfBarSheen{0%,25%{transform:translateX(-100%)}75%,100%{transform:translateX(220%)}}
/* G√∂rev %100 ‚Üí ilerleme √ßubuƒüu pop */
@keyframes cfPfPop{0%{transform:scaleY(1)}40%{transform:scaleY(2.1)}100%{transform:scaleY(1)}}
.pfill.cf-pf-pop{animation:cfPfPop .5s cubic-bezier(.34,1.6,.5,1);transform-origin:center}
/* Toast ‚Äî yaylƒ± ini≈ü */
.toast{transition:transform .44s cubic-bezier(.34,1.56,.5,1),opacity .3s ease}
/* Miktar sayacƒ± deƒüerinde zƒ±plama */
@keyframes cfBump{0%{transform:scale(1)}40%{transform:scale(1.28)}100%{transform:scale(1)}}
.qv.cf-bump{animation:cfBump .3s cubic-bezier(.34,1.6,.5,1)}
/* ‚îÄ‚îÄ‚îÄ Vardiya bitir kutlamasƒ± (overlay + konfeti + count-up) ‚îÄ‚îÄ‚îÄ */
#cfCelebrate{position:fixed;inset:0;z-index:4000;display:flex;align-items:center;justify-content:center;background:rgba(20,14,4,.42);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;transition:opacity .3s ease}
#cfCelebrate.on{opacity:1}
#cfCelebrate canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.cf-cel-card{position:relative;background:linear-gradient(150deg,#0ea371,#036c4e);color:#fff;border-radius:24px;padding:30px 34px 28px;text-align:center;box-shadow:0 20px 60px rgba(3,80,55,.5),inset 0 1px 0 rgba(255,255,255,.25);width:min(320px,82vw);transform:scale(.7) translateY(20px);opacity:0;transition:transform .5s cubic-bezier(.34,1.5,.5,1),opacity .35s ease}
#cfCelebrate.on .cf-cel-card{transform:scale(1) translateY(0);opacity:1}
.cf-cel-check{width:58px;height:58px;border-radius:50%;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:30px;box-shadow:0 0 0 0 rgba(255,255,255,.5);animation:cfGlowW 1.3s ease-out .25s}
@keyframes cfGlowW{0%{box-shadow:0 0 0 0 rgba(255,255,255,.55)}70%{box-shadow:0 0 0 20px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.cf-cel-ttl{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;opacity:.85}
.cf-cel-sum{font-family:'Unbounded','Golos Text',sans-serif;font-size:34px;font-weight:800;letter-spacing:-.5px;margin:8px 0 2px;font-variant-numeric:tabular-nums}

.cf-cel-rows{display:flex;gap:8px;margin-top:4px}
.cf-cel-rows>div{flex:1;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);border-radius:12px;padding:9px 6px}
.cf-cel-rl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;opacity:.8}
.cf-cel-rv{font-size:15px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.cf-cel-tap{margin-top:16px;font-size:11px;font-weight:600;opacity:.7}
/* ‚îÄ‚îÄ‚îÄ App i√ßi modal (confirm / sayƒ± giri≈üi) ‚îÄ‚îÄ‚îÄ */
#cfModal{position:fixed;inset:0;z-index:4200;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(20,14,4,.44);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);opacity:0;transition:opacity .25s ease}

.cf-mod{background:var(--card);color:var(--t1);border:1px solid var(--border);border-radius:20px;padding:22px 22px 18px;width:min(340px,88vw);box-shadow:0 24px 60px rgba(20,14,4,.4);transform:scale(.85) translateY(14px);opacity:0;transition:transform .38s cubic-bezier(.34,1.5,.5,1),opacity .28s ease}
#cfModal.on .cf-mod{transform:scale(1) translateY(0);opacity:1}

/* Sayƒ± klavyesi: ‚àí/+ stepper + hƒ±zlƒ± √ßipler */
.cf-num-row{display:flex;align-items:center;gap:10px;margin-top:14px}

<script>
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand()}
// Sayƒ± kutularƒ±na dokununca deƒüer '0' ise otomatik temizle (yazmayƒ± kolayla≈ütƒ±rƒ±r)
document.addEventListener('focusin',function(e){var t=e.target;if(t&&t.tagName==='INPUT'&&t.type==='number'&&t.value==='0'){t.value=''}},true);
// ‚ïê‚ïê‚ïê Fullscreen safe-area: ba≈ülƒ±k status bar / Telegram kontrolleri altƒ±nda kalmasƒ±n ‚ïê‚ïê‚ïê
if(tg){
  function applySafeTop(){
    try{
      var s=(tg.safeAreaInset&&tg.safeAreaInset.top)||0;       // cihaz √ßentiƒüi/status bar
      var c=(tg.contentSafeAreaInset&&tg.contentSafeAreaInset.top)||0; // Telegram √ºst kontrolleri
      var top=s+c;
      document.documentElement.style.setProperty('--safe-top', (top>0?top:0)+'px');
    }catch(e){}
  }
  applySafeTop();
  // Best practice: dikey kaydƒ±rƒ±rken yanlƒ±≈ülƒ±kla kapanmayƒ± √∂nle (form/scroll i√ßin)
  try{tg.disableVerticalSwipes&&tg.disableVerticalSwipes()}catch(e){}
  // BotFather gibi: SADECE mobilde fullscreen iste. Masa√ºst√º/web ‚Üí Fullsize (ortalƒ± modal) kalƒ±r.
  try{
    var _plat=(tg.platform||'').toLowerCase();
    if((_plat==='android'||_plat==='ios')&&tg.requestFullscreen&&!tg.isFullscreen){
      tg.requestFullscreen();
    }
  }catch(e){}
  try{tg.onEvent&&tg.onEvent('safeAreaChanged',applySafeTop)}catch(e){}
  try{tg.onEvent&&tg.onEvent('contentSafeAreaChanged',applySafeTop)}catch(e){}
  try{tg.onEvent&&tg.onEvent('fullscreenChanged',applySafeTop)}catch(e){}

}
// ‚ïê‚ïê‚ïê YOL B: API her zaman Railway backend'ine (sabit adres) gider ‚ïê‚ïê‚ïê
// Sayfa github.io'dan da a√ßƒ±lsa Railway'e ula≈üƒ±r (backend orada). text/plain
// kullanƒ±yoruz ki cross-origin'de CORS preflight tetiklenmesin.
var API_BASE="https://amusing-creativity-production-a2e7.up.railway.app";
// ‚ïê‚ïê‚ïê Otomatik s√ºr√ºm yenileme ‚ïê‚ïê‚ïê Telegram WebView eski HTML'i cache'liyor (√∂zellikle
// "Open App"/Main App sabit URL'inde). A√ßƒ±lƒ±≈üta sunucudaki g√ºncel s√ºr√ºm√º sor; bizimkinden
// yeniyse demek ki cache'li eski sayfadayƒ±z ‚Üí ?v= ile kendini taze y√ºkle. APP_BUILD her
// deploy'da artar; /api/ver bunu diskteki index.html'den okuyup d√∂nd√ºr√ºr (tek kaynak).
var APP_BUILD=2026070119;
(function(){
  try{
    fetch(API_BASE+'/api/ver?_='+Date.now(),{cache:'no-store'})
      .then(function(r){return r.text();})
      .then(function(t){
        var sv=parseInt(t,10)||0;
        if(sv>APP_BUILD){
          var key='cf_rl_'+sv;
          if(!sessionStorage.getItem(key)){
            sessionStorage.setItem(key,'1'); // sonsuz d√∂ng√º korumasƒ±
            var base=location.href.split('#')[0].split('?')[0];
            location.replace(base+'?v='+sv);
          }
        }
      }).catch(function(){});
  }catch(e){}
})();
// A√ßƒ±lƒ±≈üta state'i backend'den √ßek (hash'e G√úVENME ‚Äî eski/kƒ±rpƒ±k olabilir).
(function(){
  try{
    var initData=(tg&&tg.initData)?tg.initData:'';
    if(!initData)return; // Telegram dƒ±≈üƒ±nda a√ßƒ±ldƒ±ysa (tarayƒ±cƒ± testi) mevcut hash/demo kalsƒ±n
    var xhr=new XMLHttpRequest();
    xhr.open('POST',API_BASE+'/api/state',false); // senkron: kalan kod hash'i okumadan √∂nce hazƒ±r olsun
    xhr.setRequestHeader('Content-Type','text/plain;charset=UTF-8');
    xhr.send(JSON.stringify({initData:initData}));
    if(xhr.status===200&&xhr.responseText){
      // Doƒürudan deƒüi≈ükene yaz ‚Äî location.hash round-trip'i %-kodlamayƒ± bozup

if(tg){
  var _origSend=tg.sendData?tg.sendData.bind(tg):null;
  tg.sendData=function(dataStr){
    try{
      var initData=tg.initData||'';

      fetch(API_BASE+'/api/action',{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},
        body:JSON.stringify({initData:initData,data:dataStr})})

          // ƒ∞≈ülem ba≈üarƒ±lƒ± ‚Üí ARKA PLANDA state'i tazele (sayfa yeniden Y√úKLENMEZ ‚Äî flash/scroll sƒ±√ßramasƒ± yok)

}

const THEME_COLORS={light:{header:'#f4efe5',bg:'#f4efe5'},dark:{header:'#141008',bg:'#141008'}};
function applyTheme(theme){
  const t=(theme==='dark')?'dark':'light';

function toggleTheme(ev){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next=(cur==='dark')?'light':'dark';
  // Logo: tek seferlik d√∂n√º≈ü animasyonu (bittikten sonra n√∂trde kalƒ±r)
  try{
    const logo=ev&&ev.currentTarget?ev.currentTarget:document.querySelector('.brand-logo');
    if(logo){
      logo.classList.remove('spin');
      // reflow trick ‚Äî animasyon yeniden tetiklensin
      void logo.offsetWidth;
      logo.classList.add('spin');
      const onEnd=function(){logo.classList.remove('spin');logo.removeEventListener('animationend',onEnd)};
      logo.addEventListener('animationend',onEnd);
      // Mobilde focus/hover state'inin sticky kalmamasƒ± i√ßin blur ve aktif elementi temizle
      try{logo.blur&&logo.blur()}catch(_){}
      try{document.activeElement&&document.activeElement.blur&&document.activeElement.blur()}catch(_){}
    }
  }catch(e){}
  // G√ºzel g√∂rsel efekt: NERO'dan dalga yayƒ±lsƒ±n
  try{
    const f=document.createElement('div');
    f.className='theme-flash';
    if(ev&&ev.currentTarget){
      const r=ev.currentTarget.getBoundingClientRect();
      f.style.left=(r.left)+'px';f.style.top=(r.top)+'px';
      f.style.width=r.width+'px';f.style.height=r.height+'px';
    }

  }catch(e){}
  if(tg)tg.HapticFeedback?.impactOccurred?.('medium');
  applyTheme(next);
}

function sO(sendAt){
  var tot=Object.values(ord).reduce(function(a,v){return a+v},0);
  if(!tot)return;
  // Payload ‚Äî tam √ºr√ºn isimleriyle g√∂nder. Artƒ±k HTTP (/api/action) kullanƒ±yoruz,
  // eski sendData 3800-byte limiti yok ‚Üí isimleri KISALTMA. Bot uzun mesajlarƒ± par√ßalar.
  var maxL=200; // pratik olarak hi√ßbir isim bunu a≈ümaz
  var ps;
  do{
    var g=[];
    Object.keys(P).forEach(function(ck){
      var d=P[ck],it=[];
      d.items.forEach(function(p){
        if(ord[p.id]){
          var nm=String(p.n||'');
          if(nm.length>maxL)nm=nm.substring(0,maxL);
          it.push(nm+':'+ord[p.id]);
        }
      });
      if(it.length)g.push(ck+'|'+it.join('|'));
    });
    var _po={a:'o',g:g,c:tot};if(sendAt)_po.send_at=sendAt;
    ps=JSON.stringify(_po);
    var bl=0;for(var i=0;i<ps.length;i++){bl+=ps.charCodeAt(i)>127?2:1}
    if(bl<=900000)break; // HTTP b√ºy√ºk g√∂vde kaldƒ±rƒ±r ‚Äî pratikte hi√ß kƒ±saltma olmaz
    maxL-=10;
  }while(maxL>=20);
  // Ge√ßmi≈ü kaydet (tam isimlerle)
  var allNames={};var all=allItems();
  Object.keys(ord).forEach(function(id){var p=all.find(function(x){return x.id===id});if(p)allNames[id]=p.n});
  hist.push({type:'order',items:JSON.parse(JSON.stringify(ord)),names:allNames,date:new Date().toISOString(),user:tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user.first_name:'–ë–∞—Ä–∏—Å—Ç–∞'});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast(sendAt?'‚è∞ –ó–∞–∫–∞–∑ –∑–∞–ø–ª–∞–Ω–∏—Ä–æ–≤–∞–Ω':'–ó–∞–∫–∞–∑ –æ—Ç–ø—Ä–∞–≤–ª–µ–Ω!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  ord={};cat=null;orderSched=false;render();
  if(tg&&tg.sendData){try{tg.sendData(ps);}catch(e){console.warn('sendData:',e)}}
}

function esc(s){return String(s||'').replace(/'/g,"\\'")}
function escH(s){return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function toast(msg,type){
  const t=document.getElementById('toast');
  // Tip: a√ßƒ±k√ßa verilebilir; verilmezse mesaj i√ßeriƒüinden otomatik algƒ±la
  var s=String(msg||'');
  if(!type){
    if(/‚ùå|‚õî|–û—à–∏–±–∫–∞|–æ—à–∏–±–∫–∞|–Ω–µ —É–¥–∞–ª|–ù–µ—Ç –∞–∫—Ç–∏–≤|–ù–µ—Ç –ø–∞—Ä–æ–ª—è|–ù–µ–≤–µ—Ä–Ω|–Ω–µ –Ω–∞–π–¥–µ–Ω|–ó–∞–ø–æ–ª–Ω–∏—Ç–µ|–£–∫–∞–∂–∏—Ç–µ/.test(s))type='err';
    else if(/‚öÝ|üîí|–í–Ω–∏–º–∞–Ω–∏–µ|–°–Ω–∞—á–∞–ª–∞|–Ω–µ–ª—å–∑—è|–¥–æ—Å—Ç—É–ø–Ω–æ/i.test(s))type='warn';
    else type='success';
  }
  var icon=type==='err'?'‚öÝÔ∏è':(type==='warn'?'‚öÝÔ∏è':(type==='info'?'‚ÑπÔ∏è':''));
  t.className='toast'+(type==='err'?' t-err':type==='warn'?' t-warn':type==='info'?' t-info':'');
  t.innerHTML=(icon?'<span class="toast-ic">'+icon+'</span>':'')+'<span>'+msg+'</span>';
  // yeniden akƒ±≈üa girsin diye reflow
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(window._toastT);
  window._toastT=setTimeout(function(){t.classList.remove('show')},type==='err'?3200:2500);
  if(tg&&tg.HapticFeedback){try{tg.HapticFeedback.notificationOccurred(type==='err'?'error':type==='warn'?'warning':'success')}catch(_e){}}
}

// Aktif vardiya s√ºresini canlƒ± hesapla (H:MM:SS)
function liveDur(startIso){
  if(!startIso)return '0:00:00';
  try{
    const s=new Date(startIso);
    const now=gT();
    const diff=Math.max(0,Math.floor((now.getTime()-s.getTime())/1000)); // saniye
    const h=Math.floor(diff/3600),mn=Math.floor((diff%3600)/60),sc=diff%60;
    return h+':'+String(mn).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  }catch(e){return '0:00:00'}
}
function liveHours(startIso){
  if(!startIso)return 0;
  try{
    const s=new Date(startIso);
    const now=gT();
    return Math.max(0,(now.getTime()-s.getTime())/3600000);
  }catch(e){return 0}
}

// Saatleri okunabilir bi√ßimde g√∂ster:
//   0.02h ‚Üí "1–º"
//   0.5h  ‚Üí "30–º"
//   1.5h  ‚Üí "1—á 30–º"
//   8h    ‚Üí "8—á"
function fmtH(h){
  const n=Number(h)||0;
  if(n<=0)return '0–º';
  const totalMin=Math.round(n*60);
  const hh=Math.floor(totalMin/60);
  const mm=totalMin%60;
  if(hh===0)return mm+'–º';
  if(mm===0)return hh+'—á';
  return hh+'—á '+mm+'–º';
}
function fmtTime(iso){
  if(!iso)return '--:--';
  try{const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}catch(e){return '--:--'}
}
function fmtDay(iso){
  if(!iso)return '';
  try{const d=new Date(iso);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()}catch(e){return ''}
}

// Hƒ±zlƒ± istatistik (bug√ºn/hafta) ‚Äî bitmi≈ü vardiyalardan
function calcQuickStats(shifts){
  const now=gT();
  const today=now.toDateString();
  const wkAgo=new Date(now.getTime()-7*86400000);
  let today_=0,todayShifts=0,week=0,weekShifts=0;
  shifts.forEach(function(sh){
    const dt=new Date(sh.start_time||sh.created_at||sh.date||0);
    if(isNaN(dt))return;
    if(dt.toDateString()===today){today_+=(sh.total||0);todayShifts++}
    if(dt>=wkAgo){week+=(sh.total||0);weekShifts++}
  });
  return {today:today_,todayShifts:todayShifts,week:week,weekShifts:weekShifts};
}

    ov.addEventListener('click',close);
    requestAnimationFrame(function(){ov.classList.add('on');});
    // count-up
    var sumEl=card.querySelector('#cfCelSum');var T=Math.max(0,total||0);

      // G√ºvenlik: rAF kƒ±sƒ±tlanƒ±rsa bile doƒüru tutar g√∂r√ºns√ºn

function cfConfetti(cv){
  var ctx=cv.getContext('2d');var W=cv.width=cv.offsetWidth,H=cv.height=cv.offsetHeight;
  var cols=['#f8d765','#e2ac16','#10b981','#ffffff','#fcefc3'];
  var N=120,parts=[];
  for(var i=0;i<N;i++){parts.push({x:W/2+(Math.random()-.5)*90,y:H*0.42+(Math.random()-.5)*40,vx:(Math.random()-.5)*11,vy:-6-Math.random()*9,g:.28+Math.random()*.12,s:5+Math.random()*6,r:Math.random()*6.28,vr:(Math.random()-.5)*.4,c:cols[i%cols.length],life:0});}
  var t0=performance.now();
  (function frame(now){var el=now-t0;ctx.clearRect(0,0,W,H);var alive=false;
    for(var i=0;i<parts.length;i++){var p=parts[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.r+=p.vr;p.life=el;
      var a=el<2600?1:Math.max(0,1-(el-2600)/900);if(p.y<H+20&&a>0){alive=true;}
      ctx.save();ctx.globalAlpha=a;ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();}
    if(el<3600&&alive)requestAnimationFrame(frame);else ctx.clearRect(0,0,W,H);
  })(t0);
}
// ‚îÄ‚îÄ Non-blocking konfeti patlamasƒ± (overlay, pointer-events yok) ‚îÄ‚îÄ
function cfConfettiBurst(originYRatio,zIndex){
  try{
    if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
    var cv=document.createElement('canvas');
    cv.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:'+(zIndex||3800);
    document.body.appendChild(cv);
    var W=cv.width=cv.offsetWidth,H=cv.height=cv.offsetHeight;
    var oy=H*(originYRatio||0.32);
    var ctx=cv.getContext('2d');var cols=['#f8d765','#e2ac16','#10b981','#ffffff','#fcefc3'];
    var N=90,parts=[];
    for(var i=0;i<N;i++){parts.push({x:W/2+(Math.random()-.5)*W*0.5,y:oy+(Math.random()-.5)*30,vx:(Math.random()-.5)*9,vy:-5-Math.random()*8,g:.3+Math.random()*.12,s:5+Math.random()*5,r:Math.random()*6.28,vr:(Math.random()-.5)*.4,c:cols[i%cols.length]});}
    var t0=performance.now();
    (function frame(now){var el=now-t0;ctx.clearRect(0,0,W,H);var alive=false;
      for(var i=0;i<parts.length;i++){var p=parts[i];p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.vx*=.99;p.r+=p.vr;
        var a=el<1900?1:Math.max(0,1-(el-1900)/700);if(p.y<H+20&&a>0)alive=true;
        ctx.save();ctx.globalAlpha=a;ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6);ctx.restore();}
      if(el<2700&&alive)requestAnimationFrame(frame);else{try{cv.remove()}catch(_e){}}
    })(t0);
    setTimeout(function(){try{cv.remove()}catch(_e){}},3000);
  }catch(_e){}
}

        +'<div class="cf-num-chips"><button class="cf-chip" data-add="1" type="button">+1</button><button class="cf-chip" data-add="5" type="button">+5</button><button class="cf-chip" data-add="10" type="button">+10</button><button class="cf-chip" data-add="25" type="button">+25</button><button class="cf-chip cf-chip-z" data-set="0" type="button">–°–±—Ä–æ—Å</button></div>'
      ):'')
      +(isText?'<input class="cf-mod-inp" id="cfModTxt" type="text" value="'+escH(opts.value!=null?opts.value:'')+'" placeholder="'+escH(opts.placeholder||'')+'" style="font-size:15px;text-align:left;font-weight:600">':'')

      +'</div>';

    var done=false;

    var inp=box.querySelector('#cfModInp');

    if(txt){txt.addEventListener('keydown',function(e){if(e.key==='Enter')finish((txt.value||'').trim());});}
    if(inp){inp.addEventListener('keydown',function(e){if(e.key==='Enter'){finish(inp.value===''?null:Math.max(0,parseInt(inp.value)||0));}});}
    requestAnimationFrame(function(){ov.classList.add('on');var fi=inp||box.querySelector('#cfModTxt');if(fi){setTimeout(function(){fi.focus();fi.select&&fi.select();},120);}});
  });
}

// ‚îÄ‚îÄ Vardiyayƒ± geriye d√∂n√ºk ba≈ülat (HH:MM giri≈üi) ‚îÄ‚îÄ
async function startShiftCustomTime(){
  const inp=document.getElementById('cstStart');
  if(!inp||!inp.value){toast('–£–∫–∞–∂–∏—Ç–µ –≤—Ä–µ–º—è');return}
  const hhmm=inp.value; // 'HH:MM'
  // Tarih giri≈üi (yoksa bug√ºn)
  const dInp=document.getElementById('cstDate');
  const now=new Date();
  var Y=now.getFullYear(),Mo=now.getMonth(),D=now.getDate();
  if(dInp&&dInp.value){var p=dInp.value.split('-');Y=parseInt(p[0]);Mo=parseInt(p[1])-1;D=parseInt(p[2]);}
  const [hh,mm]=hhmm.split(':').map(function(x){return parseInt(x)||0});
  const customDt=new Date(Y,Mo,D,hh,mm,0,0);
  // Geleceƒüe izin verme
  if(customDt-now>2*60*1000){toast('–í—Ä–µ–º—è –Ω–µ –º–æ–∂–µ—Ç –±—ã—Ç—å –≤ –±—É–¥—É—â–µ–º');return}
  // 24 saatten eski izin verme (yanlƒ±≈ülƒ±kla ‚Äî gece vardiyasƒ± i√ßin 24h)
  if(now-customDt>24*60*60*1000){
    if(!(await cfAsk('–£–∫–∞–∑–∞–Ω–æ –≤—Ä–µ–º—è –±–æ–ª–µ–µ —Å—É—Ç–æ–∫ –Ω–∞–∑–∞–¥. –ü—Ä–æ–¥–æ–ª–∂–∏—Ç—å?',{icon:'‚è∞'})))return;
  }
  var dtLabel=String(D).padStart(2,'0')+'.'+String(Mo+1).padStart(2,'0')+' '+hhmm;
  if(!(await cfAsk('–ù–∞—á–∞—Ç—å —Å–º–µ–Ω—É —Å '+dtLabel+'?\n–í—Ä–µ–º—è –ø—Ä–∏—Ö–æ–¥–∞ –±—É–¥–µ—Ç —É–∫–∞–∑–∞–Ω–æ –≤—Ä—É—á–Ω—É—é.',{okText:'–ù–∞—á–∞—Ç—å',icon:'üü¢'})))return;
  const customIso=customDt.toISOString();
  SUMMARY.active={start_time:customIso,end_time:null,hours:0,drinks:'{}',bonus:0,hourly_pay:0,total:0};
  toast('üü¢ –°–º–µ–Ω–∞ –Ω–∞—á–∞–ª–∞—Å—å —Å '+dtLabel);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'shift_start',start_time:customIso,branch:(startBranch||MY_BRANCH)}))}catch(e){console.warn(e)}}
  render();
  cfShiftStartedPop();
}

// G√ºn√ºn A√áICI (en erken) vardiyasƒ± 07:00'den ne kadar ge√ß ba≈üladƒ±? Sadece sabah penceresinde
// (<12:00) ba≈ülayan, o g√ºn√ºn ilk vardiyasƒ± kontrol edilir (√∂ƒüleden sonra/ak≈üam vardiyalarƒ± muaf,
// gece geriye-d√∂n√ºk giri≈üler de doƒüal olarak muaf). Erken/zamanƒ±nda ‚Üí null. D√∂n√º≈ü: gecikme dakikasƒ±.
const OPEN_HOUR=7;
function openerLate(sh,allShifts){
  if(!sh||!sh.start_time)return null;
  var st=new Date(sh.start_time);if(isNaN(st)||st.getHours()>=12)return null; // sadece sabah
  var dk=st.toDateString(),earliest=null;
  (allShifts||[]).forEach(function(x){
    if(!x||!x.start_time)return;
    var d=new Date(x.start_time);if(isNaN(d)||d.getHours()>=12||d.toDateString()!==dk)return;
    if(!earliest||d<earliest)earliest=d;
  });
  if(!earliest||Math.abs(earliest-st)>1000)return null; // bu vardiya o g√ºn√ºn a√ßƒ±cƒ±sƒ± deƒüil
  var exp=new Date(st.getFullYear(),st.getMonth(),st.getDate(),OPEN_HOUR,0,0,0);
  var diff=Math.round((st-exp)/60000);
  return diff>0?diff:null; // erken/zamanƒ±nda ‚Üí i≈üaret yok
}
function lateLabel(min){if(!min)return '';if(min<60)return '+'+min+' –º–∏–Ω';var hh=Math.floor(min/60),mm=min%60;return '+'+hh+'—á'+(mm?' '+mm+'–º':'');}

function saveFine(){
  const cnt=fineDraft.targets.length;
  const reason=(fineDraft.reason||'').trim();
  if(cnt===0||fineDraft.amount<=0||!reason){
    if(!reason)toast('‚ùå –ü—Ä–∏—á–∏–Ω–∞ –æ–±—è–∑–∞—Ç–µ–ª—å–Ω–∞');
    return;
  }
  const chefShare=!!fineDraft.chefShare;
  const totalAmt=fineDraft.amount;
  const baristaPool=chefShare?Math.floor(totalAmt/2):totalAmt;
  const chefAmt=chefShare?(totalAmt-baristaPool):0;
  const split=fineDraft.split&&cnt>1;
  const per=split?Math.floor(baristaPool/cnt):baristaPool;
  // Lokal g√ºncelleme ‚Äî baristalar
  fineDraft.targets.forEach(function(uid){
    const t=BARISTAS.find(function(x){return x.id===uid});
    if(t){t.f=(t.f||0)+per;t.net=(t.net||0)-per}
  });
  // Lokal g√ºncelleme ‚Äî ≈üefin (kendi) payƒ±
  if(chefShare&&chefAmt>0){
    const me=BARISTAS.find(function(x){return x.id===MY_UID});
    if(me){me.f=(me.f||0)+chefAmt;me.net=(me.net||0)-chefAmt}
  }
  const payload={action:'fine',targets:fineDraft.targets,amount:totalAmt,reason:reason,type:fineDraft.type,split:split,chef_share:chefShare};
  toast(chefShare?('üç¥ –®—Ç—Ä–∞—Ñ —Ä–∞–∑–¥–µ–ª—ë–Ω —Å–æ —à–µ—Ñ–æ–º'):(split?('‚öÝÔ∏è –®—Ç—Ä–∞—Ñ —Ä–∞–∑–¥–µ–ª—ë–Ω ¬∑ '+cnt+' —á–µ–ª.'):'‚öÝÔ∏è –®—Ç—Ä–∞—Ñ –∑–∞–ø–∏—Å–∞–Ω'));
  if(tg)tg.HapticFeedback?.notificationOccurred('warning');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify(payload))}catch(e){console.warn(e)}}
  fineDraft={targets:[],type:'clean',amount:30000,reason:'',custom:'',split:false,chefShare:false};
  mView='main';
  render();
}

var SCHED_DOW=['–ü–Ω','–í—Ç','–°—Ä','–ß—Ç','–ü—Ç','–°–±','–í—Å'];
var SCHED_TIMES=['07:00‚Äì17:00','07:00‚Äì19:00','07:00‚Äì00:00','17:00‚Äì03:00','19:00‚Äì07:00','07:00‚Äì03:00','19:00‚Äì03:00'];

function schedDates(){
  var base;
  if(SCHED_WEEK){base=new Date(SCHED_WEEK+'T00:00:00');}
  else{var d=new Date();var wd=(d.getDay()+6)%7;base=new Date(d.getFullYear(),d.getMonth(),d.getDate()-wd);}
  if(isNaN(base.getTime())){var d2=new Date();var wd2=(d2.getDay()+6)%7;base=new Date(d2.getFullYear(),d2.getMonth(),d2.getDate()-wd2);}
  var out=[];for(var i=0;i<7;i++){out.push(new Date(base.getFullYear(),base.getMonth(),base.getDate()+i));}
  return out;
}
function schedRoster(){return (BARISTAS||[]).filter(function(x){return !x.arch});}
function schedVal(uid,day){var r=SCHED[String(uid)];return (r&&r[day])||'';}
function schedCell(uid,day,val){
  var k=String(uid);SCHED[k]=SCHED[k]||['','','','','','',''];SCHED[k][day]=val;
  SCHED_ALL[SCHED_WEEK]=SCHED;
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'schedule_save',week:SCHED_WEEK,data:SCHED}))}catch(e){}}
}
// Hafta se√ß: girilen tarihi PAZARTESƒ∞'ye √ßevir, o haftanƒ±n verisini y√ºkle
function schedSetWeek(v){
  if(!v)return;var d=new Date(v+'T00:00:00');if(isNaN(d.getTime()))return;
  var wd=(d.getDay()+6)%7;var mon=new Date(d.getFullYear(),d.getMonth(),d.getDate()-wd);
  var pad=function(n){return String(n).padStart(2,'0')};
  SCHED_WEEK=mon.getFullYear()+'-'+pad(mon.getMonth()+1)+'-'+pad(mon.getDate());
  SCHED=SCHED_ALL[SCHED_WEEK]||{};
  render();
}
function schedShiftWeek(delta){
  var ds=schedDates();var mon=new Date(ds[0].getFullYear(),ds[0].getMonth(),ds[0].getDate()+delta*7);
  var pad=function(n){return String(n).padStart(2,'0')};
  schedSetWeek(mon.getFullYear()+'-'+pad(mon.getMonth()+1)+'-'+pad(mon.getDate()));
}

// √áizelgeyi canvas'a √ßiz ‚Üí PNG ‚Üí bota g√∂nder
function sendScheduleImage(){
  try{
    var ds=schedDates();var roster=schedRoster();
    if(!roster.length){toast('–ù–µ—Ç —Å–æ—Ç—Ä—É–¥–Ω–∏–∫–æ–≤');return;}

    var dark=document.documentElement.getAttribute('data-theme')==='dark';
    var bg=dark?'#1f1910':'#fffdf8',line=dark?'rgba(255,225,170,.16)':'rgba(76,57,26,.15)',
        t1=dark?'#f6efe1':'#2a2012',t2=dark?'#bdac8e':'#6f604a',gold=dark?'#eebe4d':'#c28e0e',
        head=dark?'#2a2215':'#f0e9da',off=dark?'#332a1a':'#efe7d6';
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);
    // ba≈ülƒ±k

function toggleTipTarget(uid){
  if(tipDraft.distributions[uid]!==undefined)delete tipDraft.distributions[uid];

  render();

function setTipFor(uid,v){tipDraft.distributions[uid]=parseInt(v)||0;recalcTips()}
function calcTipPlan(){
  const total=parseInt(tipDraft.total)||0;
  const ids=Object.keys(tipDraft.distributions).map(function(x){return parseInt(x)});
  const cnt=ids.length;
  if(tipDraft.mode==='equal'){
    const per=cnt>0?Math.floor(total/cnt):0;
    return {cnt:cnt,total:total,per:per,sum:per*cnt};
  } else {
    let s=0;ids.forEach(function(u){s+=parseInt(tipDraft.distributions[u])||0});
    return {cnt:cnt,total:s,per:0,sum:s};
  }
}
function recalcTips(){
  const calc=calcTipPlan();
  const s=document.getElementById('tpSummary');if(s)s.innerHTML=tipSummaryInner(calc);
  const bt=document.getElementById('bot');if(bt)bt.innerHTML=tipButtonInner(calc);
}
function saveTips(){
  const calc=calcTipPlan();
  if(calc.cnt===0||calc.sum<=0)return;
  // Daƒüƒ±tƒ±m planƒ±: {uid:amount}
  const dist={};
  if(tipDraft.mode==='equal'){

// Cyrillic ‚Üí latin transliteration (id otomatik √ºretmek i√ßin)
function translit(s){
  const map={
    '–∞':'a','–±':'b','–≤':'v','–≥':'g','–¥':'d','–µ':'e','—ë':'e','–∂':'zh','–∑':'z',
    '–∏':'i','–π':'y','–∫':'k','–ª':'l','–º':'m','–Ω':'n','–æ':'o','–ø':'p','—Ä':'r',
    '—Å':'s','—Ç':'t','—É':'u','—Ñ':'f','—Ö':'h','—Ü':'ts','—á':'ch','—à':'sh','—â':'sch',
    '—ä':'','—ã':'y','—å':'','—ç':'e','—é':'yu','—è':'ya'
  };
  let out='';
  for(const ch of (s||'').toLowerCase()){
    if(map[ch]!==undefined)out+=map[ch];
    else if(/[a-z0-9]/.test(ch))out+=ch;
    else if(ch===' '||ch==='-'||ch==='_')out+='_';
    // diƒüer karakterleri atla
  }
  // Birden fazla _ olmasƒ±n
  out=out.replace(/_+/g,'_').replace(/^_|_$/g,'');
  return out||'item';
}

let RT_TIMER=null;
function rtClearTimer(){if(RT_TIMER){clearInterval(RT_TIMER);RT_TIMER=null}}
function rtUpdateTimerDom(){
  const ring=document.querySelector('.rt-timer-ring');if(!ring||!RT)return;
  const tLeft=Math.max(0,RT.timeLeft||0),tMax=RT.timePerQ||10;
  const ringR=15,ringC=2*Math.PI*ringR;
  const dash=ringC*(1-tLeft/tMax);
  ring.classList.toggle('warn',tLeft<=4&&tLeft>2);
  ring.classList.toggle('danger',tLeft<=2);
  const fg=ring.querySelector('.fg');if(fg)fg.setAttribute('stroke-dashoffset',dash);
  const num=ring.querySelector('.rt-timer-num');if(num)num.textContent=tLeft;
}
function rtStartTimer(){
  rtClearTimer();
  if(!RT)return;
  RT.timePerQ=10;RT.timeLeft=10;RT.qStartedAt=Date.now();
  RT_TIMER=setInterval(function(){
    if(!RT||RT.answered||RT.done){rtClearTimer();return}
    RT.timeLeft=Math.max(0,RT.timePerQ-Math.floor((Date.now()-RT.qStartedAt)/1000));
    rtUpdateTimerDom();
    if(RT.timeLeft<=0){rtTimeout();return}
  },250);
}
function rtTimeout(){
  if(!RT||RT.answered)return;
  rtClearTimer();

  RT.streak=0;RT.hearts=Math.max(0,RT.hearts-1);

function rtBuildExam(){
  // 30 soru: 40% Q1 (basit), 30% Q2 (—á—Ç–æ –Ω–µ –≤—Ö–æ–¥–∏—Ç), 30% Q3 (provokasyon)
  const qs=[];
  for(let i=0;i<30;i++){
    if(Math.random()<0.4){qs.push(rtMakeFact());continue;} // %40 bilgi sorusu (saklama/standart/...)
    const r=Math.random();
    let type='q1';
    if(r<0.4)type='q1';else if(r<0.7)type='q2';else type='q3';
    qs.push(rtMakeQ(type));
  }
  return qs;
}

function rtAnswer(i){
  if(!RT||RT.answered)return;
  rtClearTimer();
  RT.answered=true;RT.pickedIdx=i;RT.timedOut=false;
  const q=RT.qs[RT.idx],ok=q.opts[i]===q.correct;
  const elapsed=Math.min(10,(Date.now()-RT.qStartedAt)/1000);
  const speedSec=Math.max(0,10-elapsed); // hƒ±zlƒ± cevap ‚Üí daha √ßok puan
  if(ok){
    const base=10;
    const speedBonus=Math.round(speedSec*2); // max ~20 ekstra (10s √ó 2)
    const gain=base+speedBonus;
    RT.correct++;RT.xp+=gain;RT.lastGain=gain;RT.lastSpeed=Math.round(speedSec);
    RT.timeBonus+=speedBonus;
    RT.streak++;if(RT.streak>RT.maxStreak)RT.maxStreak=RT.streak;
    if(tg)tg.HapticFeedback?.notificationOccurred('success');
    showBonusFly('+'+gain);
  }
  else{RT.streak=0;RT.hearts=Math.max(0,RT.hearts-1);if(tg)tg.HapticFeedback?.notificationOccurred('error');}
  render();
}
function rtNext(){
  if(!RT)return;

  // Exam modu: can yok, sadece soru bittiƒüinde biter
  if(RT.mode!=='exam'&&RT.hearts<=0){RT.done=true;finishGame();render();return;}
  RT.idx++;RT.answered=false;RT.pickedIdx=-1;RT.timedOut=false;
  if(RT.idx>=RT.qs.length){RT.done=true;finishGame();}
  else{
    if(RT.mode==='exam')rtStartExamTimer();else rtStartTimer();
  }
  render();
}

function examBuild(){
  // –°–ï–Ý–¢–ò–§–ò–ö–ê–¶–ò–û–ù–ù–´–ô –≠–ö–ó–ê–ú–ï–ù ‚Äî 100 –≤–æ–ø—Ä–æ—Å–æ–≤ –∑–Ω–∞–Ω–∏–π, –∞–¥–∞–ø—Ç–∏–≤–Ω–∞—è —Å–ª–æ–∂–Ω–æ—Å—Ç—å (–ª–µ–≥–∫–æ ‚Üí —Å–ª–æ–∂–Ω–æ).
  // 34√ó–ª—ë–≥–∫–∏–π(d1) ‚Üí 33√ó—Å—Ä–µ–¥–Ω–∏–π(d2) ‚Üí 33√ó—Å–ª–æ–∂–Ω—ã–π/–ª–æ–≤—É—à–∫–∏(d3) ‚Äî SIRALI (gittik√ße zorla≈üƒ±r)
  const plan=[];
  for(let i=0;i<34;i++)plan.push(1);
  for(let i=0;i<33;i++)plan.push(2);
  for(let i=0;i<33;i++)plan.push(3);
  const recent=[];
  const know=plan.map(function(d){
    let q,tries=0;
    do{ q=(Math.random()<0.5)?rtMakeFactD(d):rtMakeQD(d); tries++; }
    while(tries<8 && recent.indexOf(q.text)>=0);
    recent.push(q.text); if(recent.length>14)recent.shift();
    return q;
  });
  return know; // 100 –≤–æ–ø—Ä–æ—Å–æ–≤ (–±–µ–∑ —Ñ–æ—Ç–æ)
}

function finishGame(){

  if(RT.mode==='exam'){
    const passed=pct>=(RT.examPass||90);
    saveLastExam({date:new Date().toISOString(),score:pct,correct:RT.correct,total:RT.total,passed:passed?1:0});
    if(tg)tg.HapticFeedback?.notificationOccurred(passed?'success':'error');
    RT._sent=true;
    if(tg&&tg.sendData){
      try{tg.sendData(JSON.stringify({
        action:'rt_exam',correct:RT.correct,total:RT.total,score:pct,passed:passed?1:0
      }));}catch(e){console.warn('rt exam send fail',e);}
    }
    return;
  }
  const gs=getGameState(),cfg=RT_LEVELS[RT.level-1],passed=pct>=cfg.pass;
  gs.xp=(gs.xp||0)+RT.xp;
  if(RT.maxStreak>(gs.bestStreak||0))gs.bestStreak=RT.maxStreak;
  if(passed&&RT.level>=gs.level){gs.level=Math.min(RT_LEVELS.length,RT.level+1);gs.maxLevel=Math.max(gs.maxLevel||1,gs.level);}
  saveGameState(gs);
  if(tg)tg.HapticFeedback?.notificationOccurred(passed?'success':'warning');
  // Sunucuya g√∂nder ‚Äî owner analytics i√ßin kayƒ±t
  RT._sent=true;
  if(tg&&tg.sendData){
    try{tg.sendData(JSON.stringify({

      xp:RT.xp,maxStreak:RT.maxStreak,passed:passed?1:0

  }
}
