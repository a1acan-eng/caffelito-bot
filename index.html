<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#faf8f4;--bg-rgb:250,248,244;--card:#fff;--card2:#f5f2ec;--card3:#ece8e0;--border:rgba(0,0,0,.06);--border2:rgba(0,0,0,.1);--t1:#1a1a1a;--t2:#6b6356;--t3:#a69e92;--gold:#d4a020;--gold2:#c4941a;--gold-bg:rgba(212,160,32,.08);--gold-border:rgba(212,160,32,.2);--yellow:#f5d44b;--yellow-bg:rgba(245,212,75,.15);--yellow-border:rgba(245,212,75,.4);--green:#16a34a;--green-bg:rgba(22,163,74,.06);--green-border:rgba(22,163,74,.15);--red:#dc2626;--red-bg:rgba(220,38,38,.06);--r:16px;--r2:12px;--shadow:0 1px 2px rgba(0,0,0,.04);--shadow-lg:0 4px 16px rgba(0,0,0,.08);--r3:9px;--rp:999px}
[data-theme="dark"]{--bg:#0f1115;--bg-rgb:15,17,21;--card:#1a1d24;--card2:#22262f;--card3:#2a2f3a;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--t1:#f1f1f1;--t2:#b0b6c0;--t3:#7a8290;--gold:#e6b942;--gold2:#f0c45a;--gold-bg:rgba(230,185,66,.12);--gold-border:rgba(230,185,66,.25);--yellow:#f5d44b;--yellow-bg:rgba(245,212,75,.18);--yellow-border:rgba(245,212,75,.35);--green:#22c55e;--green-bg:rgba(34,197,94,.12);--green-border:rgba(34,197,94,.25);--red:#ef4444;--red-bg:rgba(239,68,68,.12);--shadow:0 1px 2px rgba(0,0,0,.4);--shadow-lg:0 4px 16px rgba(0,0,0,.5)}

[data-theme="dark"] input[type="number"],[data-theme="dark"] input[type="text"],[data-theme="dark"] input[type="time"],[data-theme="dark"] textarea{background:var(--card2);color:var(--t1);border-color:var(--border2)}
/* ── Salary card: dark mode'da sarı kalsın ama yazılar siyah/koyu olsun ── */
[data-theme="dark"] .sal-card{background:linear-gradient(135deg,#fde68a,#facc15 50%,#f59e0b);border:1px solid #ca8a04;box-shadow:0 4px 24px rgba(250,204,21,.35)}
[data-theme="dark"] .sal-card::before{background:radial-gradient(circle,rgba(0,0,0,.08),transparent 70%)}

[data-theme="dark"] .card.today-card .card-title{color:#fde68a}
[data-theme="dark"] .card-icon.today-icon{background:#facc15;color:#1a1a1a}
[data-theme="dark"] .sec.sec-today{color:#fde68a}

.card,.set-row,.opt,.hist,.alert,.btn-end{transition:background .3s ease,border-color .3s ease,color .3s ease}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;padding-bottom:120px;-webkit-font-smoothing:antialiased;transition:background .3s ease,color .3s ease}

@media (hover:hover) and (pointer:fine){

  .brand-logo::after{content:'';position:absolute;inset:-4px;border-radius:14px;border:2px dashed var(--gold);opacity:0;transform:scale(.8);transition:all .3s ease;pointer-events:none}
  .brand-logo:hover::after{opacity:.5;transform:scale(1)}
}
/* Tıklama anında bir kez dönen animasyon — bittikten sonra nötr pozisyona döner */
@keyframes logoSpin{0%{transform:scale(1) rotate(0)}30%{transform:scale(.94) rotate(8deg)}60%{transform:scale(1.1) rotate(-12deg)}100%{transform:scale(1) rotate(0)}}
.brand-logo.spin{animation:logoSpin .55s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes themeFlash{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(2.5)}}
.theme-flash{position:fixed;top:30px;left:30px;width:38px;height:38px;border-radius:50%;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);pointer-events:none;z-index:9999;animation:themeFlash .6s ease-out forwards}
.brand-name{font-size:18px;font-weight:800;letter-spacing:-.3px}
.brand-name .caffe{color:var(--yellow)}
.brand-name .lito{color:var(--t1)}
.clock-box{display:flex;align-items:center;gap:10px}
.clock-wrap{text-align:right}
.clock{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:.5px}
.clock-day{font-size:10px;color:var(--t2);font-weight:500}
.icon-btn{width:34px;height:34px;border-radius:var(--r3);border:1px solid var(--border2);background:var(--card);color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.icon-btn.on{background:var(--yellow);border-color:var(--gold-border);color:var(--t1)}
.tabs{position:fixed;left:10px;right:10px;bottom:calc(8px + env(safe-area-inset-bottom));display:flex;gap:2px;padding:6px;background:rgba(255,255,255,.55);-webkit-backdrop-filter:saturate(200%) blur(30px);backdrop-filter:saturate(200%) blur(30px);border:1px solid rgba(255,255,255,.7);border-radius:999px;box-shadow:0 10px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);z-index:40}
@supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))){
  .tabs{background:rgba(255,255,255,.94)}
}
.tab{flex:1;min-width:0;padding:8px 2px 7px;text-align:center;font-size:9.5px;font-weight:700;color:#3a3a3c;border-radius:999px;cursor:pointer;transition:all .28s cubic-bezier(.2,.7,.2,1);letter-spacing:0;white-space:nowrap;overflow:hidden;display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1}
.tab-ic{font-size:17px;line-height:1;filter:grayscale(.15)}
.tab.on{color:#5a3e00;background:var(--yellow);box-shadow:0 2px 8px rgba(212,160,32,.35),inset 0 0 0 1px var(--gold-border)}
.tab.on .tab-ic{filter:none}
.tab:active{transform:scale(.94)}
[data-theme="dark"] .tabs{background:rgba(18,18,20,.72);border-color:rgba(255,255,255,.08)}
@supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))){
  [data-theme="dark"] .tabs{background:rgba(18,18,20,.96)}
}
[data-theme="dark"] .tab{color:rgba(255,255,255,.9)}

[data-theme="dark"] .tab.on{color:#3a2800;background:#ffd257;box-shadow:0 2px 10px rgba(255,200,60,.35),inset 0 0 0 1px rgba(255,210,87,.5)}
body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.wrap{padding:14px 18px}

@media (min-width:600px){
  html{background:var(--card3)}
  /* body'yi 480px kolona sabitle + ortala → header ve içerik (blok) kesin ortalanır */
  body{max-width:480px;margin-left:auto;margin-right:auto;box-shadow:0 0 60px rgba(0,0,0,.18)}
  /* fixed bar'lar viewport'a göre → güvenilir ortalama: left:0;right:0;margin:auto */
  .bottom{left:0;right:0;margin-left:auto;margin-right:auto;max-width:480px}

}
.alert{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--r);padding:12px 16px;margin-bottom:14px;font-size:12px;font-weight:500;line-height:1.5}

.badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px}

.qty-box{display:flex;align-items:center;gap:3px}

.task-body{flex:1;min-width:0}

.edit-btns{display:flex;gap:3px;margin-left:6px}

/* ─── Зарплата (Salary) ─── */
.sal-card{background:linear-gradient(135deg,#fef3c7,#fef9c3 50%,#fde68a);border-radius:18px;padding:22px 20px;margin-bottom:14px;border:1px solid var(--gold-border);box-shadow:0 4px 24px rgba(212,160,32,.15);position:relative;overflow:hidden}
.sal-card::before{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;background:radial-gradient(circle,rgba(212,160,32,.2),transparent 70%);border-radius:50%}
.sal-period{font-size:11px;font-weight:800;color:var(--gold2);text-transform:uppercase;letter-spacing:1.8px;opacity:.9;position:relative;z-index:1}
.sal-amount{font-size:36px;font-weight:800;color:var(--t1);line-height:1;margin:8px 0 2px;font-variant-numeric:tabular-nums;position:relative;z-index:1;letter-spacing:-1px}
.sal-amount-sub{font-size:11px;font-weight:600;color:var(--t2);opacity:.75;margin-bottom:16px;position:relative;z-index:1}
.sal-stats{display:flex;gap:6px;margin-top:12px;position:relative;z-index:1}
.sal-stat{flex:1;background:rgba(255,255,255,.65);border-radius:10px;padding:9px 6px;text-align:center;backdrop-filter:blur(8px)}
.sal-stat-v{font-size:14px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums}
.sal-stat-v.red{color:var(--red)}
.sal-stat-l{font-size:9px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;opacity:.85}
.sal-cta{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,#f5d44b,#d4a020);color:#1a1a1a;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:14px;box-shadow:0 4px 16px rgba(212,160,32,.28);letter-spacing:.3px}
.sal-cta:active{transform:scale(.98)}
.sal-cta-i{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;line-height:1}
.own-panel{background:var(--card);color:var(--t1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;box-shadow:var(--shadow)}
.own-title{font-size:11px;font-weight:800;color:var(--gold2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.own-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.own-btn{background:var(--yellow-bg);border:1px solid var(--yellow-border);border-radius:var(--r2);padding:14px 10px;cursor:pointer;text-align:center;transition:all .15s;position:relative;color:var(--t1);font-family:inherit}
.own-btn:active{background:var(--gold-bg);transform:scale(.97)}
.own-btn-i{font-size:22px;margin-bottom:4px;line-height:1}
.own-btn-t{font-size:12px;font-weight:700}
.own-btn-s{position:absolute;top:6px;right:8px;font-size:10px;font-weight:800;color:#1a1a1a;background:var(--yellow);padding:1px 7px;border-radius:8px}
.hist{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:5px}
.hist.fine{background:var(--red-bg);border-color:rgba(220,38,38,.12)}
.hist.paid{background:rgba(0,0,0,.03);opacity:.75}
.hist-l{flex:1;min-width:0;padding-right:8px}
.hist-d{font-size:13px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-m{font-size:11px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-r{font-size:14px;font-weight:800;color:var(--gold2);font-variant-numeric:tabular-nums;flex-shrink:0}
.hist-r.red{color:var(--red)}
.hist-r.grey{color:var(--t3)}
.empty-mini{text-align:center;padding:18px 12px;color:var(--t3);font-size:12px;font-weight:500;background:var(--card);border:1px dashed var(--border2);border-radius:10px;margin-bottom:8px}
.sf-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.sf-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sf-hours{width:100%;padding:14px;border:1.5px solid var(--border2);border-radius:10px;font-family:inherit;font-size:24px;font-weight:800;text-align:center;outline:none;color:var(--t1);background:#fff;-moz-appearance:textfield}
.sf-hours::-webkit-outer-spin-button,.sf-hours::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.sf-hours:focus{border-color:var(--gold)}
.sf-hint{font-size:11px;color:var(--t3);text-align:center;margin-top:6px;font-weight:600}
.dr-item{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:5px;transition:all .15s}
.dr-item.has{border-color:var(--gold-border);background:var(--yellow-bg)}
.dr-l{flex:1;padding-right:8px;min-width:0}
.dr-n{font-size:13px;font-weight:700;color:var(--t1)}
.dr-s{font-size:10px;color:var(--t3);margin-top:1px;font-weight:500}
.sf-note{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:10px;font-family:inherit;font-size:13px;background:var(--card);color:var(--t1);outline:none;resize:vertical;margin-bottom:12px;font-weight:500}
.sf-note:focus{border-color:var(--gold)}
.sf-total{background:linear-gradient(135deg,var(--card2),var(--card3));border-radius:12px;padding:14px 16px;margin:14px 0 8px}
.sf-tot-row{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--t2);padding:3px 0;font-variant-numeric:tabular-nums}
.sf-tot-big{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:var(--t1);margin-top:8px;padding-top:10px;border-top:1.5px solid rgba(0,0,0,.08);font-variant-numeric:tabular-nums}
.sf-tot-big span:last-child{color:var(--gold2)}
.bcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.bcard.me{border-color:var(--gold-border);background:var(--yellow-bg)}
.bcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:10px}
.bcard-l{flex:1;min-width:0}
.bcard-name{font-size:14px;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bcard-name .crown{color:var(--gold2)}
.bcard-uname{font-size:10px;color:var(--t3);font-weight:500;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bcard-net{font-size:18px;font-weight:800;color:var(--gold2);font-variant-numeric:tabular-nums;flex-shrink:0}
.bcard-stat{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:var(--t2)}
.bcard-stat span:last-child{font-weight:700;color:var(--t1);font-variant-numeric:tabular-nums}
.bcard-actions{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.bcard-act{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border2);background:var(--card2);color:var(--t1);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer}
.bcard-act:active{transform:scale(.97)}
.bcard-act.fine{background:var(--red-bg);color:var(--red);border-color:rgba(220,38,38,.15)}
.bcard-act.pay{background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.opt{display:flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:5px;cursor:pointer;transition:all .15s}
.opt.on{border-color:var(--gold);background:var(--yellow-bg)}
.opt-r{width:18px;height:18px;border-radius:50%;border:2px solid var(--card3);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff}
.opt.on .opt-r{border-color:var(--gold);background:var(--gold)}
.opt.on .opt-r::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.opt-l{flex:1;min-width:0;padding-right:6px}
.opt-t{font-size:13px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.opt-s{font-size:10px;color:var(--t3);margin-top:1px;font-weight:500}
.opt-amt{font-size:12px;font-weight:800;color:var(--gold2);font-variant-numeric:tabular-nums;flex-shrink:0}
.role-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.role-pill.owner{background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1a1a;box-shadow:0 2px 8px rgba(212,160,32,.25)}
.role-pill.barista{background:var(--card2);color:var(--t2);border:1px solid var(--border)}
.no-owner-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid var(--gold);border-radius:14px;padding:18px;margin-bottom:14px;text-align:center}
.no-owner-card .ic{font-size:36px;margin-bottom:8px}
.no-owner-card .t{font-size:14px;font-weight:800;color:var(--t1);margin-bottom:4px}
.no-owner-card .s{font-size:11px;color:var(--t2);font-weight:500;line-height:1.5}
.refresh-hint{background:var(--gold-bg);border:1px solid var(--gold-border);border-radius:10px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:var(--gold2);font-weight:600;text-align:center;line-height:1.4}
/* ─── Aktif vardiya kartı (Активная смена) ─── */
.act-card{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border-radius:18px;padding:18px 18px 14px;margin-bottom:14px;box-shadow:0 6px 22px rgba(16,185,129,.32);position:relative;overflow:hidden}
.act-card::before{content:'';position:absolute;top:-30px;right:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,255,255,.18),transparent 70%);border-radius:50%}
.act-pulse{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;background:rgba(255,255,255,.2);padding:4px 10px;border-radius:20px;position:relative;z-index:1}
.act-dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 0 0 #fff;animation:pulse 1.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,255,255,.7)}70%{box-shadow:0 0 0 10px rgba(255,255,255,0)}100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}}
.act-time{font-size:30px;font-weight:800;margin:6px 0 2px;font-variant-numeric:tabular-nums;letter-spacing:-.5px;position:relative;z-index:1}
.act-sub{font-size:11px;font-weight:600;opacity:.92;position:relative;z-index:1}
.act-row{display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.18);font-size:12px;font-weight:600;position:relative;z-index:1}
.act-row b{font-size:14px;font-weight:800}
.btn-end{width:100%;margin-top:12px;padding:13px;border:none;border-radius:11px;background:#fff;color:#059669;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;z-index:1}
.btn-end:active{transform:scale(.98)}
.btn-start{width:100%;padding:18px;border:none;border-radius:14px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px;box-shadow:0 6px 18px rgba(16,185,129,.32);letter-spacing:.3px}
.btn-start:active{transform:scale(.99)}
.btn-start .ic{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:14px}
.sec-link{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px}
.sec-link a{color:var(--gold2);font-weight:700;text-transform:none;letter-spacing:0;font-size:12px;cursor:pointer}
.hist.click{cursor:pointer;transition:all .12s}
.hist.click:active{transform:scale(.98);background:var(--card2)}
.hist-arr{font-size:18px;color:var(--t3);margin-left:6px;flex-shrink:0}
/* Bardak sayısı tıklanabilir */
.qty-box{display:flex;align-items:center;gap:0;background:var(--card2);border-radius:10px;padding:0;border:1px solid var(--border)}
.qb{width:34px;height:34px;border:none;background:transparent;color:var(--t1);font-family:inherit;font-size:18px;font-weight:800;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;line-height:1}
.qb:active{background:rgba(0,0,0,.06);transform:scale(.92)}
.qb.m{color:var(--red)}
.qb.p{color:var(--green)}
.qv{min-width:34px;text-align:center;font-size:15px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums;cursor:pointer;padding:6px 4px;border-radius:var(--r3);user-select:none}
.qv:active{background:rgba(0,0,0,.08)}
.qv.z{color:var(--t3);font-weight:600}
.qv.editing{background:#fff;border:1.5px solid var(--gold);outline:none;width:50px}
/* Vardiya detay */
.det-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.det-h{font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.det-times{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.det-time-box{background:var(--card2);border-radius:10px;padding:10px 8px;text-align:center}
.det-time-l{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.det-time-v{font-size:15px;font-weight:800;color:var(--t1);margin-top:3px;font-variant-numeric:tabular-nums}
/* Yeşil kart (vardiya kapatma özeti): yazı her temada koyu okunur */
.sf-card-green .det-time-l{color:#047857!important}
.sf-card-green .det-time-v{color:#064e3b!important}
.det-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;font-weight:600;color:var(--t2);border-bottom:1px solid var(--border)}
.det-row:last-child{border-bottom:none}
.det-row span:last-child{color:var(--t1);font-weight:700;font-variant-numeric:tabular-nums}
.det-total{display:flex;justify-content:space-between;margin-top:10px;padding-top:12px;border-top:1.5px solid var(--gold-border);font-size:18px;font-weight:800;color:var(--t1)}
.det-total span:last-child{color:var(--gold2)}
/* Owner: aktif baristalar */
.act-mini{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1px solid #6ee7b7;border-radius:10px;padding:10px 12px;margin-bottom:6px}
.act-mini-dot{width:8px;height:8px;border-radius:50%;background:#10b981;flex-shrink:0;animation:pulse 1.4s infinite}
.act-mini-l{flex:1;min-width:0}
.act-mini-n{font-size:13px;font-weight:800;color:#065f46;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act-mini-t{font-size:10px;font-weight:600;color:#047857;margin-top:1px}
.act-mini-r{font-size:14px;font-weight:800;color:#065f46;font-variant-numeric:tabular-nums}
/* ─── Bahşiş kartı ─── */
.tip-card{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1px solid #6ee7b7;border-radius:12px;padding:11px 14px;margin-bottom:12px;gap:10px}
.loan-card{background:linear-gradient(135deg,#fef9c3,#fde68a);border:1px solid var(--gold-border);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:transform .15s;box-shadow:0 4px 14px rgba(212,160,32,.12)}
.loan-card:active{transform:scale(.985)}
.loan-l{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.loan-i{font-size:26px;flex-shrink:0}
.loan-t{font-size:13px;font-weight:800;color:#5a3e00}
.loan-s{font-size:11px;font-weight:600;color:#8a6a1a;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px}
.loan-arr{color:#8a6a1a;font-size:22px;font-weight:800}
.loan-hist{margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.loan-hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;font-size:12px;font-weight:600;color:var(--t1);border-bottom:1px solid var(--border);gap:10px}
.loan-hist-row:last-child{border-bottom:none}
.loan-hist-row.ok{background:rgba(16,185,129,.06)}
.loan-hist-row.no{background:rgba(239,68,68,.06)}
.loan-hist-row.pn{background:rgba(245,158,11,.06)}
.loan-hist-row > span:first-child{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loan-st{font-weight:800;font-size:11px;flex-shrink:0}
.loan-hist-row.ok .loan-st{color:#10b981}
.loan-hist-row.no .loan-st{color:#ef4444}
.loan-hist-row.pn .loan-st{color:#f59e0b}
.loan-form-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px}
.loan-amt-presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0}
.loan-amt-preset{background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 4px;font-size:12px;font-weight:700;color:var(--t1);cursor:pointer;text-align:center;transition:all .15s}
.loan-amt-preset.on{background:var(--yellow);border-color:var(--gold);color:#5a3e00}
.loan-amt-preset:active{transform:scale(.96)}
.loan-amt-input{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;font-size:18px;font-weight:800;color:var(--t1);text-align:center;font-variant-numeric:tabular-nums;box-sizing:border-box}
.loan-reason{width:100%;background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--t1);margin-top:10px;resize:none;font-family:inherit;box-sizing:border-box}
.loan-review-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px}
.loan-review-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px}
.loan-review-name{font-size:14px;font-weight:800;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.loan-review-amt{font-size:18px;font-weight:900;color:var(--gold2);flex-shrink:0}
.loan-review-reason{font-size:12px;color:var(--t2);line-height:1.4;margin:6px 0 12px}
.loan-review-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.loan-act-ok,.loan-act-no{padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;transition:transform .15s}
.loan-act-ok{background:#10b981;color:#fff}
.loan-act-no{background:#ef4444;color:#fff}
.loan-act-ok:active,.loan-act-no:active{transform:scale(.97)}
[data-theme="dark"] .loan-hist-row.ok{background:rgba(16,185,129,.14)}
[data-theme="dark"] .loan-hist-row.no{background:rgba(239,68,68,.14)}
[data-theme="dark"] .loan-hist-row.pn{background:rgba(245,158,11,.14)}
.tip-l{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.tip-i{font-size:22px;flex-shrink:0}
.tip-t{font-size:11px;font-weight:700;color:#047857;text-transform:uppercase;letter-spacing:.5px}
.tip-v{font-size:15px;font-weight:800;color:#065f46;font-variant-numeric:tabular-nums;margin-top:2px}
.tip-btn{padding:8px 12px;border:none;border-radius:9px;background:#10b981;color:#fff;font-family:inherit;font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0;letter-spacing:.3px}
.tip-btn:active{transform:scale(.96)}
/* ─── İstatistik kutuları ─── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 6px;text-align:center}
.stat-l{font-size:9px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.stat-v{font-size:13px;font-weight:800;color:var(--t1);margin:3px 0 1px;font-variant-numeric:tabular-nums}
.stat-s{font-size:9px;color:var(--t3);font-weight:600}
/* ─── Settings tabs ─── */
.set-tabs{display:flex;gap:4px;background:var(--card2);padding:4px;border-radius:10px;margin-bottom:12px}
.set-tab{flex:1;padding:8px 6px;text-align:center;font-size:11px;font-weight:700;color:var(--t2);border-radius:var(--r3);cursor:pointer;transition:all .15s}
.set-tab.on{background:#fff;color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.set-row{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:5px;gap:10px}
.set-row-l{flex:1;min-width:0}
.set-row-t{font-size:13px;font-weight:700;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.set-row-s{font-size:10px;color:var(--t3);margin-top:1px;font-weight:500}
.set-input{padding:7px 9px;border:1px solid var(--border2);border-radius:var(--r3);font-family:inherit;font-size:12px;font-weight:700;width:90px;text-align:right;outline:none;color:var(--t1);background:#fff;font-variant-numeric:tabular-nums}
.set-input:focus{border-color:var(--gold)}
.set-input.wide{width:140px;text-align:left}
.set-save{padding:7px 11px;border:none;border-radius:var(--r3);background:var(--gold);color:#1a1a1a;font-family:inherit;font-size:11px;font-weight:800;cursor:pointer;flex-shrink:0}
.set-save:active{transform:scale(.95)}
.log-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 11px;margin-bottom:4px;font-size:11px;line-height:1.4}
.log-h{display:flex;justify-content:space-between;font-weight:700;color:var(--t1)}
.log-h-r{font-size:10px;color:var(--t3);font-weight:600}
.log-d{color:var(--t2);font-size:10px;margin-top:2px}
/* Multi-select chip */
.opt.multi .opt-r{border-radius:5px}
.opt.multi.on .opt-r::after{content:'\2713';color:#fff;font-size:11px;background:transparent;width:auto;height:auto;font-weight:800;display:flex;align-items:center;justify-content:center}
.split-toggle{display:flex;align-items:center;justify-content:space-between;background:#fef3c7;border:1px solid var(--gold-border);border-radius:10px;padding:10px 14px;margin-bottom:8px;cursor:pointer}
.split-toggle.on{background:linear-gradient(135deg,#f5d44b,#d4a020)}
.split-toggle-t{font-size:12px;font-weight:700;color:var(--t1)}
.split-toggle-s{font-size:10px;color:var(--t2);margin-top:2px}
.tg-sw{width:38px;height:22px;background:#d4d4d4;border-radius:11px;position:relative;flex-shrink:0;transition:all .2s}
.tg-sw.on{background:#10b981}
.tg-sw::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tg-sw.on::after{left:18px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.wrap>*{animation:fadeIn .25s ease both}.wrap>*:nth-child(2){animation-delay:.03s}.wrap>*:nth-child(3){animation-delay:.06s}.wrap>*:nth-child(n+4){animation-delay:.09s}
/* ─── Recipe Trainer (Тренажёр рецептов) ─── */
.rt-card{background:linear-gradient(135deg,#fef3c7 0%,#fde68a 100%);border:1px solid var(--gold-border);border-radius:18px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:transform .15s;box-shadow:0 4px 14px rgba(212,160,32,.15)}
.rt-card:active{transform:scale(.98)}
.rt-card-ic{font-size:34px;flex-shrink:0}
.rt-card-info{flex:1;min-width:0}
.rt-card-t{font-size:15px;font-weight:800;color:#5a3e00}
.rt-card-s{font-size:11px;font-weight:600;color:#8a6a1a;margin-top:2px}
.rt-card-arr{color:#8a6a1a;font-size:20px}
.rt-hero{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid var(--gold-border);border-radius:20px;padding:20px;margin-bottom:14px;text-align:center}
.rt-hero-ic{font-size:42px;margin-bottom:6px}
.rt-hero-t{font-size:18px;font-weight:800;color:#5a3e00}
.rt-hero-s{font-size:12px;font-weight:600;color:#8a6a1a;margin-top:4px}
.rt-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.rt-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center}
.rt-stat-v{font-size:18px;font-weight:800;color:var(--t1)}
.rt-stat-k{font-size:10px;font-weight:600;color:var(--t3);margin-top:2px;letter-spacing:.3px}
.rt-levels{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rt-lvl{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;transition:transform .15s;position:relative}
.rt-lvl:active{transform:scale(.97)}
.rt-lvl.locked{opacity:.5;cursor:not-allowed}
.rt-lvl.done{border-color:#10b981;background:#ecfdf5}
.rt-lvl-n{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px}
.rt-lvl-t{font-size:14px;font-weight:800;color:var(--t1);margin-top:4px}
.rt-lvl-s{font-size:11px;color:var(--t3);margin-top:4px}
.rt-lvl-badge{position:absolute;top:8px;right:8px;font-size:16px}
.rt-q-bar{background:var(--card);border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;border:1px solid var(--border)}
.rt-q-prog{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin:0 12px}
.rt-q-fill{height:100%;background:linear-gradient(90deg,var(--gold),#f59e0b);border-radius:3px;transition:width .3s}
.rt-q-hearts{font-size:14px;letter-spacing:2px}
.rt-q-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:10px}
.rt-q-label{font-size:10.5px;font-weight:700;color:var(--gold2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.rt-q-text{font-size:16px;font-weight:700;line-height:1.4;color:var(--t1)}
.rt-q-hint{font-size:12px;color:var(--t3);margin-top:6px}
.rt-opts{display:flex;flex-direction:column;gap:8px}
.rt-opt{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;font-size:14px;font-weight:600;text-align:left;cursor:pointer;transition:all .15s;color:var(--t1)}
.rt-opt:active{transform:scale(.98)}
.rt-opt:hover{border-color:var(--gold)}
.rt-opt.correct{background:#ecfdf5;border-color:#10b981;color:#065f46}
.rt-opt.wrong{background:#fef2f2;border-color:#ef4444;color:#991b1b}
.rt-opt.reveal{background:#ecfdf5;border-color:#10b981;color:#065f46;opacity:.7}
.rt-opt.disabled{pointer-events:none}
.rt-feedback{background:var(--card);border-radius:14px;padding:14px;margin-top:10px;text-align:center;font-size:13px;font-weight:700}
.rt-feedback.ok{background:#ecfdf5;color:#065f46;border:1px solid #10b981}
.rt-feedback.no{background:#fef2f2;color:#991b1b;border:1px solid #ef4444}
.rt-next{margin-top:10px;width:100%;padding:14px;background:var(--gold);border:none;border-radius:14px;font-size:15px;font-weight:800;color:#fff;cursor:pointer;transition:transform .15s}
.rt-next:active{transform:scale(.98)}
.rt-result{text-align:center;padding:28px 20px;background:var(--card);border-radius:20px;border:1px solid var(--border);margin-bottom:12px}
.rt-result-ic{font-size:56px;margin-bottom:8px}
.rt-result-t{font-size:22px;font-weight:800;color:var(--t1)}
.rt-result-s{font-size:14px;color:var(--t3);margin-top:4px}
.rt-result-score{font-size:40px;font-weight:900;color:var(--gold2);margin-top:14px}
.rt-ready{text-align:center;padding:32px 20px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:24px;border:1px solid var(--gold-border);margin-bottom:14px}
.rt-ready-ic{font-size:64px;margin-bottom:8px;animation:bounce 1.4s ease infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.rt-ready-t{font-size:24px;font-weight:900;color:#5a3e00;letter-spacing:.3px}
.rt-ready-s{font-size:13px;font-weight:600;color:#8a6a1a;margin-top:6px;line-height:1.45}
.rt-ready-rules{display:grid;gap:8px;text-align:left;margin-top:18px;background:rgba(255,255,255,.55);border-radius:14px;padding:12px}
.rt-rule{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:#5a3e00}
.rt-rule-ic{font-size:20px;width:30px;text-align:center}
.rt-go-btn{width:100%;padding:16px;background:#5a3e00;color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:800;cursor:pointer;margin-top:12px;letter-spacing:.5px;text-transform:uppercase;transition:transform .15s}
.rt-go-btn:active{transform:scale(.98)}
.rt-cancel{width:100%;padding:12px;background:transparent;color:var(--t3);border:none;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.rt-timer-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.rt-timer-ring svg{transform:rotate(-90deg)}
.rt-timer-ring circle{fill:none;stroke-width:3.5}
.rt-timer-ring .bg{stroke:var(--border2)}
.rt-timer-ring .fg{stroke:var(--gold);stroke-linecap:round;transition:stroke-dashoffset .25s linear,stroke .25s}
.rt-timer-ring.warn .fg{stroke:#f59e0b}
.rt-timer-ring.danger .fg{stroke:#ef4444;animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.rt-timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--t1);font-variant-numeric:tabular-nums}
.rt-q-bar{padding:8px 12px}
.rt-bonus-fly{position:fixed;left:50%;top:40%;transform:translateX(-50%);font-size:24px;font-weight:900;color:#10b981;pointer-events:none;animation:fly .9s ease-out forwards;z-index:1000}
.rt-exam-card{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border:1px solid rgba(255,210,87,.4);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s;box-shadow:0 4px 18px rgba(15,52,96,.3),0 0 0 1px rgba(255,210,87,.1)}
.rt-exam-card:active{transform:scale(.985)}
.rt-exam-card.rt-exam-locked{opacity:.55;cursor:not-allowed;background:linear-gradient(135deg,#2a2a2a,#444)}
.rt-exam-l{flex-shrink:0}
.rt-exam-ic{font-size:38px;filter:drop-shadow(0 2px 6px rgba(255,210,87,.4))}
.rt-exam-c{flex:1;min-width:0;color:#fff}
.rt-exam-t{font-size:15px;font-weight:800;letter-spacing:.3px}
.rt-exam-s{font-size:11px;font-weight:600;color:rgba(255,255,255,.78);margin-top:3px;line-height:1.4}
.rt-exam-last{font-size:11px;font-weight:700;margin-top:5px;padding:2px 8px;border-radius:var(--r3);display:inline-block}
.rt-exam-last.ok{background:rgba(16,185,129,.25);color:#a7f3d0}
.rt-exam-last.no{background:rgba(239,68,68,.25);color:#fca5a5}
.rt-exam-lock{font-size:10px;font-weight:600;color:#fbbf24;margin-top:5px}
.rt-exam-r{color:#ffd257;font-size:22px;font-weight:800}
/* Sertifika ekranı */
.rt-cert{background:linear-gradient(135deg,#fef9e7,#fdf2cf);border:3px double #b8860b;border-radius:14px;padding:24px 20px;text-align:center;margin-bottom:14px;position:relative;color:#3a2800}
.rt-cert::before,.rt-cert::after{content:'❦';position:absolute;top:8px;font-size:18px;color:#b8860b;opacity:.6}
.rt-cert::before{left:14px}.rt-cert::after{right:14px}
.rt-cert-head{font-size:11px;font-weight:700;letter-spacing:3px;color:#8b6914;text-transform:uppercase}
.rt-cert-title{font-size:22px;font-weight:900;margin-top:6px;font-family:Georgia,serif}
.rt-cert-name{font-size:18px;font-weight:800;margin-top:14px;border-bottom:1px solid #b8860b;padding-bottom:8px;display:inline-block;font-family:Georgia,serif}
.rt-cert-body{font-size:13px;font-weight:600;margin-top:14px;line-height:1.5}
.rt-cert-score{font-size:36px;font-weight:900;color:#b8860b;margin-top:10px;font-family:Georgia,serif}
.rt-cert-meta{display:flex;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:1px dashed #b8860b;font-size:10px;font-weight:700;letter-spacing:.5px;color:#8b6914;text-transform:uppercase}
.rt-cert-fail{background:linear-gradient(135deg,#fee2e2,#fecaca);border:3px double #991b1b;color:#7f1d1d}
.rt-cert-fail::before,.rt-cert-fail::after{color:#991b1b}
.rt-cert-fail .rt-cert-head{color:#991b1b}
.rt-cert-fail .rt-cert-name{border-bottom-color:#991b1b}
.rt-cert-fail .rt-cert-score{color:#991b1b}
.rt-cert-fail .rt-cert-meta{border-top-color:#991b1b;color:#991b1b}
/* ─── Resmi sınav fullscreen ─── */
#exam-fs{position:fixed;inset:0;background:linear-gradient(135deg,#0a0e27 0%,#16213e 50%,#1a1a2e 100%);color:#fff;z-index:99999;overflow-y:auto;display:none;flex-direction:column;padding:20px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom))}
#exam-fs.on{display:flex}
#exam-fs .ex-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,210,87,.2)}
#exam-fs .ex-brand{font-size:11px;font-weight:800;letter-spacing:3px;color:#ffd257}
#exam-fs .ex-byname{font-size:12px;color:rgba(255,255,255,.7)}
#exam-fs .ex-locked{font-size:10px;color:#fca5a5;font-weight:700}
#exam-fs .ex-pre{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 4px}
#exam-fs .ex-pre-ic{font-size:72px;margin-bottom:14px;filter:drop-shadow(0 4px 14px rgba(255,210,87,.4))}
#exam-fs .ex-pre-t{font-size:24px;font-weight:900;color:#ffd257;letter-spacing:.5px}
#exam-fs .ex-pre-by{font-size:13px;color:rgba(255,255,255,.85);margin-top:6px}
#exam-fs .ex-check-list{margin-top:24px;width:100%;max-width:420px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px;text-align:left}
#exam-fs .ex-check{display:flex;align-items:center;gap:10px;padding:10px 4px;font-size:13px;font-weight:700;cursor:pointer}
#exam-fs .ex-check input{margin:0;accent-color:#ffd257;width:18px;height:18px}
#exam-fs .ex-check.ok{color:#a7f3d0}
#exam-fs .ex-go{margin-top:16px;width:100%;max-width:420px;padding:18px;background:#ffd257;color:#3a2800;border:none;border-radius:16px;font-size:15px;font-weight:900;cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:transform .15s}
#exam-fs .ex-go:disabled{opacity:.4;cursor:not-allowed}
#exam-fs .ex-go:active:not(:disabled){transform:scale(.98)}
#exam-fs .ex-q-bar{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:10px 14px;margin-bottom:12px}
#exam-fs .ex-q-bar .ex-q-prog{flex:1;height:6px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
#exam-fs .ex-q-bar .ex-q-fill{height:100%;background:linear-gradient(90deg,#ffd257,#f59e0b);border-radius:3px;transition:width .3s}
#exam-fs .ex-q-bar .ex-q-idx{font-size:11px;font-weight:800;color:#ffd257;letter-spacing:.5px}
#exam-fs .ex-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:18px;margin-bottom:12px}
#exam-fs .ex-kind{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#ffd257;margin-bottom:6px}
#exam-fs .ex-kind.photo{color:#60a5fa}
#exam-fs .ex-text{font-size:17px;font-weight:700;line-height:1.4;color:#fff}
#exam-fs .ex-photo-prompt{margin-top:10px;background:rgba(96,165,250,.15);border:1px dashed #60a5fa;border-radius:12px;padding:14px;font-size:12px;color:#dbeafe;line-height:1.45}
#exam-fs .ex-opts{display:flex;flex-direction:column;gap:8px}
#exam-fs .ex-opt{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.18);color:#fff;border-radius:14px;padding:14px 16px;font-size:14px;font-weight:600;text-align:left;cursor:pointer;transition:all .15s}
#exam-fs .ex-opt:active{transform:scale(.98)}
#exam-fs .ex-opt.correct{background:rgba(16,185,129,.25);border-color:#10b981;color:#a7f3d0}
#exam-fs .ex-opt.wrong{background:rgba(239,68,68,.25);border-color:#ef4444;color:#fca5a5}
#exam-fs .ex-opt.reveal{background:rgba(16,185,129,.12);border-color:#10b98166;color:#a7f3d0;opacity:.7}
#exam-fs .ex-opt.disabled{pointer-events:none}
#exam-fs .ex-photo-btn{width:100%;padding:18px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;margin-top:10px;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:10px}
#exam-fs .ex-photo-btn:active{transform:scale(.98)}
#exam-fs .ex-fb{background:rgba(255,255,255,.08);border-radius:12px;padding:12px 14px;margin-top:10px;font-size:13px;font-weight:700;text-align:center}
#exam-fs .ex-fb.ok{background:rgba(16,185,129,.2);color:#a7f3d0}
#exam-fs .ex-fb.no{background:rgba(239,68,68,.2);color:#fca5a5}
#exam-fs .ex-next{width:100%;padding:16px;background:#ffd257;color:#3a2800;border:none;border-radius:14px;font-size:15px;font-weight:900;cursor:pointer;margin-top:8px;letter-spacing:.5px}
#exam-fs .ex-next:active{transform:scale(.98)}
#exam-fs .ex-timer-bar{height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;margin-top:10px}
#exam-fs .ex-timer-fill{height:100%;background:#ffd257;transition:width .25s linear,background .25s}
#exam-fs .ex-timer-fill.warn{background:#f59e0b}
#exam-fs .ex-timer-fill.danger{background:#ef4444}
#exam-fs .ex-timer-num{font-size:24px;font-weight:900;text-align:center;margin-top:4px;font-variant-numeric:tabular-nums;color:#ffd257}
#exam-fs .ex-timer-num.warn{color:#f59e0b}
#exam-fs .ex-timer-num.danger{color:#ef4444;animation:pulse 1s ease infinite}
#exam-fs .ex-photo-input{display:none}
#exam-fs .ex-photo-preview{margin-top:10px;border-radius:12px;overflow:hidden;border:2px solid #10b981}
#exam-fs .ex-photo-preview img{width:100%;display:block}
@keyframes fly{0%{opacity:0;transform:translate(-50%,0) scale(.6)}30%{opacity:1;transform:translate(-50%,-10px) scale(1.15)}100%{opacity:0;transform:translate(-50%,-50px) scale(1)}}
.rt-an-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:8px}
.rt-an-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px}
.rt-an-name{font-size:14px;font-weight:800;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rt-an-lvl{background:var(--yellow);color:#5a3e00;font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;border:1px solid var(--gold-border)}
.rt-an-lvl.z{background:var(--card2);color:var(--t3);border-color:var(--border2)}
.rt-an-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0}
.rt-an-g{text-align:center}
.rt-an-g-v{font-size:14px;font-weight:800;color:var(--t1)}
.rt-an-g-k{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.3px;margin-top:1px}
.rt-an-trend{display:flex;gap:3px;align-items:center;flex-wrap:wrap;margin-top:4px}
.rt-an-chip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--r3);background:var(--card2);color:var(--t3);border:1px solid var(--border2)}
.rt-an-chip.ok{background:#ecfdf5;color:#065f46;border-color:#10b98166}
.rt-an-chip.no{background:#fef2f2;color:#991b1b;border-color:#ef444466}
.rt-an-last{font-size:10px;color:var(--t3);margin-top:6px;font-weight:600}
.rt-trend-ic{font-size:16px}
.rt-trend-up{color:#10b981}.rt-trend-down{color:#ef4444}.rt-trend-flat{color:var(--t3)}
[data-theme="dark"] .rt-an-chip.ok{background:rgba(16,185,129,.15)}
[data-theme="dark"] .rt-an-chip.no{background:rgba(239,68,68,.15)}

[data-theme="dark"] .rt-opt.wrong{background:rgba(239,68,68,.15)}
[data-theme="dark"] .rt-opt.reveal{background:rgba(16,185,129,.1)}
[data-theme="dark"] .rt-feedback.ok{background:rgba(16,185,129,.15)}
[data-theme="dark"] .rt-feedback.no{background:rgba(239,68,68,.15)}
/* ─── Passcode (Wallet style) ─── */
#pass-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;padding-top:calc(env(safe-area-inset-top,0px) + 44px);overflow-y:auto}
#pass-overlay .pass-icon{width:88px;height:88px;margin-bottom:14px;border-radius:50%;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.15);background:#fff;flex-shrink:0}
#pass-overlay .pass-icon img{width:100%;height:100%;object-fit:cover;display:block}

// ═══ Fullscreen safe-area: başlık status bar / Telegram kontrolleri altında kalmasın ═══
if(tg){

      var s=(tg.safeAreaInset&&tg.safeAreaInset.top)||0;       // cihaz çentiği/status bar

      var top=s+c;

    }catch(e){}
  }
  applySafeTop();
  // Best practice: dikey kaydırırken yanlışlıkla kapanmayı önle (form/scroll için)
  try{tg.disableVerticalSwipes&&tg.disableVerticalSwipes()}catch(e){}
  // BotFather gibi: SADECE mobilde fullscreen iste. Masaüstü/web → Fullsize (ortalı modal) kalır.

  try{tg.onEvent&&tg.onEvent('contentSafeAreaChanged',applySafeTop)}catch(e){}
  try{tg.onEvent&&tg.onEvent('fullscreenChanged',applySafeTop)}catch(e){}
  try{tg.onEvent&&tg.onEvent('viewportChanged',applySafeTop)}catch(e){}
}
// ═══ YOL B: API her zaman Railway backend'ine (sabit adres) gider ═══
// Sayfa github.io'dan da açılsa Railway'e ulaşır (backend orada). text/plain
// kullanıyoruz ki cross-origin'de CORS preflight tetiklenmesin.
var API_BASE="https://amusing-creativity-production-a2e7.up.railway.app";
// ═══ Otomatik sürüm yenileme ═══ Telegram WebView eski HTML'i cache'liyor (özellikle
// "Open App"/Main App sabit URL'inde). Açılışta sunucudaki güncel sürümü sor; bizimkinden
// yeniyse demek ki cache'li eski sayfadayız → ?v= ile kendini taze yükle. APP_BUILD her
// deploy'da artar; /api/ver bunu diskteki index.html'den okuyup döndürür (tek kaynak).
var APP_BUILD=2026062151;
(function(){
  try{
    fetch(API_BASE+'/api/ver?_='+Date.now(),{cache:'no-store'})
      .then(function(r){return r.text();})
      .then(function(t){
        var sv=parseInt(t,10)||0;
        if(sv>APP_BUILD){
          var key='cf_rl_'+sv;
          if(!sessionStorage.getItem(key)){
            sessionStorage.setItem(key,'1'); // sonsuz döngü koruması
            var base=location.href.split('#')[0].split('?')[0];
            location.replace(base+'?v='+sv);
          }
        }
      }).catch(function(){});
  }catch(e){}
})();
// Açılışta state'i backend'den çek (hash'e GÜVENME — eski/kırpık olabilir).
(function(){
  try{
    var initData=(tg&&tg.initData)?tg.initData:'';
    if(!initData)return; // Telegram dışında açıldıysa (tarayıcı testi) mevcut hash/demo kalsın
    var xhr=new XMLHttpRequest();
    xhr.open('POST',API_BASE+'/api/state',false); // senkron: kalan kod hash'i okumadan önce hazır olsun
    xhr.setRequestHeader('Content-Type','text/plain;charset=UTF-8');
    xhr.send(JSON.stringify({initData:initData}));
    if(xhr.status===200&&xhr.responseText){
      // Doğrudan değişkene yaz — location.hash round-trip'i %-kodlamayı bozup
      // summary/baristas gibi JSON alanlarını okunamaz yapıyordu (active görünmüyordu).
      window.__cf=xhr.responseText;
    }else{console.error('state http',xhr.status);}
  }catch(e){console.error('state load failed',e);}
})();
// ═══ YOL B: tg.sendData()'yı HTTP /api/action'a yönlendir (ana ekrandan da çalışsın) ═══
if(tg){
  var _origSend=tg.sendData?tg.sendData.bind(tg):null;
  tg.sendData=function(dataStr){
    try{
      var initData=tg.initData||'';
      if(!initData){if(_origSend)return _origSend(dataStr);return;}
      fetch(API_BASE+'/api/action',{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},
        body:JSON.stringify({initData:initData,data:dataStr})})
        .then(function(r){return r.json();})
        .then(function(res){
          // İşlem başarılı → ARKA PLANDA state'i tazele (sayfa yeniden YÜKLENMEZ — flash/scroll sıçraması yok)
          if(res&&res.ok){setTimeout(refreshState,600);}
          else{console.error('action error',res);}
        })
        .catch(function(e){console.error('action failed',e);if(_origSend)_origSend(dataStr);});
    }catch(e){if(_origSend)_origSend(dataStr);}
  };
}
// ─── Arka plan state tazeleme (sayfa reload YOK) — aksiyon sonrası sessiz güncelleme ───
function refreshState(){
  try{
    var initData=(tg&&tg.initData)?tg.initData:'';
    if(!initData)return; // tarayıcı testinde dokunma
    fetch(API_BASE+'/api/state',{method:'POST',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:JSON.stringify({initData:initData})})
      .then(function(r){return r.text();})
      .then(function(txt){
        if(!txt)return;
        window.__cf=txt;
        var P=new URLSearchParams(txt);
        function J(k,d){try{return JSON.parse(P.get(k)||d)}catch(e){try{return JSON.parse(d)}catch(_){return d}}}
        MY_UID=parseInt(P.get('uid'))||MY_UID;
        MY_ROLE=P.get('role')||MY_ROLE;
        MY_NAME=(P.get('name')||'')||MY_NAME;
        SUMMARY=J('summary','{}');
        BARISTAS=J('baristas','[]');
        RT_SELF=J('rt','{}');
        try{var _ex=(P.get('exam')||'');PENDING_EXAM=(_ex&&_ex!=='null'&&_ex!=='""')?JSON.parse(_ex):null;}catch(e){}
        LOANS=J('loans','[]');
        LOGS=J('logs','[]');
        KASA_LAST=J('kasa_last','{}');
        KASA_REPORTS=J('kasa_reports','[]');
        REP=J('rep','{}');
        PENDING=J('pending','[]');
        STD_ACK=(P.get('std_ack')==='1');
        STD_ACKS=J('std_acks','[]');
        PRICES=J('prices','{}');
        DRINK_LIST.forEach(function(d){if(PRICES[d.id])d.r=parseInt(PRICES[d.id])});
        DESSERT_CAT=J('desserts','[]');
        DESSERT_LIST=DESSERT_CAT.filter(function(d){return d.active!==0}).map(function(d){return {id:d.id,l:d.label,c:d.icon||'🍮',r:parseInt(d.price)||DESSERT_RATE,active:d.active!==0};});
        if(typeof render==='function')render();
      })
      .catch(function(){});
  }catch(e){}
}
// ─── Passcode auth (Wallet style, client-side SHA-256) ───
(function(){
  const HP2=new URLSearchParams(window.__cf||((window.location.hash||'').replace(/^#/,'')));
  const role=HP2.get('role')||'barista';
  const pwh=(HP2.get('pwh')||'').trim();
  const myName=(HP2.get('name')||'').trim();
  function greetWord(){var hh=new Date().getHours();if(hh>=5&&hh<12)return'Доброе утро';if(hh>=12&&hh<17)return'Добрый день';if(hh>=17&&hh<23)return'Добрый вечер';return'Доброй ночи';}
  // Owner her zaman içeri girer, passcode yok
  if(role==='owner')return;
  // Bu oturumda bir kez doğrulandıysa tekrar sorma
  try{if(sessionStorage.getItem('cf_pass_ok')==='1')return;}catch(e){}
  const ov=document.getElementById('pass-overlay');
  const boxes=document.querySelectorAll('#passBoxes .pass-box');
  const msg=document.getElementById('passMsg');
  const hint=document.getElementById('passHint');
  // Saate göre karşılama + barista adı (Caffelito logosu zaten üstte)
  document.getElementById('passTitle').innerHTML=greetWord()+(myName?', '+escH(myName):'')+'! 👋<div style="font-size:13px;font-weight:500;color:var(--t2);margin-top:6px">Введите пароль для входа</div>';
  if(!pwh){
    document.getElementById('passTitle').textContent='Нет пароля';
    msg.textContent='Попросите владельца назначить вам пароль';
    msg.classList.add('err');
    hint.textContent='';
    document.querySelectorAll('#pass-overlay .pad-key').forEach(b=>b.style.opacity='.3');
  }
  ov.style.display='flex';
  let buf='';
  function paint(){
    boxes.forEach((b,i)=>{
      b.classList.toggle('filled',i<buf.length);
      b.classList.toggle('active',i===buf.length);
      b.textContent=i<buf.length?'•':'';
    });
  }
  async function sha256hex(s){
    const buf2=new TextEncoder().encode(s);
    const hash=await crypto.subtle.digest('SHA-256',buf2);
    return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function submit(){
    if(buf.length!==4)return;
    msg.textContent='⏳ Проверка...';
    msg.classList.remove('err');
    try{
      const h=await sha256hex(buf);
      if(h===pwh){
        try{sessionStorage.setItem('cf_pass_ok','1')}catch(e){}
        msg.textContent='✅ Доступ открыт';
        try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred?.('success')}catch(e){}
        setTimeout(()=>{ov.style.display='none'},250);
      }else{
        msg.textContent='❌ Неверный пароль';
        msg.classList.add('err');
        try{window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred?.('error')}catch(e){}
        ov.classList.add('shake');setTimeout(()=>ov.classList.remove('shake'),400);
        buf='';setTimeout(paint,150);
      }
    }catch(e){
      msg.textContent='❌ Ошибка: '+e.message;
      msg.classList.add('err');
      buf='';paint();
    }
  }
  document.querySelectorAll('#pass-overlay .pad-key').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(!pwh)return;
      const k=btn.dataset.k;
      if(!k)return;
      if(k==='del'){buf=buf.slice(0,-1);paint();msg.textContent='';return;}
      if(buf.length>=4)return;
      buf+=k;paint();
      try{window.Telegram?.WebApp?.HapticFeedback?.selectionChanged?.()}catch(e){}
      if(buf.length===4)setTimeout(submit,150);
    });
  });
  paint();
})();

const THEME_COLORS={light:{header:'#faf8f4',bg:'#faf8f4'},dark:{header:'#0f1115',bg:'#0f1115'}};
function applyTheme(theme){
  const t=(theme==='dark')?'dark':'light';
  document.documentElement.setAttribute('data-theme',t);
  // Telegram başlık + arka plan rengini eşitle (mini app penceresi tek renk gözüksün)
  if(tg){
    try{tg.setHeaderColor(THEME_COLORS[t].header);}catch(e){}
    try{tg.setBackgroundColor(THEME_COLORS[t].bg);}catch(e){}
  }
  try{localStorage.setItem('cf_theme',t);}catch(e){}
}
function toggleTheme(ev){
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next=(cur==='dark')?'light':'dark';
  // Logo: tek seferlik dönüş animasyonu (bittikten sonra nötrde kalır)
  try{
    const logo=ev&&ev.currentTarget?ev.currentTarget:document.querySelector('.brand-logo');
    if(logo){
      logo.classList.remove('spin');
      // reflow trick — animasyon yeniden tetiklensin
      void logo.offsetWidth;
      logo.classList.add('spin');
      const onEnd=function(){logo.classList.remove('spin');logo.removeEventListener('animationend',onEnd)};
      logo.addEventListener('animationend',onEnd);
      // Mobilde focus/hover state'inin sticky kalmaması için blur ve aktif elementi temizle
      try{logo.blur&&logo.blur()}catch(_){}
      try{document.activeElement&&document.activeElement.blur&&document.activeElement.blur()}catch(_){}
    }
  }catch(e){}
  // Güzel görsel efekt: NERO'dan dalga yayılsın
  try{
    const f=document.createElement('div');
    f.className='theme-flash';
    if(ev&&ev.currentTarget){
      const r=ev.currentTarget.getBoundingClientRect();
      f.style.left=(r.left)+'px';f.style.top=(r.top)+'px';
      f.style.width=r.width+'px';f.style.height=r.height+'px';
    }
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),650);
  }catch(e){}
  if(tg)tg.HapticFeedback?.impactOccurred?.('medium');
  applyTheme(next);
}
// İlk açılışta kayıtlı tercihi uygula (yoksa Telegram'ın temasını izle)
(function initTheme(){
  let saved=null;
  try{saved=localStorage.getItem('cf_theme');}catch(e){}
  if(!saved && tg && tg.colorScheme){saved=tg.colorScheme;} // 'light' | 'dark'
  applyTheme(saved||'light');
})();
const DR=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MO=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
function gT(){
  // Toshkent vaqti UTC+5 — qurilma vaqt mintaqasidan qat'iy nazar to'g'ri ishlaydi
  const n=new Date();
  const utc=n.getTime()+n.getTimezoneOffset()*60000;
  return new Date(utc+5*3600000);
}

// Canlı saat — saniyeli, her saniye güncellenir
function uC(){
  const t=gT();
  document.getElementById('clk').textContent=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0')+':'+String(t.getSeconds()).padStart(2,'0');
  document.getElementById('day').textContent=DR[t.getDay()]+', '+t.getDate()+' '+MO[t.getMonth()];
}
uC();setInterval(uC,1000);

(function(){
  var sx=0,sy=0,st=0;
  document.addEventListener('touchstart',function(e){if(e.touches&&e.touches.length===1){sx=e.touches[0].clientX;sy=e.touches[0].clientY;st=Date.now();}},{passive:true});
  document.addEventListener('touchend',function(e){
    if(!e.changedTouches||!e.changedTouches.length)return;
    var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,dt=Date.now()-st;
    // soldan başla (sol ~1/3), sağa belirgin kaydır, dikey küçük, hızlı

function adjustBottomPadding(){
  const b=document.getElementById('bot');

  const total=tabH+(botVisible?botH+12:8)+16;
  document.body.style.paddingBottom='calc('+total+'px + env(safe-area-inset-bottom))';
}

// ── Sipariş gönder — her zaman toast gösterir ──
function sO(){
  var tot=Object.values(ord).reduce(function(a,v){return a+v},0);
  if(!tot)return;
  // Payload — tam ürün isimleriyle gönder. Artık HTTP (/api/action) kullanıyoruz,
  // eski sendData 3800-byte limiti yok → isimleri KISALTMA. Bot uzun mesajları parçalar.
  var maxL=200; // pratik olarak hiçbir isim bunu aşmaz
  var ps;
  do{
    var g=[];
    Object.keys(P).forEach(function(ck){
      var d=P[ck],it=[];
      d.items.forEach(function(p){
        if(ord[p.id]){
          var nm=String(p.n||'');
          if(nm.length>maxL)nm=nm.substring(0,maxL);
          it.push(nm+':'+ord[p.id]);
        }
      });
      if(it.length)g.push(ck+'|'+it.join('|'));
    });
    ps=JSON.stringify({a:'o',g:g,c:tot});
    var bl=0;for(var i=0;i<ps.length;i++){bl+=ps.charCodeAt(i)>127?2:1}
    if(bl<=900000)break; // HTTP büyük gövde kaldırır — pratikte hiç kısaltma olmaz
    maxL-=10;
  }while(maxL>=20);
  // Geçmiş kaydet (tam isimlerle)
  var allNames={};var all=allItems();
  Object.keys(ord).forEach(function(id){var p=all.find(function(x){return x.id===id});if(p)allNames[id]=p.n});
  hist.push({type:'order',items:JSON.parse(JSON.stringify(ord)),names:allNames,date:new Date().toISOString(),user:tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user.first_name:'Бариста'});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  toast('Заказ отправлен!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  ord={};cat=null;render();
  if(tg&&tg.sendData){try{tg.sendData(ps);}catch(e){console.warn('sendData:',e)}}
}

function tgl(i){
  var g=taskGate(sub);if(!g.open){toast('🔒 Доступно '+g.label);return}
  var it=(T[tab][sub]||[])[i],title=typeof it==='string'?it:((it&&it.t)||'');
  var ig=itemGate(sub,title);if(!ig.open){toast('🔒 '+ig.label);return}
  const sk=tab+'_'+sub;ts[sk][i]=!ts[sk][i];if(tg)tg.HapticFeedback?.impactOccurred(ts[sk][i]?'medium':'light');render()}
function aS(){const v=document.getElementById('ns')?.value?.trim();if(!v)return;if(!T[tab])T[tab]={};T[tab][v]=[];sT();iTS();render()}
function dSe(k){if(!confirm('Удалить?'))return;delete T[tab][k];sT();iTS();render()}
function aTk(){const v=document.getElementById('nt')?.value?.trim();if(!v||!sub)return;const d=document.getElementById('ntd')?.value?.trim()||'';T[tab][sub].push({t:v,d:d});sT();iTS();render()}
function dTk(i){T[tab][sub].splice(i,1);sT();iTS();render()}
function mvT(i,dir){if(!sub)return;const arr=T[tab][sub],j=i+dir;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];sT();render()}

function svT(){
  const items=T[tab][sub]||[],st=ts[tab+'_'+sub]||[];
  const titles=items.map(function(x){return typeof x==='string'?x:x.t});
  // Sadece işaretliler tamamlandı; gerisi eksik (şef ikisini de görür)
  const done=titles.filter(function(t,i){return st[i]});
  const pend=titles.filter(function(t,i){return !st[i]});
  hist.push({type:'task',category:tab+': '+sub,title:sub,completed:done,date:new Date().toISOString(),user:tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user.first_name:'Бариста'});
  localStorage.setItem('cf5h',JSON.stringify(hist));
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'tasks',category:tab+'_'+sub,completed:done,pending:pend,total:titles.length}));}catch(e){console.warn(e);}}
  toast(sub+' — готово!');ts[tab+'_'+sub]=new Array(items.length).fill(false);sub=null;render();
}

function repDay(at){if(!at)return '';var d=new Date(at);if(isNaN(d))return String(at).slice(0,16);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

function analyticsHTML(){
  if(MY_ROLE!=='owner')return '<div class="empty-mini">Нет доступа</div>';
  var trainees=(BARISTAS||[]).filter(function(x){return !x.arch});
  var h='<div class="rt-hero-s" style="margin:0 0 10px;padding:0 4px;font-size:11px;color:var(--t3);text-align:left">Готовимся к проверке центра · 2 раза в месяц</div>';
  if(!trainees.length){h+='<div class="card"><div class="card-left"><div class="card-info"><div class="card-title">Нет данных</div></div></div></div>';return h;}
  trainees.forEach(function(bar){
    const r=bar.rt||{};
    const acc=r.tq?Math.round((r.tc/r.tq)*100):0;
    const rec=r.rec||[];
    const last3=rec.slice(0,3),prev=rec.slice(3);
    const p1=last3.filter(x=>x.p).length,p2=prev.filter(x=>x.p).length;
    let trend='flat',ticon='→';
    if(rec.length>=2){if(p1>p2){trend='up';ticon='↗'}else if(p1<p2){trend='down';ticon='↘'}}
    const dim=(r.ts||0)===0;
    const lvl=r.lvl||1,mx=r.max||1;
    h+='<div class="rt-an-card'+(dim?' rt-an-inactive':'')+'">';
    h+='<div class="rt-an-head"><div class="rt-an-name">'+esc(bar.n)+'</div><span class="rt-trend-ic rt-trend-'+trend+'">'+ticon+'</span><span class="rt-an-lvl'+(dim?' z':'')+'">Ур. '+lvl+'/'+Math.max(mx,lvl)+'</span></div>';
    h+='<div class="rt-an-grid"><div class="rt-an-g"><div class="rt-an-g-v">'+acc+'%</div><div class="rt-an-g-k">ТОЧНОСТЬ</div></div><div class="rt-an-g"><div class="rt-an-g-v">'+(r.ts||0)+'</div><div class="rt-an-g-k">СЕССИЙ</div></div><div class="rt-an-g"><div class="rt-an-g-v">'+(r.bs||0)+'</div><div class="rt-an-g-k">СЕРИЯ</div></div></div>';
    if(rec.length){
      h+='<div class="rt-an-trend">';
      rec.slice().reverse().forEach(function(s){
        const ok=s.p===1;
        h+='<span class="rt-an-chip '+(ok?'ok':'no')+'">У'+s.l+' '+s.c+'/'+s.t+'</span>';
      });
      h+='</div>';
    }
    if(r.exam){
      const ex=r.exam;
      let edStr='';
      try{const d=new Date(ex.d);edStr=d.getDate()+'.'+String(d.getMonth()+1).padStart(2,'0')}catch(e){}
      h+='<div class="rt-an-trend" style="margin-top:6px"><span class="rt-an-chip '+(ex.p?'ok':'no')+'" style="font-size:11px;padding:3px 9px">🎓 Зачёт: '+ex.s+'%'+(edStr?' · '+edStr:'')+'</span></div>';
    }
    if(r.lp){
      try{
        const d=new Date(r.lp);
        const diffMs=new Date()-d;
        const mins=Math.floor(diffMs/60000),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);
        let label='только что';
        if(days>=1)label=days+' дн. назад';
        else if(hrs>=1)label=hrs+' ч. назад';
        else if(mins>=2)label=mins+' мин. назад';
        h+='<div class="rt-an-last">Последний раз: '+label+'</div>';
      }catch(e){}
    } else {
      h+='<div class="rt-an-last" style="color:#ef4444">⚠️ Ни разу не играл</div>';
    }
    h+='</div>';
  });
  return h;
}

// Aktif vardiya süresini canlı hesapla (H:MM:SS)
function liveDur(startIso){
  if(!startIso)return '0:00:00';
  try{
    const s=new Date(startIso);
    const now=gT();
    const diff=Math.max(0,Math.floor((now.getTime()-s.getTime())/1000)); // saniye
    const h=Math.floor(diff/3600),mn=Math.floor((diff%3600)/60),sc=diff%60;
    return h+':'+String(mn).padStart(2,'0')+':'+String(sc).padStart(2,'0');
  }catch(e){return '0:00:00'}
}
function liveHours(startIso){
  if(!startIso)return 0;
  try{
    const s=new Date(startIso);
    const now=gT();
    return Math.max(0,(now.getTime()-s.getTime())/3600000);
  }catch(e){return 0}
}

// Saatleri okunabilir biçimde göster:
//   0.02h → "1м"
//   0.5h  → "30м"
//   1.5h  → "1ч 30м"
//   8h    → "8ч"
function fmtH(h){
  const n=Number(h)||0;
  if(n<=0)return '0м';
  const totalMin=Math.round(n*60);
  const hh=Math.floor(totalMin/60);
  const mm=totalMin%60;
  if(hh===0)return mm+'м';
  if(mm===0)return hh+'ч';
  return hh+'ч '+mm+'м';
}
function fmtTime(iso){
  if(!iso)return '--:--';
  try{const d=new Date(iso);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}catch(e){return '--:--'}
}
function fmtDay(iso){
  if(!iso)return '';
  try{const d=new Date(iso);return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear()}catch(e){return ''}
}

// Hızlı istatistik (bugün/hafta) — bitmiş vardiyalardan
function calcQuickStats(shifts){
  const now=gT();
  const today=now.toDateString();
  const wkAgo=new Date(now.getTime()-7*86400000);
  let today_=0,todayShifts=0,week=0,weekShifts=0;
  shifts.forEach(function(sh){
    const dt=new Date(sh.start_time||sh.created_at||sh.date||0);
    if(isNaN(dt))return;
    if(dt.toDateString()===today){today_+=(sh.total||0);todayShifts++}
    if(dt>=wkAgo){week+=(sh.total||0);weekShifts++}
  });
  return {today:today_,todayShifts:todayShifts,week:week,weekShifts:weekShifts};
}

// ── Vardiyayı şimdi başlat ──
function startShiftNow(){
  if(!confirm('Начать смену сейчас?\n\nВремя прихода: '+fmtTime(new Date().toISOString())))return;
  const nowIso=gT().toISOString();
  // Optimistik
  SUMMARY.active={start_time:nowIso,end_time:null,hours:0,drinks:'{}',bonus:0,hourly_pay:0,total:0};
  toast('🟢 Смена началась!');
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'shift_start'}))}catch(e){console.warn(e)}}
  render();
}

// ── Vardiyayı geriye dönük başlat (HH:MM girişi) ──
function startShiftCustomTime(){
  const inp=document.getElementById('cstStart');
  if(!inp||!inp.value){toast('Укажите время');return}
  const hhmm=inp.value; // 'HH:MM'
  // Tarih girişi (yoksa bugün)
  const dInp=document.getElementById('cstDate');
  const now=new Date();
  var Y=now.getFullYear(),Mo=now.getMonth(),D=now.getDate();
  if(dInp&&dInp.value){var p=dInp.value.split('-');Y=parseInt(p[0]);Mo=parseInt(p[1])-1;D=parseInt(p[2]);}
  const [hh,mm]=hhmm.split(':').map(function(x){return parseInt(x)||0});
  const customDt=new Date(Y,Mo,D,hh,mm,0,0);
  // Geleceğe izin verme
  if(customDt-now>2*60*1000){toast('Время не может быть в будущем');return}
  // 24 saatten eski izin verme (yanlışlıkla — gece vardiyası için 24h)
  if(now-customDt>24*60*60*1000){
    if(!confirm('Указано время более суток назад. Продолжить?'))return;
  }
  var dtLabel=String(D).padStart(2,'0')+'.'+String(Mo+1).padStart(2,'0')+' '+hhmm;
  if(!confirm('Начать смену с '+dtLabel+'?\nВремя прихода будет указано вручную.'))return;
  const customIso=customDt.toISOString();
  SUMMARY.active={start_time:customIso,end_time:null,hours:0,drinks:'{}',bonus:0,hourly_pay:0,total:0};
  toast('🟢 Смена началась с '+dtLabel);
  if(tg)tg.HapticFeedback?.notificationOccurred('success');
  if(tg&&tg.sendData){try{tg.sendData(JSON.stringify({action:'shift_start',start_time:customIso}))}catch(e){console.warn(e)}}
  render();
}

function recalcEnd(){
  const active=(SUMMARY||{}).active;if(!active)return;
  // Bitiş zamanı: manuel girildiyse onu kullan, yoksa şu an
  const effEnd=(endDraft.endTime?new Date(endDraft.endTime):new Date());
  const liveH=Math.max(0,(effEnd-new Date(active.start_time))/3600000);
  let drinkBonus=0,drinkSold=0;
  DRINK_LIST.forEach(function(d){
    var b=parseInt(endDraft.bylo[d.id])||0,r=parseInt(endDraft.zavoz[d.id])||0;
    var oRaw=endDraft.ostalos[d.id],counted=!(oRaw===''||oRaw==null);
    var s=counted?Math.max(0,b+r-(parseInt(oRaw)||0)):0;  // Осталость boşsa Продано=0
    endDraft.drinks[d.id]=s;  // Продано = Было + Завоз − Осталось → bonus + сменный отчёт
    var el=document.getElementById('es_'+d.id);if(el)el.textContent=s;
    drinkBonus+=s*d.r; drinkSold+=s;
  });
  var etc=document.getElementById('esTotalCups');if(etc)etc.textContent=fmt(drinkSold)+' шт';
  const desN=parseInt(endDraft.dessertsTotal)||0;
  let desBonus=desN*DESSERT_RATE;
  const hourly=Math.round(liveH*HOURLY_RATE);
  const total=hourly+drinkBonus+desBonus;
  // Günlük bonus (kasadan alınır) — POS para mutabakatı kaldırıldı
  var _daily=drinkBonus+desBonus;
  var _edb=document.getElementById('eDailyBonus');if(_edb)_edb.textContent=fmt(_daily);
  const eHr=document.getElementById('seHourly');if(eHr)eHr.textContent=fmt(hourly);
  const eBn=document.getElementById('seBonus');if(eBn)eBn.textContent=fmt(drinkBonus);
  const eDb=document.getElementById('seDesBonus');if(eDb)eDb.textContent=fmt(desBonus);
  const eTt=document.getElementById('seTotal');if(eTt)eTt.textContent=fmt(total)+' сум';
  // Saatleri de yenile (manuel saat değiştiyse)
  const ed=document.getElementById('seDur');if(ed)ed.textContent=fmtH(liveH);
  if(endDraft.endTime){
    const en=document.getElementById('seNow');if(en)en.textContent=fmtTime(effEnd.toISOString());
  }
}

// ── Geç kalma takibi (basit) — beklenen açılış 07:00 ──
// Günün AÇICI (en erken) vardiyası 07:00'den ne kadar geç başladı? Sadece sabah penceresinde
// (<12:00) başlayan, o günün ilk vardiyası kontrol edilir (öğleden sonra/akşam vardiyaları muaf,
// gece geriye-dönük girişler de doğal olarak muaf). Erken/zamanında → null. Dönüş: gecikme dakikası.
const OPEN_HOUR=7;
function openerLate(sh,allShifts){
  if(!sh||!sh.start_time)return null;
  var st=new Date(sh.start_time);if(isNaN(st)||st.getHours()>=12)return null; // sadece sabah
  var dk=st.toDateString(),earliest=null;
  (allShifts||[]).forEach(function(x){
    if(!x||!x.start_time)return;
    var d=new Date(x.start_time);if(isNaN(d)||d.getHours()>=12||d.toDateString()!==dk)return;
    if(!earliest||d<earliest)earliest=d;
  });
  if(!earliest||Math.abs(earliest-st)>1000)return null; // bu vardiya o günün açıcısı değil
  var exp=new Date(st.getFullYear(),st.getMonth(),st.getDate(),OPEN_HOUR,0,0,0);
  var diff=Math.round((st-exp)/60000);
  return diff>0?diff:null; // erken/zamanında → işaret yok
}
function lateLabel(min){if(!min)return '';if(min<60)return '+'+min+' мин';var hh=Math.floor(min/60),mm=min%60;return '+'+hh+'ч'+(mm?' '+mm+'м':'');}

    h+='<div class="empty-mini">Никого нет в смене</div>';

      h+='<div class="act-mini" id="amini_'+brs.id+'">'
        +'<div class="act-mini-dot"></div>'
        +'<div class="act-mini-l"><div class="act-mini-n">'+(brs.r==='owner'?'👑 ':'')+escH(brs.n)+'</div><div class="act-mini-t">с '+fmtTime(brs.active.start_time)+'</div></div>'
        +'<div class="act-mini-r" id="amini_d_'+brs.id+'">'+dur+'</div>'
      +'</div>';
    });

    });
